<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer — Chat Tier 3</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<link rel="stylesheet" href="/design-system/components/tabs.css">
<style>
/* ── Device frame (from shared styles.css) ── */
.device-wrapper {
  background: var(--bg-primary, #ffffff);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 32px;
  padding: 4px;
  box-shadow:
    0 12px 16px -4px rgba(10,13,18,0.08),
    0 4px 6px -2px rgba(10,13,18,0.03),
    0 2px 2px -1px rgba(10,13,18,0.04);
}
.device-inner-shadow {
  background: var(--bg-primary, #ffffff);
  border-radius: 28px;
  padding: 4px;
  overflow: hidden;
  position: relative;
}
.device-inner-shadow::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 0 6px 2px rgba(10,13,18,0.08),
    inset 0 0 4px 2px rgba(10,13,18,0.03);
  z-index: 6;
}
.device-mockup {
  background: var(--bg-tertiary, #fafafa);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  clip-path: inset(0 round 24px);
  position: relative;
}
.device-screen {
  width: 402px;
  height: 874px;
  position: relative;
  overflow: hidden;
  background: var(--bg-sky, #e0f2fe);
  user-select: none;
  -webkit-user-select: none;
}
.viewer {
  display: flex;
  justify-content: center;
  margin-top: var(--spacing-3xl, 24px);
}

/* ── Controls row + device toggle ── */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin-bottom: var(--spacing-xl, 16px);
}
/* ── Device toggle (uses shared tabs.css) ── */
.device-toggle .cat-tab { height: 36px; }
.device-toggle .cat-tab svg { width: 20px; height: 20px; flex-shrink: 0; }
.device-toggle .cat-tab .device-icon { stroke: var(--text-quaternary, #717680); transition: stroke 0.15s; }
.device-toggle .cat-tab.active .device-icon { stroke: var(--text-secondary, #414651); }

/* ── iPad overrides ── */
.device-wrapper.ipad .device-screen {
  width: 640px;
  height: 854px;
}
.device-wrapper.ipad .msg-col { max-width: 536px; }
.device-wrapper.ipad .msg-bubble { max-width: 480px; }
.device-wrapper.ipad .msg-images { max-width: 536px; }
.device-wrapper.ipad .msg-bubble-audio { width: 360px; }

/* ── Chat toolbar ── */
.chat-toolbar {
  position: absolute;
  top: 62px;
  left: 0;
  right: 0;
  height: 56px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 0 var(--spacing-xl, 16px) var(--spacing-md, 8px);
  z-index: 10;
  background: var(--bg-sky, #e0f2fe);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
}
.chat-toolbar-title {
  position: absolute;
  left: 50%;
  top: 13px;
  transform: translateX(-50%);
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-lg, 18px);
  line-height: var(--line-height-text-lg, 28px);
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  white-space: nowrap;
}
.chat-toolbar-btn {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-full, 9999px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  flex-shrink: 0;
}
.chat-toolbar-btn svg {
  width: 24px;
  height: 24px;
  color: var(--text-primary, #181d27);
}

/* ── Chat thread ── */
.chat-thread {
  position: absolute;
  top: 118px;
  left: 0;
  right: 0;
  bottom: 113px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--spacing-xl, 16px) var(--spacing-xl, 16px) var(--spacing-xl, 16px);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  z-index: 5;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chat-thread::-webkit-scrollbar { display: none; }

/* ── Message bubbles ── */
.msg-row {
  display: flex;
  width: 100%;
}
.msg-outgoing {
  justify-content: flex-end;
}
.msg-incoming {
  align-items: flex-end;
  gap: var(--spacing-md, 8px);
}
.msg-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 330px;
}
.msg-col-out {
  align-items: flex-end;
}
.msg-col-in {
  align-items: flex-start;
}
.msg-sender {
  font-family: -apple-system, 'SF Pro', sans-serif;
  font-size: 11px;
  line-height: 13px;
  letter-spacing: 0.06px;
  color: var(--text-secondary, #414651);
  padding-left: var(--spacing-xl, 16px);
}
.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full, 9999px);
  flex-shrink: 0;
  overflow: hidden;
  background: var(--bg-sky, #e0f2fe);
  border: 2px solid white;
  position: relative;
}
.msg-avatar img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.msg-bubble {
  border-radius: var(--radius-4xl, 24px);
  padding: var(--spacing-lg, 12px) var(--spacing-xl, 16px);
  max-width: 256px;
  min-width: 90px;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
  line-height: var(--line-height-text-sm, 20px);
  font-weight: var(--font-weight-regular, 400);
  color: var(--text-primary, #181d27);
  word-wrap: break-word;
}
.msg-bubble-out {
  background: var(--brand-200, #b9e6fe);
}
.msg-bubble-in {
  background: var(--bg-primary, #ffffff);
}
.msg-images {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  max-width: 330px;
}
.msg-images-out {
  justify-content: flex-end;
}
.msg-image {
  width: 104px;
  height: 104px;
  border-radius: 20px;
  flex-shrink: 0;
}

/* Typing indicator */
@keyframes typingDot {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}
.msg-typing .msg-bubble-in {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 16px 20px;
}
.typing-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gray-400, #a4a7ae);
  animation: typingDot 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* ── Audio message in thread ── */
.msg-bubble-audio {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xs, 4px);
  width: 256px;
}
.msg-audio-row {
  display: flex;
  gap: 4px;
  align-items: center;
}
.msg-audio-play {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray-200, #e9eaeb);
  border-radius: var(--radius-full, 9999px);
  padding: var(--spacing-sm, 6px);
  cursor: pointer;
}
.msg-audio-play svg { width: 20px; height: 20px; color: var(--text-primary, #181d27); }
.msg-audio-play svg.hidden { display: none; }
.msg-audio-waveform {
  flex: 1;
  display: flex;
  gap: 2px;
  align-items: center;
  height: 20px;
  overflow: hidden;
}
.msg-audio-waveform .waveform-bar {
  width: 2px;
  border-radius: 1px;
}
.msg-audio-label {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-xs, 12px);
  line-height: var(--line-height-text-xs, 16px);
  font-weight: var(--font-weight-regular, 400);
  color: var(--text-secondary, #414651);
}

/* ── Status bar ── */
.status-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 62px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 var(--spacing-3xl, 24px) var(--spacing-md, 8px);
  z-index: 10;
  pointer-events: none;
}
.status-bar-time {
  font-size: 17px;
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  letter-spacing: -0.01em;
}
.status-bar-icons {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-bar-icons svg { display: block; }

/* ── Grass + character area ── */
.bg-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1;
  pointer-events: none;
}
.bg-grass-edge {
  display: block;
  width: 100%;
  height: 24px;
  border-radius: 24px 24px 0 0;
  background: var(--bg-grass, #86cb3c);
}
.bg-grass-fill {
  width: 100%;
  height: 89px;
  background: var(--bg-grass, #86cb3c);
}

/* ── Home indicator ── */
.home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  border-radius: 100px;
  background: var(--text-primary, #181d27);
  z-index: 20;
}

/* ── Composer area (pinned to bottom) ── */
.composer-area {
  position: absolute;
  bottom: 34px;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  gap: 12px;
  padding: 0 var(--spacing-xl, 16px);
  transition: padding 0.2s;
}

/* ── Plus / Close button ── */
.btn-attach {
  width: 48px;
  height: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-full, 9999px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  cursor: pointer;
  padding: 0;
  transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
}
.btn-attach:hover { background: var(--gray-50, #fafafa); }
.btn-attach:active { box-shadow: none; transform: translateY(2px); }
.btn-attach svg {
  width: 24px;
  height: 24px;
  color: var(--text-primary, #181d27);
}

/* ── Composer input bubble ── */
.composer {
  flex: 1;
  min-width: 0;
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: var(--spacing-xs, 4px);
  transition: max-height 0.25s ease;
}

/* ── Media row ── */
.media-row {
  display: none;
  gap: 8px;
  padding: var(--spacing-xs, 4px) var(--spacing-lg, 12px) 0;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.media-row::-webkit-scrollbar { display: none; }
.media-row.visible { display: flex; }

.media-card {
  position: relative;
  width: 120px;
  height: 120px;
  flex-shrink: 0;
  border-radius: 20px;
  overflow: hidden;
}
.media-card-image {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--brand-100, #b2ddff) 0%, var(--brand-200, #7cc4fa) 100%);
  border-radius: 20px;
}
.media-remove {
  position: absolute;
  top: var(--spacing-md, 8px);
  right: var(--spacing-md, 8px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-tertiary, #f5f5f5);
  border-radius: var(--radius-full, 9999px);
  border: none;
  cursor: pointer;
  padding: var(--spacing-md, 8px);
  transition: transform 0.15s, opacity 0.15s;
}
.media-remove:active {
  transform: scale(0.9);
  opacity: 0.85;
}
.media-remove svg {
  width: 20px;
  height: 20px;
  color: var(--text-secondary, #414651);
}
/* ── Media loading overlay ── */
.media-card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.2);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* ── Design system spinner ── */
.spinner-circle {
  display: inline-block;
  flex-shrink: 0;
  animation: spinner-rotate 1.0s linear infinite;
}
@keyframes spinner-rotate { to { transform: rotate(360deg); } }
.spinner-sm { width: 20px; height: 20px; }

/* ── Input row ── */
.input-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 var(--spacing-xxs, 2px) 0 var(--spacing-md, 8px);
  min-height: 36px;
}
.input-row.align-end { align-items: flex-end; }
.input-row.input-row-audio {
  padding: 0 var(--spacing-xxs, 2px) 0 var(--spacing-sm, 6px);
}

.composer-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  line-height: var(--line-height-text-md, 24px);
  color: var(--text-secondary, #414651);
  resize: none;
  min-height: 24px;
  max-height: 178px;
  padding: var(--spacing-xs, 4px) 0;
  overflow-y: auto;
}
.composer-input::placeholder {
  color: var(--text-placeholder-subtle, #d5d7da);
}

/* ── Mic button ── */
.btn-mic {
  padding: var(--spacing-sm, 6px);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full, 9999px);
}
.btn-mic svg {
  width: 20px;
  height: 20px;
  color: var(--text-quaternary, #717680);
}

/* ── Send button ── */
.btn-send {
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--fg-brand-primary, #0ba5ec);
  border: none;
  border-radius: var(--radius-full, 9999px);
  cursor: pointer;
  padding: var(--spacing-md, 8px);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-send.visible { display: flex; }
.btn-send:active { transform: scale(0.9); opacity: 0.85; }
.btn-send svg {
  width: 20px;
  height: 20px;
  color: white;
}

/* ── Stop button ── */
.btn-stop {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--red-200, #fecdca);
  border: none;
  border-radius: var(--radius-full, 9999px);
  cursor: pointer;
  padding: var(--spacing-md, 8px);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-stop:active { transform: scale(0.9); opacity: 0.85; }
.btn-stop svg {
  width: 20px;
  height: 20px;
  color: var(--red-600, #d92d20);
}

/* ── Play button (send audio) ── */
.btn-play {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray-200, #e9eaeb);
  border: none;
  border-radius: var(--radius-full, 9999px);
  cursor: pointer;
  padding: var(--spacing-sm, 6px);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-play:active { transform: scale(0.9); opacity: 0.85; }
.btn-play svg {
  width: 20px;
  height: 20px;
  color: var(--text-primary, #181d27);
}

/* ── Waveform ── */
.waveform {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  height: 24px;
  overflow: hidden;
}
.waveform-bar {
  width: 2px;
  border-radius: 1px;
  transition: height 0.15s ease;
}
.waveform-bar.active {
  background: var(--fg-secondary, #414651);
}
.waveform-bar.inactive {
  background: var(--fg-quaternary, #a4a7ae);
}

/* Animate bars during listening */
@keyframes waveformPulse {
  0%, 100% { transform: scaleY(0.3); }
  50% { transform: scaleY(1); }
}
.waveform.listening .waveform-bar {
  animation: waveformPulse 0.6s ease-in-out infinite;
  background: var(--fg-secondary, #414651);
  pointer-events: none;
}

/* Ensure stop button is clickable above waveform */
.btn-stop, .btn-play, .btn-send {
  position: relative;
  z-index: 1;
}

/* ── Transcribing state ── */
.transcribing-row {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs, 4px);
  flex: 1;
  padding: var(--spacing-xs, 4px) 0;
}
.transcribing-label {
  font-size: var(--font-size-text-md, 16px);
  color: var(--text-placeholder, #717680);
  line-height: var(--line-height-text-md, 24px);
}

/* Transcribing spinner uses .spinner-circle + .spinner-sm from design system */

/* ── Sheet (per design system) ── */
.sheet-scrim {
  position: absolute;
  inset: 0;
  background: var(--bg-overlay, rgba(10,13,18,0.2));
  z-index: 15;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-scrim.visible {
  opacity: 1;
  pointer-events: auto;
}
.sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-primary, #ffffff);
  border-radius: var(--radius-4xl, 24px) var(--radius-4xl, 24px) 0 0;
  z-index: 16;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.5, 1.8, 0.3, 0.8);
  padding-bottom: var(--spacing-4xl, 32px);
  display: flex;
  flex-direction: column;
}
.sheet.visible {
  transform: translateY(0);
}
.sheet-top {
  padding: var(--spacing-xl, 16px);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}
.sheet-handle {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: var(--gray-300, #d5d7da);
}
.sheet-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-md, 8px);
  width: 100%;
}
.sheet-header-content {
  flex: 1;
  min-width: 0;
}
.sheet-title {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  line-height: var(--line-height-text-md, 24px);
  font-weight: var(--font-weight-bold, 700);
  color: var(--text-primary, #181d27);
  margin: 0;
}
.sheet-close {
  width: 44px;
  height: 44px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--gray-400, #a4a7ae);
  background: none;
  border: none;
  border-radius: var(--radius-full, 9999px);
}
.sheet-close:hover { background: var(--bg-tertiary, #f5f5f5); }
.sheet-close svg { width: 24px; height: 24px; }
.sheet-actions {
  display: flex;
  gap: var(--spacing-md, 8px);
  padding: var(--spacing-xs, 4px) var(--spacing-lg, 12px) var(--spacing-lg, 12px);
}
.action-tile {
  flex: 1;
  height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-xs, 4px);
  background: var(--bg-primary, #fff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-2xl, 16px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
}
.action-tile:hover { background: var(--bg-secondary, #fafafa); }
.action-tile:active { box-shadow: none; transform: translateY(2px); }
.action-tile-icon {
  font-family: 'TossFace', sans-serif;
  font-size: 24px;
  line-height: 1;
}
.action-tile-label {
  font-size: var(--font-size-text-md, 16px);
  font-weight: var(--font-weight-bold, 700);
  color: var(--text-secondary, #414651);
  line-height: var(--line-height-text-md, 24px);
}

/* ── Camera view ── */
.camera-view{position:absolute;inset:0;background:#d5d7da;z-index:25;display:none;flex-direction:column}
.camera-view.open{display:flex}
.camera-toolbar{position:absolute;top:62px;left:0;right:0;display:flex;align-items:flex-start;padding:0 var(--spacing-xl,16px) var(--spacing-md,8px);z-index:26}
.camera-top{flex:1;padding:118px 16px 8px}
.camera-guide{display:flex;gap:16px;align-items:flex-start}
.camera-sprout{width:120px;height:180px;flex-shrink:0;background:var(--bg-sky,#e0f2fe);border-radius:24px;overflow:hidden;position:relative}
.camera-sprout img{position:absolute;width:476px;height:476px;left:50%;top:calc(50% + 60px);transform:translate(-50%,-50%);pointer-events:none}
.camera-message{flex:1;background:rgba(10,13,18,.2);border-radius:24px;padding:12px 16px;font-size:var(--font-size-text-lg,18px);line-height:var(--line-height-text-lg,28px);color:#fff;align-self:center}
.camera-bottom{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 42px}
.btn-capture{width:80px;height:80px;display:flex;align-items:center;justify-content:center;background:var(--bg-primary,#fff);border:2px solid var(--border-secondary,#e9eaeb);border-radius:var(--radius-full,9999px);box-shadow:0 3px 0 0 var(--gray-200,#e9eaeb);cursor:pointer;padding:0;transition:background .15s,box-shadow .15s,transform .15s}
.btn-capture:hover{background:var(--bg-secondary,#fafafa)}
.btn-capture:active{box-shadow:none;transform:translateY(3px)}
.btn-capture svg{width:40px;height:40px;color:var(--text-primary,#181d27)}
.feedback-banner{position:absolute;bottom:0;left:0;right:0;background:var(--bg-primary,#fff);border-top:1px solid var(--border-primary,#d5d7da);padding:25px var(--spacing-xl,16px) var(--spacing-3xl,24px);display:none;flex-direction:column;gap:var(--spacing-xl,16px);z-index:26}
.feedback-banner.open{display:flex}
.feedback-title{font-family:var(--font-family-display,'Inter',sans-serif);font-size:var(--font-size-display-xs,24px);font-weight:var(--font-weight-bold,700);line-height:var(--line-height-display-xs,32px);color:var(--text-primary,#181d27)}
.feedback-actions{display:flex;gap:10px}
.btn-fb{flex:1;height:50px;display:flex;align-items:center;justify-content:center;font-family:var(--font-family-body,'Inter',sans-serif);font-size:var(--font-size-text-md,16px);font-weight:var(--font-weight-bold,700);line-height:var(--line-height-text-md,24px);border-radius:var(--radius-2xl,16px);cursor:pointer;padding:var(--spacing-lg,12px);transition:background .15s,box-shadow .15s,transform .15s}
.btn-fb.secondary{background:var(--bg-primary,#fff);border:2px solid var(--border-secondary,#e9eaeb);color:var(--text-secondary,#414651);box-shadow:0 3px 0 0 var(--gray-200,#e9eaeb)}
.btn-fb.secondary:active{box-shadow:none;transform:translateY(2px)}
.btn-fb.primary{background:var(--fg-brand-primary,#0ba5ec);border:none;border-bottom:2px solid #0086c9;color:#fff;box-shadow:0 4px 0 0 #0086c9}
.btn-fb.primary:active{box-shadow:none;transform:translateY(2px)}

/* ── State visibility helpers ── */
.hidden { display: none !important; }

/* ── State label (for demo) ── */
.state-indicator {
  position: absolute;
  top: 68px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 12px;
  font-weight: var(--font-weight-medium, 500);
  padding: 4px 12px;
  border-radius: var(--radius-full, 9999px);
  z-index: 12;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.state-indicator.visible { opacity: 1; }

@media (prefers-reduced-motion: reduce) {
  .spinner, .typing-dot {
    animation: none !important;
  }
  .sheet {
    transition: opacity 0.1s cubic-bezier(0.25, 0.1, 0.25, 1) !important;
  }
}

<script>
(function() {
  // ── State machine ──
  var State = {
    PLACEHOLDER: 'placeholder',
    TYPING: 'typing',
    LISTENING: 'listening',
    TRANSCRIBING: 'transcribing',
    SEND_AUDIO: 'send_audio',
    SHEET_OPEN: 'sheet_open'
  };

  var currentState = State.PLACEHOLDER;
  var prevState = null;
  var mediaItems = [];
  var transcribeTimer = null;

  // ── DOM refs ──
  var composerInput = document.getElementById('composerInput');
  var btnAttach = document.getElementById('btnAttach');
  var iconPlus = document.getElementById('iconPlus');
  var iconClose = document.getElementById('iconClose');
  var btnMic = document.getElementById('btnMic');
  var btnSend = document.getElementById('btnSend');
  var btnStop = document.getElementById('btnStop');
  var btnPlay = document.getElementById('btnPlay');
  var btnSendAudio = document.getElementById('btnSendAudio');
  var btnSendTranscribing = document.getElementById('btnSendTranscribing');
  var inputRowDefault = document.getElementById('inputRowDefault');
  var inputRowListening = document.getElementById('inputRowListening');
  var inputRowAudio = document.getElementById('inputRowAudio');
  var inputRowTranscribing = document.getElementById('inputRowTranscribing');
  var mediaRow = document.getElementById('mediaRow');
  var waveform = document.getElementById('waveform');
  var waveformStatic = document.getElementById('waveformStatic');
  var sheetScrim = document.getElementById('sheetScrim');
  var sheet = document.getElementById('sheet');
  var sheetClose = document.getElementById('sheetClose');
  var tileCamera = document.getElementById('tileCamera');
  var tilePhotos = document.getElementById('tilePhotos');
  var stateLabel = document.getElementById('stateLabel');
  var composer = document.getElementById('composer');

  // ── Build waveform bars ──
  function buildWaveformBars(container, count, animated) {
    container.innerHTML = '';
    for (var i = 0; i < count; i++) {
      var bar = document.createElement('div');
      bar.className = 'waveform-bar ' + (i < count * 0.6 ? 'active' : 'inactive');
      var h = 4 + Math.floor(Math.random() * 20);
      bar.style.height = h + 'px';
      if (animated) {
        bar.style.animationDelay = (i * 0.04) + 's';
      }
      container.appendChild(bar);
    }
  }

  buildWaveformBars(waveform, 77, true);
  buildWaveformBars(waveformStatic, 54, false);

  // ── State label ──
  var labelTimer = null;
  function showStateLabel() {}


  // ── Show/hide rows ──
  function showRow(row) {
    inputRowDefault.classList.add('hidden');
    inputRowListening.classList.add('hidden');
    inputRowAudio.classList.add('hidden');
    inputRowTranscribing.classList.add('hidden');
    row.classList.remove('hidden');
  }

  // ── Update attach button icon ──
  function setAttachIcon(isClose) {
    iconPlus.classList.toggle('hidden', isClose);
    iconClose.classList.toggle('hidden', !isClose);
  }

  // ── Auto-resize textarea ──
  function autoResize() {
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 178) + 'px';
    // Toggle multiline alignment
    var isMulti = composerInput.scrollHeight > 40;
    inputRowDefault.classList.toggle('align-end', isMulti);
  }

  // ── Update send/mic visibility + placeholder ──
  function updateSendMic() {
    var hasText = composerInput.value.trim().length > 0;
    var hasMedia = mediaItems.length > 0;
    var showSend = hasText || hasMedia;
    btnSend.classList.toggle('visible', showSend);
    btnMic.classList.toggle('hidden', showSend);
    composerInput.placeholder = hasMedia ? 'Add a comment or send' : 'Talk to Sprout...';
  }

  // ── Render media items ──
  function renderMedia() {
    mediaRow.innerHTML = '';
    if (mediaItems.length === 0) {
      mediaRow.classList.remove('visible');
      return;
    }
    mediaRow.classList.add('visible');

    mediaItems.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'media-card';
      var overlay = item.loading
        ? '<div class="media-card-overlay"><svg class="spinner-circle spinner-sm" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/><path d="M10 2a8 8 0 0 1 8 8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/></svg></div>'
        : '';
      card.innerHTML =
        '<div class="media-card-image" style="background:' + item.bg + '"></div>' +
        '<button class="media-remove" data-idx="' + idx + '" aria-label="Remove">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' + overlay;
      mediaRow.appendChild(card);
    });

    // Bind remove buttons
    mediaRow.querySelectorAll('.media-remove').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = parseInt(this.getAttribute('data-idx'));
        mediaItems.splice(idx, 1);
        renderMedia();
        updateSendMic();
      });
    });
  }

  // ── Transition to state ──
  function goTo(state) {
    prevState = currentState;
    currentState = state;

    // Stop any active playback animation
    if (typeof stopPlayback === 'function') stopPlayback();

    switch (state) {
      case State.PLACEHOLDER:
      case State.TYPING:
        showRow(inputRowDefault);
        setAttachIcon(false);
        btnAttach.classList.remove('hidden');
        updateSendMic();
        if (state === State.PLACEHOLDER) {
          showStateLabel('Placeholder');
        }
        break;

      case State.LISTENING:
        showRow(inputRowListening);
        setAttachIcon(false);
        btnAttach.classList.add('hidden');
        buildWaveformBars(waveform, getBarCount(77, waveform), true);
        showStateLabel('Listening');
        break;

      case State.TRANSCRIBING:
        showRow(inputRowTranscribing);
        setAttachIcon(true);
        btnAttach.classList.remove('hidden');
        showStateLabel('Transcribing');
        // Auto-resolve after 2.5s
        clearTimeout(transcribeTimer);
        transcribeTimer = setTimeout(function() {
          composerInput.value = 'Hey Sprout, what should we do today?';
          autoResize();
          goTo(State.TYPING);
          updateSendMic();
          showStateLabel('Transcribed');
        }, 2500);
        break;

      case State.SEND_AUDIO:
        showRow(inputRowAudio);
        setAttachIcon(true);
        btnAttach.classList.remove('hidden');
        buildWaveformBars(waveformStatic, getBarCount(54, waveformStatic), false);
        showStateLabel('Send Audio');
        break;

      case State.SHEET_OPEN:
        sheetScrim.classList.add('visible');
        sheet.classList.add('visible');
        showStateLabel('Attachment Sheet');
        break;
    }
  }

  function closeSheet() {
    sheetScrim.classList.remove('visible');
    sheet.classList.remove('visible');
    currentState = prevState || State.PLACEHOLDER;
  }

  // ── Chat thread ──
  var chatThread = document.getElementById('chatThread');
  var sproutReplies = [
    'Lorem ipsum dolor sit amet, consectetur adipiscing elit.',
    'Magna nam cursus in urna. Id at a pharetra purus.',
    'Sed do eiusmod tempor incididunt ut labore et dolore.',
    'Ut enim ad minim veniam, quis nostrud exercitation.',
    'Duis aute irure dolor in reprehenderit in voluptate.'
  ];
  var replyIdx = 0;

  function scrollThread() {
    setTimeout(function() { chatThread.scrollTop = chatThread.scrollHeight; }, 50);
  }

  function addOutgoingMessage(text, images) {
    var row = document.createElement('div');
    row.className = 'msg-row msg-outgoing';
    var col = document.createElement('div');
    col.className = 'msg-col msg-col-out';

    // Images
    if (images && images.length > 0) {
      var imgGrid = document.createElement('div');
      imgGrid.className = 'msg-images msg-images-out';
      images.forEach(function(img) {
        var card = document.createElement('div');
        card.className = 'msg-image';
        card.style.background = img.bg;
        imgGrid.appendChild(card);
      });
      col.appendChild(imgGrid);
    }

    // Text bubble
    if (text) {
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble msg-bubble-out';
      bubble.textContent = text;
      col.appendChild(bubble);
    }

    row.appendChild(col);
    chatThread.appendChild(row);
    scrollThread();
  }

  function addIncomingMessage(text) {
    // Show typing indicator first
    var typingRow = document.createElement('div');
    typingRow.className = 'msg-row msg-incoming msg-typing';
    typingRow.innerHTML =
      '<div class="msg-avatar"><img src="/product-explorer/brand/assets/character-sprout-avatar.svg" alt="Sprout"></div>' +
      '<div class="msg-col msg-col-in">' +
        '<div class="msg-bubble msg-bubble-in"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>' +
      '</div>';
    chatThread.appendChild(typingRow);
    scrollThread();

    // Replace with actual message after delay
    setTimeout(function() {
      chatThread.removeChild(typingRow);
      var row = document.createElement('div');
      row.className = 'msg-row msg-incoming';
      row.innerHTML =
        '<div class="msg-avatar"><img src="/product-explorer/brand/assets/character-sprout-avatar.svg" alt="Sprout"></div>' +
        '<div class="msg-col msg-col-in">' +
          '<div class="msg-bubble msg-bubble-in">' + text + '</div>' +
        '</div>';
      chatThread.appendChild(row);
      scrollThread();
    }, 1500);
  }

  function buildMsgWaveform(container) {
    var count = 54;
    for (var i = 0; i < count; i++) {
      var bar = document.createElement('div');
      bar.className = 'waveform-bar';
      var h = 2 + Math.floor(Math.random() * 16);
      bar.style.height = h + 'px';
      bar.dataset.restHeight = h;
      var color = i < count * 0.6 ? 'var(--fg-secondary, #414651)' : 'var(--fg-quaternary, #a4a7ae)';
      bar.style.background = color;
      bar.dataset.restColor = color;
      bar.style.transition = 'height 0.15s ease';
      container.appendChild(bar);
    }
  }

  function addOutgoingAudioMessage() {
    var row = document.createElement('div');
    row.className = 'msg-row msg-outgoing';
    var col = document.createElement('div');
    col.className = 'msg-col msg-col-out';
    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble msg-bubble-out msg-bubble-audio';
    var wfId = 'msgWaveform' + Date.now();
    bubble.innerHTML =
      '<div class="msg-audio-row">' +
        '<div class="msg-audio-play">' +
          '<svg class="msg-play-icon" viewBox="0 0 24 24" fill="none"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86a1 1 0 0 0-1.5.86z" fill="currentColor"/></svg>' +
          '<svg class="msg-pause-icon hidden" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/></svg>' +
        '</div>' +
        '<div class="msg-audio-waveform" id="' + wfId + '"></div>' +
      '</div>' +
      '<div class="msg-audio-label">Transcribing...</div>';
    col.appendChild(bubble);
    row.appendChild(col);
    chatThread.appendChild(row);
    buildMsgWaveform(document.getElementById(wfId));
    scrollThread();

    // After 5s, change to "Show transcript" (bold)
    var label = bubble.querySelector('.msg-audio-label');
    setTimeout(function() {
      label.textContent = 'Show transcript';
      label.style.fontWeight = 'var(--font-weight-bold, 700)';
    }, 5000);
  }

  function sendAndReply(text, images) {
    addOutgoingMessage(text, images);
    // Sprout auto-reply
    var reply = sproutReplies[replyIdx % sproutReplies.length];
    replyIdx++;
    addIncomingMessage(reply);
  }

  // ── Event listeners ──

  // Typing
  composerInput.addEventListener('input', function() {
    autoResize();
    updateSendMic();
    if (currentState === State.PLACEHOLDER && composerInput.value.length > 0) {
      currentState = State.TYPING;
    }
  });

  composerInput.addEventListener('focus', function() {
    if (currentState === State.PLACEHOLDER) {
      showStateLabel('Typing');
    }
  });

  // Send text
  btnSend.addEventListener('click', function() {
    var text = composerInput.value.trim();
    var images = mediaItems.slice();
    sendAndReply(text, images);
    composerInput.value = '';
    autoResize();
    mediaItems = [];
    renderMedia();
    updateSendMic();
    inputRowDefault.classList.remove('align-end');
    goTo(State.PLACEHOLDER);
  });

  // Mic → Listening
  btnMic.addEventListener('click', function() {
    goTo(State.LISTENING);
  });

  // Stop → Send Audio
  btnStop.addEventListener('click', function() {
    goTo(State.SEND_AUDIO);
  });

  // Send audio
  btnSendAudio.addEventListener('click', function() {
    addOutgoingAudioMessage();
    var reply = sproutReplies[replyIdx % sproutReplies.length];
    replyIdx++;
    addIncomingMessage(reply);
    goTo(State.PLACEHOLDER);
  });

  // Send from transcribing
  btnSendTranscribing.addEventListener('click', function() {
    clearTimeout(transcribeTimer);
    addOutgoingAudioMessage();
    var reply = sproutReplies[replyIdx % sproutReplies.length];
    replyIdx++;
    addIncomingMessage(reply);
    goTo(State.PLACEHOLDER);
  });

  // Play audio preview — organic dancing waveform
  var isPlaying = false;
  var playAnimId = null;
  var playTimer = null;
  var iconPlay = document.getElementById('iconPlay');
  var iconPause = document.getElementById('iconPause');

  function setPlayIcon(playing) {
    iconPlay.classList.toggle('hidden', playing);
    iconPause.classList.toggle('hidden', !playing);
    btnPlay.setAttribute('aria-label', playing ? 'Pause' : 'Play recording');
  }

  function stopPlayback() {
    isPlaying = false;
    setPlayIcon(false);
    if (playAnimId) { cancelAnimationFrame(playAnimId); playAnimId = null; }
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }

    // Ease bars back to resting state
    var bars = waveformStatic.querySelectorAll('.waveform-bar');
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.height = bars[i].dataset.restHeight + 'px';
      bars[i].style.background = '';
    }
  }

  btnPlay.addEventListener('click', function() {
    // Toggle pause
    if (isPlaying) {
      stopPlayback();
      showStateLabel('Paused');
      return;
    }

    isPlaying = true;
    setPlayIcon(true);
    showStateLabel('Playing...');

    var bars = waveformStatic.querySelectorAll('.waveform-bar');
    var count = bars.length;

    // Store resting heights and seed per-bar phase offsets
    var restHeights = [];
    var phases = [];
    var speeds = [];
    for (var i = 0; i < count; i++) {
      var h = parseInt(bars[i].style.height) || 6;
      bars[i].dataset.restHeight = h;
      restHeights.push(h);
      phases.push(i * 0.15 + Math.random() * 0.5);
      speeds.push(3 + Math.random() * 2);
      bars[i].style.background = 'var(--fg-secondary, #414651)';
    }

    var startTime = performance.now();
    var lastUpdate = 0;

    function animate(now) {
      if (!isPlaying) return;

      // Update heights every ~60ms (CSS transition handles smoothing)
      if (now - lastUpdate > 60) {
        lastUpdate = now;
        var elapsed = (now - startTime) / 1000;

        // Ease-in factor (0→1 over first 300ms)
        var easeIn = Math.min(1, elapsed / 0.3);

        for (var i = 0; i < count; i++) {
          var wave = Math.sin(elapsed * speeds[i] + phases[i]);
          var noise = Math.sin(elapsed * 7.3 + i * 2.1) * 0.3;
          var energy = 0.6 + 0.4 * Math.sin(elapsed * 1.5 - i * 0.08);

          var amplitude = (wave + noise) * energy * easeIn;
          var target = restHeights[i] + amplitude * 10;
          target = Math.max(2, Math.min(20, target));

          bars[i].style.height = Math.round(target) + 'px';
        }
      }

      playAnimId = requestAnimationFrame(animate);
    }

    playAnimId = requestAnimationFrame(animate);

    // Auto-stop after 3s
    playTimer = setTimeout(function() {
      stopPlayback();
    }, 3000);
  });

  // Attach button (+ or X)
  btnAttach.addEventListener('click', function() {
    if (currentState === State.SEND_AUDIO || currentState === State.TRANSCRIBING) {
      // X button: cancel recording
      clearTimeout(transcribeTimer);
      composerInput.value = '';
      autoResize();
      goTo(State.PLACEHOLDER);
      updateSendMic();
      showStateLabel('Cancelled');
    } else if (currentState === State.SHEET_OPEN) {
      closeSheet();
    } else {
      prevState = currentState;
      goTo(State.SHEET_OPEN);
    }
  });

  // Sheet close
  sheetClose.addEventListener('click', closeSheet);
  sheetScrim.addEventListener('click', closeSheet);

  // Finish loading after delay
  function scheduleLoad(item) {
    setTimeout(function() {
      item.loading = false;
      renderMedia();
    }, 5000);
  }

  // ── Camera flow ──
  var cameraView   = document.getElementById('cameraView');
  var cameraMsg    = document.getElementById('cameraMsg');
  var cameraBottom = document.getElementById('cameraBottom');
  var btnCapture   = document.getElementById('btnCapture');
  var btnRetake    = document.getElementById('btnRetake');
  var btnSendPhoto = document.getElementById('btnSendPhoto');
  var cameraClose  = document.getElementById('cameraClose');
  var feedbackBnr  = document.getElementById('feedbackBanner');

  tileCamera.addEventListener('click', function() {
    closeSheet();
    cameraView.classList.add('open');
    feedbackBnr.classList.remove('open');
    cameraBottom.style.display = '';
    cameraMsg.textContent = 'Point camera at your completed task';
    showStateLabel('Camera');
  });

  btnCapture.addEventListener('click', function() {
    cameraView.classList.remove('open');
    var item = { type: 'image', loading: true, bg: 'linear-gradient(135deg, #7cc4fa 0%, #36bffa 50%, #0ba5ec 100%)' };
    mediaItems.push(item);
    scheduleLoad(item);
    renderMedia();
    updateSendMic();
    showStateLabel('Photo Added');
  });

  cameraClose.addEventListener('click', function() {
    cameraView.classList.remove('open');
    feedbackBnr.classList.remove('open');
  });

  // Photos tile — adds sample images
  tilePhotos.addEventListener('click', function() {
    var item1 = { type: 'image', loading: true, bg: 'linear-gradient(135deg, #b2ddff 0%, #7cc4fa 100%)' };
    mediaItems.push(item1);
    scheduleLoad(item1);
    if (mediaItems.length === 1) {
      var item2 = { type: 'image', loading: true, bg: 'linear-gradient(135deg, #e0f2fe 0%, #b2ddff 50%, #7cc4fa 100%)' };
      mediaItems.push(item2);
      scheduleLoad(item2);
    }
    closeSheet();
    renderMedia();
    updateSendMic();
    showStateLabel('Photos Added');
  });

  // Initialize
  updateSendMic();
  autoResize();

  // Sprout greeting on load
  setTimeout(function() {
    addIncomingMessage("Hey there! What should we do today?");
  }, 800);

  // ── Audio message play (event delegation) ──
  chatThread.addEventListener('click', function(e) {
    var playBtn = e.target.closest('.msg-audio-play');
    if (!playBtn) return;

    // Check if already playing
    if (playBtn.dataset.playing === 'true') {
      // Stop
      playBtn.dataset.playing = 'false';
      cancelAnimationFrame(parseInt(playBtn.dataset.animId));
      clearTimeout(parseInt(playBtn.dataset.timerId));
      playBtn.querySelector('.msg-play-icon').classList.remove('hidden');
      playBtn.querySelector('.msg-pause-icon').classList.add('hidden');
      var wf = playBtn.closest('.msg-audio-row').querySelector('.msg-audio-waveform');
      var bars = wf.querySelectorAll('.waveform-bar');
      for (var i = 0; i < bars.length; i++) {
        bars[i].style.height = bars[i].dataset.restHeight + 'px';
        bars[i].style.background = bars[i].dataset.restColor || '';
      }
      return;
    }

    // Start playing
    playBtn.dataset.playing = 'true';
    playBtn.querySelector('.msg-play-icon').classList.add('hidden');
    playBtn.querySelector('.msg-pause-icon').classList.remove('hidden');

    var wf = playBtn.closest('.msg-audio-row').querySelector('.msg-audio-waveform');
    var bars = wf.querySelectorAll('.waveform-bar');
    var count = bars.length;
    var restHeights = [];
    var phases = [];
    var speeds = [];

    for (var i = 0; i < count; i++) {
      var h = parseInt(bars[i].dataset.restHeight) || 6;
      restHeights.push(h);
      phases.push(i * 0.15 + Math.random() * 0.5);
      speeds.push(3 + Math.random() * 2);
      bars[i].style.background = 'var(--fg-secondary, #414651)';
    }

    var startTime = performance.now();
    var lastUpdate = 0;

    function animate(now) {
      if (playBtn.dataset.playing !== 'true') return;
      if (now - lastUpdate > 60) {
        lastUpdate = now;
        var elapsed = (now - startTime) / 1000;
        var easeIn = Math.min(1, elapsed / 0.3);
        for (var i = 0; i < count; i++) {
          var wave = Math.sin(elapsed * speeds[i] + phases[i]);
          var noise = Math.sin(elapsed * 7.3 + i * 2.1) * 0.3;
          var energy = 0.6 + 0.4 * Math.sin(elapsed * 1.5 - i * 0.08);
          var amplitude = (wave + noise) * energy * easeIn;
          var target = restHeights[i] + amplitude * 8;
          target = Math.max(2, Math.min(18, target));
          bars[i].style.height = Math.round(target) + 'px';
        }
      }
      playBtn.dataset.animId = requestAnimationFrame(animate);
    }

    playBtn.dataset.animId = requestAnimationFrame(animate);

    // Auto-stop after 3s
    playBtn.dataset.timerId = setTimeout(function() {
      playBtn.dataset.playing = 'false';
      cancelAnimationFrame(parseInt(playBtn.dataset.animId));
      playBtn.querySelector('.msg-play-icon').classList.remove('hidden');
      playBtn.querySelector('.msg-pause-icon').classList.add('hidden');
      for (var i = 0; i < count; i++) {
        bars[i].style.height = bars[i].dataset.restHeight + 'px';
        bars[i].style.background = bars[i].dataset.restColor || '';
      }
    }, 3000);
  });

  // ── Device toggle ──
  var deviceBtns = document.querySelectorAll('.device-toggle .cat-tab');
  var deviceWrapper = document.querySelector('.device-wrapper');
  var isTablet = false;
  function getBarCount(base, container) {
    if (!isTablet || !container) return base;
    var w = container.offsetWidth;
    if (w > 0) return Math.floor(w / 4);
    return base;
  }
  deviceBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var device = btn.getAttribute('data-device');
      deviceBtns.forEach(function(b) { b.classList.toggle('active', b === btn); });
      if (device === 'ipad') {
        deviceWrapper.classList.add('ipad');
        isTablet = true;
      } else {
        deviceWrapper.classList.remove('ipad');
        isTablet = false;
      }
      buildWaveformBars(waveform, getBarCount(77, waveform), true);
      buildWaveformBars(waveformStatic, getBarCount(54, waveformStatic), false);
    });
  });
})();
</script>
