<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer — Chat Tier 3 + Tiles</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<link rel="stylesheet" href="/design-system/components/tabs.css">
<link rel="stylesheet" href="/design-system/components/tile.css">
<style>
/* ── Toss Face emoji font ── */
@font-face {
  font-family:'TossFace';
  src:url('https://static.toss.im/tossface-font/TossFaceFontWeb.otf') format('opentype');
  font-display:swap;
}

/* ── Device frame ── */
.device-wrapper {
  background: var(--bg-primary, #ffffff);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 32px;
  padding: 4px;
  box-shadow:
    0 12px 16px -4px rgba(10,13,18,0.08),
    0 4px 6px -2px rgba(10,13,18,0.03),
    0 2px 2px -1px rgba(10,13,18,0.04);
}
.device-inner-shadow {
  background: var(--bg-primary, #ffffff);
  border-radius: 28px;
  padding: 4px;
  overflow: hidden;
  position: relative;
}
.device-inner-shadow::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 0 6px 2px rgba(10,13,18,0.08),
    inset 0 0 4px 2px rgba(10,13,18,0.03);
  z-index: 6;
}
.device-mockup {
  background: var(--bg-tertiary, #fafafa);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  clip-path: inset(0 round 24px);
  position: relative;
}
.device-screen {
  width: 402px;
  height: 874px;
  position: relative;
  overflow: hidden;
  background: var(--bg-sky, #e0f2fe);
  user-select: none;
  -webkit-user-select: none;
}

/* ── iPad overrides ── */
.device-wrapper.ipad .device-screen { width: 640px; height: 854px; }
.device-wrapper.ipad .msg-col { max-width: 536px; }
.device-wrapper.ipad .msg-bubble { max-width: 480px; }
.device-wrapper.ipad .tile-group { max-width: 480px; }

/* ── Chat toolbar ── */
.chat-toolbar {
  position: absolute;
  top: 62px; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 0 var(--spacing-xl, 16px) var(--spacing-md, 8px);
  z-index: 10;
  background: var(--bg-sky, #e0f2fe);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
}
.chat-toolbar-title {
  position: absolute;
  left: 50%; top: 13px;
  transform: translateX(-50%);
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-lg, 18px);
  line-height: var(--line-height-text-lg, 28px);
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  white-space: nowrap;
}
.chat-toolbar-btn {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-full, 9999px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  flex-shrink: 0;
}
.chat-toolbar-btn svg { width: 24px; height: 24px; color: var(--text-primary, #181d27); }

/* ── Chat thread ── */
.chat-thread {
  position: absolute;
  top: 118px; left: 0; right: 0; bottom: 113px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--spacing-xl, 16px);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  z-index: 5;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chat-thread::-webkit-scrollbar { display: none; }

/* ── Message bubbles ── */
.msg-row { display: flex; width: 100%; }
.msg-outgoing { justify-content: flex-end; }
.msg-incoming { align-items: flex-end; gap: var(--spacing-md, 8px); }
.msg-col { display: flex; flex-direction: column; gap: 4px; max-width: 330px; }
.msg-col-out { align-items: flex-end; }
.msg-col-in { align-items: flex-start; }
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: var(--radius-full, 9999px);
  flex-shrink: 0; overflow: hidden;
  background: var(--bg-sky, #e0f2fe);
  border: 2px solid white;
  position: relative;
}
.msg-avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.msg-bubble {
  border-radius: var(--radius-4xl, 24px);
  padding: var(--spacing-lg, 12px) var(--spacing-xl, 16px);
  max-width: 256px;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
  line-height: var(--line-height-text-sm, 20px);
  font-weight: var(--font-weight-regular, 400);
  color: var(--text-primary, #181d27);
  word-wrap: break-word;
}
.msg-bubble-out { background: var(--brand-200, #b9e6fe); }
.msg-bubble-in { background: var(--bg-primary, #ffffff); }

/* Typing indicator */
@keyframes typingDot {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}
.msg-typing .msg-bubble-in { display: flex; gap: 4px; align-items: center; padding: 16px 20px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gray-400, #a4a7ae);
  animation: typingDot 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* ── Tile group inside chat ── */
.tile-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  width: 100%;
  max-width: 100%;
}

/* Tile tweaks for chat context — smaller leading */
.tile-group .tile { padding: var(--spacing-lg, 12px) var(--spacing-xl, 16px); }
.tile-group .tile-leading { width: 32px; height: 32px; }
.tile-group .tile-leading-icon { font-size: 24px; }

/* Fade-in animation for tiles */
@keyframes tileSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.tile-group .tile {
  animation: tileSlideIn 0.3s ease both;
}
.tile-group .tile:nth-child(1) { animation-delay: 0.05s; }
.tile-group .tile:nth-child(2) { animation-delay: 0.1s; }
.tile-group .tile:nth-child(3) { animation-delay: 0.15s; }
.tile-group .tile:nth-child(4) { animation-delay: 0.2s; }

/* ── Scrollable tile group (6+ tiles) ── */
.tile-group-scroll {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  width: 100%;
  max-width: 100%;
}
.tile-group-scroll .tile-group-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  max-height: 340px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  padding-right: 2px;
}
.tile-group-scroll .tile-group-list::-webkit-scrollbar { width: 4px; }
.tile-group-scroll .tile-group-list::-webkit-scrollbar-thumb {
  background: var(--gray-300, #d5d7da);
  border-radius: 2px;
}
/* Fade hint at bottom of scroll area */
.tile-group-scroll .tile-group-list {
  -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
  mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
}
.tile-group-scroll .tile-group-list.scrolled-bottom {
  -webkit-mask-image: none;
  mask-image: none;
}
/* Sticky confirm button */
.tile-group-scroll .tile-group-confirm {
  flex-shrink: 0;
}

/* ── Matching pairs ── */
.match-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  width: 100%;
  max-width: 100%;
}
.match-columns {
  display: flex;
  gap: var(--spacing-md, 8px);
  width: 100%;
}
.match-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
}
.match-tile {
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  width: 100%;
  min-height: 56px;
  padding: var(--spacing-lg, 12px) var(--spacing-xl, 16px);
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-xl, 12px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.15s, opacity 0.3s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
  line-height: var(--line-height-text-sm, 20px);
  font-weight: var(--font-weight-bold, 700);
  color: var(--text-primary, #181d27);
  text-align: center;
  gap: var(--spacing-md, 8px);
}
.match-tile:hover { background: var(--bg-secondary, #fafafa); }
.match-tile:active { box-shadow: none; transform: translateY(2px); }
.match-tile .match-emoji {
  font-family: 'TossFace', sans-serif;
  font-size: 24px;
  line-height: 1;
}

/* Match tile states */
.match-tile.selected {
  background: var(--bg-brand-secondary, #e0f2fe);
  border-color: var(--brand-300, #7cd4fd);
  box-shadow: 0 3px 0 0 var(--brand-300, #7cd4fd);
}
.match-tile.success {
  background: var(--green-100, #dcfae6);
  border-color: var(--green-300, #75e0a7);
  box-shadow: 0 4px 0 0 var(--green-300, #75e0a7);
  pointer-events: none;
}
.match-tile.disabled {
  background: var(--bg-primary, #ffffff);
  border-color: var(--border-secondary, #e9eaeb);
  box-shadow: none;
  pointer-events: none;
  color: var(--gray-400, #a4a7ae);
}
.match-tile.disabled .match-emoji {
  filter: grayscale(1);
  mix-blend-mode: luminosity;
}
.match-tile.warning {
  background: var(--yellow-100, #fef7c3);
  border-color: var(--yellow-300, #fde272);
  box-shadow: 0 4px 0 0 var(--yellow-300, #fde272);
  pointer-events: none;
  cursor: default;
}

/* ── Sort exercise layout ── */
.sort-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  width: 100%;
  max-width: 100%;
}
.sort-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  position: relative;
}

/* Sort-specific: number badge (not in DS tile, prototype-only) */
.sort-number {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray-100, #f5f5f5);
  border-radius: var(--radius-full, 9999px);
  font-size: 13px;
  font-weight: var(--font-weight-bold, 700);
  color: var(--text-tertiary, #535862);
  flex-shrink: 0;
}
.tile.success .sort-number {
  background: var(--green-300, #75e0a7);
  color: var(--bg-primary, #ffffff);
}
.tile.warning-static .sort-number {
  background: var(--yellow-300, #fde272);
  color: var(--text-primary, #181d27);
}

/* Drop placeholder */
.sort-placeholder {
  min-height: 56px;
  border: 2px dashed var(--brand-300, #7cd4fd);
  border-radius: var(--radius-xl, 12px);
  background: var(--bg-brand-secondary, #e0f2fe);
  opacity: 0.4;
}

/* Match label row */
.match-label {
  font-size: var(--font-size-text-xs, 12px);
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-quaternary, #717680);
  text-align: center;
  padding-bottom: var(--spacing-xs, 4px);
}

/* Dismissed matching pairs fades out */
.tile-group.dismissed {
  transition: opacity 0.25s, max-height 0.3s ease 0.1s;
  opacity: 0;
  max-height: 0 !important;
  overflow: hidden;
}

/* ── Image Quiz (grid of image tiles) ── */
.image-quiz-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md, 8px);
  width: 100%;
}
.image-quiz-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--spacing-md, 8px);
}
.image-quiz-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-sm, 6px);
  box-sizing: border-box;
  aspect-ratio: 1;
  padding: var(--spacing-xl, 16px);
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-xl, 12px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.image-quiz-tile:hover { background: var(--bg-secondary, #fafafa); }
.image-quiz-tile:active { box-shadow: none; transform: translateY(2px); }
.image-quiz-tile .quiz-image {
  font-family: 'TossFace', sans-serif;
  font-size: 48px;
  line-height: 1;
}
.image-quiz-tile .quiz-label {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
  font-weight: var(--font-weight-bold, 700);
  color: var(--text-primary, #181d27);
  text-align: center;
}
.image-quiz-tile.selected {
  background: var(--bg-brand-secondary, #e0f2fe);
  border-color: var(--brand-300, #7cd4fd);
  box-shadow: 0 3px 0 0 var(--brand-300, #7cd4fd);
}
.image-quiz-tile.success {
  background: var(--green-100, #dcfae6);
  border-color: var(--green-300, #75e0a7);
  box-shadow: 0 4px 0 0 var(--green-300, #75e0a7);
  pointer-events: none;
}
.image-quiz-tile.error {
  background: var(--red-100, #fee4e2);
  border-color: var(--red-300, #fda29b);
  box-shadow: 0 4px 0 0 var(--red-300, #fda29b);
  pointer-events: none;
}
.image-quiz-tile.disabled {
  background: var(--bg-primary, #ffffff);
  border-color: var(--border-secondary, #e9eaeb);
  box-shadow: none;
  pointer-events: none;
  color: var(--gray-400, #a4a7ae);
}
.image-quiz-tile.disabled .quiz-image {
  filter: grayscale(1);
  mix-blend-mode: luminosity;
}
.image-quiz-tile.disabled .quiz-label {
  color: var(--gray-400, #a4a7ae);
}

/* ── Fill in the Blank ── */
.fill-blank-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-lg, 12px);
  width: 100%;
}
.fill-blank-sentence {
  background: var(--bg-primary, #ffffff);
  border: 1px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-4xl, 24px);
  padding: var(--spacing-xl, 16px);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xl, 16px);
}
.fill-blank-row {
  display: flex;
  align-items: flex-start;
  flex-wrap: wrap;
}
.fill-blank-text {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  line-height: var(--line-height-text-md, 24px);
  font-weight: var(--font-weight-regular, 400);
  color: var(--text-primary, #181d27);
  white-space: nowrap;
}
.fill-blank-gap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--spacing-xxs, 2px);
  min-width: 50px;
  padding: 0 var(--spacing-xs, 4px);
}
.fill-blank-gap-text {
  opacity: 0;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  line-height: var(--line-height-text-md, 24px);
  font-weight: var(--font-weight-regular, 400);
  color: var(--text-primary, #181d27);
  white-space: nowrap;
  transition: opacity 0.15s, color 0.15s;
}
.fill-blank-gap.filled .fill-blank-gap-text { opacity: 1; }
.fill-blank-gap.correct .fill-blank-gap-text {
  opacity: 1;
  color: var(--text-success-primary, #079455);
}
.fill-blank-gap.wrong .fill-blank-gap-text {
  opacity: 1;
  color: var(--text-error-primary, #d92d20);
}
.fill-blank-gap-line {
  width: 100%;
  height: 1px;
  background: var(--border-secondary, #e9eaeb);
  transition: background 0.15s;
}
.fill-blank-gap.active .fill-blank-gap-line {
  background: var(--brand-300, #7cd4fd);
  height: 2px;
}
.fill-blank-gap.correct .fill-blank-gap-line {
  background: var(--text-success-primary, #079455);
}
.fill-blank-gap.wrong .fill-blank-gap-line {
  background: var(--text-error-primary, #d92d20);
}
.fill-blank-options {
  display: flex;
  gap: var(--spacing-lg, 12px);
  justify-content: center;
}
.fill-blank-options .tile {
  width: auto;
  padding: var(--spacing-md, 8px) var(--spacing-lg, 12px);
}
.fill-blank-options .tile.used {
  opacity: 0.3;
  pointer-events: none;
}
.fill-blank-options .tile.placed {
  background: var(--bg-brand-secondary, #e0f2fe);
  border-color: var(--brand-300, #7cd4fd);
  box-shadow: 0 3px 0 0 var(--brand-300, #7cd4fd);
  pointer-events: none;
}

/* ── Composer transition for swap ── */
.composer-area {
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.composer-area.hidden-for-tiles {
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  visibility: hidden;
}

/* ── Sticky confirm bar (replaces composer during multi-select) ── */
.confirm-bar {
  position: absolute;
  bottom: 34px; left: 0; right: 0;
  z-index: 10;
  padding: 0 var(--spacing-xl, 16px);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 48px;
  animation: confirmBarIn 0.25s ease both;
  animation-delay: 0.15s;
}
@keyframes confirmBarIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.confirm-bar .tile-group-confirm {
  flex: 1;
  height: 48px;
}

/* ── Confirm button for multi-select ── */
.tile-group-confirm {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 48px;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  line-height: var(--line-height-text-md, 24px);
  font-weight: var(--font-weight-bold, 700);
  border-radius: var(--radius-2xl, 16px);
  cursor: pointer;
  padding: var(--spacing-lg, 12px);
  transition: background 0.15s, box-shadow 0.15s, transform 0.15s, opacity 0.2s;
  background: var(--fg-brand-primary, #0ba5ec);
  color: #fff;
  border: none;
  border-bottom: 2px solid var(--brand-600, #0086c9);
  box-shadow: 0 4px 0 0 var(--brand-600, #0086c9);
  animation: tileSlideIn 0.3s ease both;
  animation-delay: 0.25s;
}
.tile-group-confirm:active {
  box-shadow: none;
  transform: translateY(4px);
}
.tile-group-confirm.state-disabled {
  background: var(--gray-300, #d5d7da);
  color: var(--text-disabled, #717680);
  border-bottom: 2px solid var(--gray-400, #a4a7ae);
  box-shadow: 0 4px 0 0 var(--gray-400, #a4a7ae);
  cursor: default;
  pointer-events: none;
}

/* ── Selection count badge ── */
.tile-group-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.25);
  border-radius: var(--radius-full, 9999px);
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  font-size: 13px;
  font-weight: var(--font-weight-bold, 700);
  margin-left: 8px;
}

/* ── Status bar ── */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 62px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 var(--spacing-3xl, 24px) var(--spacing-md, 8px);
  z-index: 10;
  pointer-events: none;
}
.status-bar-time {
  font-size: 17px;
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  letter-spacing: -0.01em;
}
.status-bar-icons { display: flex; align-items: center; gap: 6px; }
.status-bar-icons svg { display: block; }

/* ── Grass + bottom ── */
.bg-bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 1; pointer-events: none; }
.bg-grass-edge { display: block; width: 100%; height: 24px; border-radius: 24px 24px 0 0; background: var(--bg-grass, #86cb3c); }
.bg-grass-fill { width: 100%; height: 89px; background: var(--bg-grass, #86cb3c); }

/* ── Home indicator ── */
.home-indicator {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 134px; height: 5px;
  border-radius: 100px;
  background: var(--text-primary, #181d27);
  z-index: 20;
}

/* ── Composer area ── */
.composer-area {
  position: absolute;
  bottom: 34px; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: flex-end;

}

}

}
.composer-input::placeholder { color: var(--text-placeholder-subtle, #d5d7da); }
.btn-mic {

  background: none; border: none; cursor: pointer;

}
.btn-mic svg { width: 20px; height: 20px; color: var(--text-quaternary, #717680); }
.btn-send {
  flex-shrink: 0; display: none;
  align-items: center; justify-content: center;
  background: var(--fg-brand-primary, #0ba5ec);
  border: none; border-radius: var(--radius-full, 9999px);
  cursor: pointer; padding: var(--spacing-md, 8px);
}
.btn-send.visible { display: flex; }
.btn-send:active { transform: scale(0.9); opacity: 0.85; }
.btn-send svg { width: 20px; height: 20px; color: white; }

.hidden { display: none !important; }

@media (prefers-reduced-motion: reduce) {
  .tile-group .tile { animation: none !important; }
  .typing-dot { animation: none !important; }
}

<script>
(function() {
  var chatThread = document.getElementById('chatThread');
  var composerInput = document.getElementById('composerInput');
  var btnSend = document.getElementById('btnSend');
  var btnMic = document.getElementById('btnMic');

  var composerArea = document.getElementById('composerArea');
  var AVATAR_SRC = '/product-explorer/brand/assets/character-sprout-avatar.svg';

  var phoneScreen = document.getElementById('phone');

  // ── Hide/show composer for multi-select ──
  function hideComposer() {
    composerArea.classList.add('hidden-for-tiles');
  }
  function showComposer() {
    composerArea.classList.remove('hidden-for-tiles');
  }

  function scrollThread() {
    setTimeout(function() { chatThread.scrollTop = chatThread.scrollHeight; }, 50);
  }

  // ── Add incoming message (with typing indicator) ──
  function addIncoming(text, cb) {
    var typingRow = document.createElement('div');
    typingRow.className = 'msg-row msg-incoming msg-typing';
    typingRow.innerHTML =
      '<div class="msg-avatar"><img src="' + AVATAR_SRC + '" alt="Sprout"></div>' +
      '<div class="msg-col msg-col-in">' +
        '<div class="msg-bubble msg-bubble-in"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>' +
      '</div>';
    chatThread.appendChild(typingRow);
    scrollThread();

    setTimeout(function() {
      chatThread.removeChild(typingRow);
      var row = document.createElement('div');
      row.className = 'msg-row msg-incoming';
      row.innerHTML =
        '<div class="msg-avatar"><img src="' + AVATAR_SRC + '" alt="Sprout"></div>' +
        '<div class="msg-col msg-col-in">' +
          '<div class="msg-bubble msg-bubble-in">' + text + '</div>' +
        '</div>';
      chatThread.appendChild(row);
      scrollThread();
      if (cb) setTimeout(cb, 300);
    }, 1200);
  }

  // ── Add outgoing message ──
  function addOutgoing(text) {
    var row = document.createElement('div');
    row.className = 'msg-row msg-outgoing';
    row.innerHTML =
      '<div class="msg-col msg-col-out">' +
        '<div class="msg-bubble msg-bubble-out">' + text + '</div>' +
      '</div>';
    chatThread.appendChild(row);
    scrollThread();
  }

  // ── Add tile group (DS Tile component — None variant, single-select) ──
  // Composer stays UNLOCKED — tiles are suggestions, kid can type instead
  function addTileGroup(tiles, onSelect) {
    var group = document.createElement('div');
    group.className = 'tile-group';
    group.setAttribute('role', 'listbox');

    tiles.forEach(function(t) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.setAttribute('role', 'option');
      tile.setAttribute('aria-selected', 'false');
      tile.innerHTML =
        '<div class="tile-leading tile-leading-icon">' + t.emoji + '</div>' +
        '<div class="tile-content">' +
          '<div class="tile-label">' + t.label + '</div>' +
          (t.desc ? '<div class="tile-desc">' + t.desc + '</div>' : '') +
        '</div>';

      tile.addEventListener('click', function() {
        // Mark as selected
        group.querySelectorAll('.tile').forEach(function(el) {
          el.classList.remove('checked');
          el.setAttribute('aria-selected', 'false');
        });
        tile.classList.add('checked');
        tile.setAttribute('aria-selected', 'true');

        // After brief delay, dismiss tiles
        setTimeout(function() {
          group.classList.add('dismissed');
          setTimeout(function() {
            group.remove();
            if (onSelect) onSelect(t);
          }, 350);
        }, 400);
      });

      group.appendChild(tile);
    });

    chatThread.appendChild(group);
    scrollThread();
  }

  // ── Add multi-select tile group (DS Tile — Checkbox variant) ──
  // Hides composer, shows sticky confirm bar in its place
  function addTileGroupMulti(tiles, confirmLabel, onConfirm) {
    hideComposer();

    // Tile group in the chat thread
    var group = document.createElement('div');
    group.className = 'tile-group';
    group.setAttribute('role', 'listbox');
    group.setAttribute('aria-multiselectable', 'true');

    // Sticky confirm bar at the bottom (replaces composer after fade-out)
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm state-disabled';
    confirmBtn.innerHTML = confirmLabel + '<span class="tile-group-count">0</span>';
    confirmBar.appendChild(confirmBtn);
    // Delay adding to DOM so composer fades out first
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);

    function updateConfirm() {
      var count = group.querySelectorAll('.tile.checked').length;
      confirmBtn.querySelector('.tile-group-count').textContent = count;
      confirmBtn.classList.toggle('state-disabled', count === 0);
    }

    tiles.forEach(function(t, i) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.setAttribute('role', 'option');
      tile.setAttribute('aria-checked', 'false');
      tile.style.animation = 'tileSlideIn 0.3s ease both';
      tile.style.animationDelay = (i * 0.05) + 's';
      tile.innerHTML =
        '<div class="tile-leading tile-leading-icon">' + t.emoji + '</div>' +
        '<div class="tile-content">' +
          '<div class="tile-label">' + t.label + '</div>' +
          (t.desc ? '<div class="tile-desc">' + t.desc + '</div>' : '') +
        '</div>' +
        '<div class="tile-checkbox">' +
          '<svg class="tile-check-icon" viewBox="0 0 14 14"><polyline points="2.5 7 5.5 10.5 11.5 3.5"/></svg>' +
        '</div>';

      tile.addEventListener('click', function() {
        tile.classList.toggle('checked');
        tile.setAttribute('aria-checked', tile.classList.contains('checked'));
        updateConfirm();
      });

      group.appendChild(tile);
    });

    chatThread.appendChild(group);
    scrollThread();

    confirmBtn.addEventListener('click', function() {
      if (confirmBtn.classList.contains('state-disabled')) return;
      var selected = [];
      group.querySelectorAll('.tile.checked').forEach(function(el) {
        var label = el.querySelector('.tile-label').textContent;
        selected.push(label);
      });
      // Fade out confirm bar + tiles together
      group.classList.add('dismissed');
      confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      confirmBar.style.opacity = '0';
      confirmBar.style.transform = 'translateY(8px)';
      setTimeout(function() {
        confirmBar.remove();
        group.remove();
        showComposer();
        if (onConfirm) onConfirm(selected);
      }, 350);
    });
  }

  // ── Add matching pairs exercise ──
  // pairs: [{left: {content, emoji?}, right: {content, emoji?}}]
  // Hides composer, shows disabled "Check" button at bottom
  function addMatchingPairs(pairs, onComplete) {
    hideComposer();

    var group = document.createElement('div');
    group.className = 'match-group';

    // Column headers
    var columns = document.createElement('div');
    columns.className = 'match-columns';
    var leftCol = document.createElement('div');
    leftCol.className = 'match-col';
    var rightCol = document.createElement('div');
    rightCol.className = 'match-col';
    columns.appendChild(leftCol);
    columns.appendChild(rightCol);
    group.appendChild(columns);

    // Shuffle right side
    var rightItems = pairs.map(function(p, i) { return { idx: i, content: p.right.content, emoji: p.right.emoji }; });
    for (var i = rightItems.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = rightItems[i]; rightItems[i] = rightItems[j]; rightItems[j] = tmp;
    }

    var leftTiles = [];
    var rightTiles = [];
    var selectedLeft = null;
    var selectedRight = null;
    var matchedCount = 0;
    var processing = false;

    function makeTile(item, side) {
      var tile = document.createElement('div');
      tile.className = 'match-tile';
      tile.dataset.idx = item.idx;
      tile.dataset.side = side;
      var html = '';
      if (item.emoji) html += '<span class="match-emoji">' + item.emoji + '</span>';
      html += '<span>' + item.content + '</span>';
      tile.innerHTML = html;
      return tile;
    }

    // Build left tiles (in order)
    pairs.forEach(function(p, i) {
      var tile = makeTile({ idx: i, content: p.left.content, emoji: p.left.emoji }, 'left');
      tile.style.animation = 'tileSlideIn 0.3s ease both';
      tile.style.animationDelay = (i * 0.05) + 's';
      leftCol.appendChild(tile);
      leftTiles.push(tile);
    });

    // Build right tiles (shuffled)
    rightItems.forEach(function(item, i) {
      var tile = makeTile(item, 'right');
      tile.style.animation = 'tileSlideIn 0.3s ease both';
      tile.style.animationDelay = (i * 0.05 + 0.1) + 's';
      rightCol.appendChild(tile);
      rightTiles.push(tile);
    });

    chatThread.appendChild(group);
    scrollThread();

    // Sticky "Check" button (disabled)
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm state-disabled';
    confirmBtn.textContent = 'Check';
    confirmBar.appendChild(confirmBtn);
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);

    function clearSelections() {
      if (selectedLeft) selectedLeft.classList.remove('selected');
      if (selectedRight) selectedRight.classList.remove('selected');
      selectedLeft = null;
      selectedRight = null;
    }

    function checkPair() {
      if (!selectedLeft || !selectedRight) return;
      processing = true;

      var leftIdx = parseInt(selectedLeft.dataset.idx);
      var rightIdx = parseInt(selectedRight.dataset.idx);
      var isMatch = leftIdx === rightIdx;

      var tileL = selectedLeft;
      var tileR = selectedRight;

      if (isMatch) {
        // Success → then disabled
        tileL.classList.remove('selected');
        tileR.classList.remove('selected');
        tileL.classList.add('success');
        tileR.classList.add('success');
        matchedCount++;

        setTimeout(function() {
          tileL.classList.remove('success');
          tileR.classList.remove('success');
          tileL.classList.add('disabled');
          tileR.classList.add('disabled');
          selectedLeft = null;
          selectedRight = null;
          processing = false;

          // All matched? Enable the Check button
          if (matchedCount === pairs.length) {
            confirmBtn.classList.remove('state-disabled');
          }
        }, 800);
      } else {
        // Selected (blue) → Warning (yellow) → Default (white)

        // Step 1: Switch from selected to warning
        tileL.classList.remove('selected');
        tileR.classList.remove('selected');
        tileL.classList.add('warning');
        tileR.classList.add('warning');

        // Step 2: After 300ms, remove warning → transitions back to default
        setTimeout(function() {
          tileL.classList.remove('warning');
          tileR.classList.remove('warning');
          selectedLeft = null;
          selectedRight = null;
          setTimeout(function() { processing = false; }, 200);
        }, 300);
      }
    }

    // Check button: dismiss exercise when tapped
    confirmBtn.addEventListener('click', function() {
      if (confirmBtn.classList.contains('state-disabled')) return;
      group.classList.add('dismissed');
      confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      confirmBar.style.opacity = '0';
      confirmBar.style.transform = 'translateY(8px)';
      setTimeout(function() {
        confirmBar.remove();
        group.remove();
        showComposer();
        if (onComplete) onComplete();
      }, 350);
    });

    // Click handler for all tiles
    group.addEventListener('click', function(e) {
      var tile = e.target.closest('.match-tile');
      if (!tile || processing) return;
      if (tile.classList.contains('disabled') || tile.classList.contains('success') || tile.classList.contains('warning')) return;

      var side = tile.dataset.side;

      if (side === 'left') {
        if (selectedLeft === tile) { tile.classList.remove('selected'); selectedLeft = null; return; }
        if (selectedLeft) selectedLeft.classList.remove('selected');
        selectedLeft = tile;
        tile.classList.add('selected');
      } else {
        if (selectedRight === tile) { tile.classList.remove('selected'); selectedRight = null; return; }
        if (selectedRight) selectedRight.classList.remove('selected');
        selectedRight = tile;
        tile.classList.add('selected');
      }

      // Auto-check when both sides selected
      if (selectedLeft && selectedRight) {
        setTimeout(checkPair, 300);
      }
    });
  }

  // ── Add sorting exercise (drag to reorder) ──
  // items: [{emoji?, content, correctIndex}]
  // Items are shown shuffled. Kid drags to reorder, taps Check to validate.
  function addSortExercise(items, onComplete) {
    hideComposer();

    var group = document.createElement('div');
    group.className = 'sort-group';

    var list = document.createElement('div');
    list.className = 'sort-list';
    group.appendChild(list);
    chatThread.appendChild(group);

    // Shuffle items
    var shuffled = items.map(function(item, i) { return { emoji: item.emoji, content: item.content, correctIndex: item.correctIndex }; });
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }

    // Ensure shuffled order !== correct order
    var isCorrect = shuffled.every(function(s, i) { return s.correctIndex === i; });
    if (isCorrect && shuffled.length > 1) {
      var t = shuffled[0]; shuffled[0] = shuffled[1]; shuffled[1] = t;
    }

    var dragHandleSVG = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="8" cy="4" r="2"/><circle cx="16" cy="4" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="16" cy="12" r="2"/><circle cx="8" cy="20" r="2"/><circle cx="16" cy="20" r="2"/></svg>';

    function buildTiles() {
      list.innerHTML = '';
      shuffled.forEach(function(item, i) {
        var tile = document.createElement('div');
        tile.className = 'tile tile-sortable';
        tile.dataset.correctIndex = item.correctIndex;
        tile.innerHTML =
          '<div class="sort-number">' + (i + 1) + '</div>' +
          (item.emoji ? '<span class="tile-leading tile-leading-icon">' + item.emoji + '</span>' : '') +
          '<span class="tile-content tile-label">' + item.content + '</span>' +
          '<div class="tile-drag-handle">' + dragHandleSVG + '</div>';
        list.appendChild(tile);
      });
    }

    buildTiles();
    scrollThread();

    // Confirm bar
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm';
    confirmBtn.textContent = 'Check';
    confirmBar.appendChild(confirmBtn);
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);

    // ── Drag and drop ──
    var dragTile = null;
    var dragStartY = 0;
    var dragStartIndex = 0;
    var placeholder = null;
    var tileHeight = 0;

    function getTileIndex(tile) {
      return Array.prototype.indexOf.call(list.children, tile);
    }

    function onPointerDown(e) {
      var tile = e.target.closest('.tile.tile-sortable');
      if (!tile || tile.classList.contains('success') || tile.classList.contains('warning')) return;

      dragTile = tile;
      dragStartY = e.clientY || e.touches[0].clientY;
      dragStartIndex = getTileIndex(tile);
      tileHeight = tile.offsetHeight + 8; // tile height + gap

      // Create placeholder
      placeholder = document.createElement('div');
      placeholder.className = 'sort-placeholder';
      placeholder.style.height = tile.offsetHeight + 'px';

      // Make tile absolute for dragging
      var rect = tile.getBoundingClientRect();
      var listRect = list.getBoundingClientRect();
      tile.style.position = 'absolute';
      tile.style.width = rect.width + 'px';
      tile.style.left = '0';
      tile.style.top = (rect.top - listRect.top) + 'px';
      tile.classList.add('dragging');

      // Insert placeholder
      list.insertBefore(placeholder, tile.nextSibling);

      e.preventDefault();
    }

    function onPointerMove(e) {
      if (!dragTile) return;
      var clientY = e.clientY || (e.touches && e.touches[0].clientY);
      if (!clientY) return;
      var dy = clientY - dragStartY;
      var listRect = list.getBoundingClientRect();
      var tileRect = dragTile.getBoundingClientRect();

      // Move the dragged tile
      var origTop = (dragStartIndex * tileHeight);
      dragTile.style.top = (origTop + dy) + 'px';

      // Find which slot the tile center is over
      var centerY = tileRect.top + tileRect.height / 2 - listRect.top;
      var targetIndex = Math.max(0, Math.min(shuffled.length - 1, Math.round(centerY / tileHeight)));

      // Move placeholder
      var children = Array.from(list.children).filter(function(c) { return c !== dragTile; });
      if (targetIndex < children.length) {
        list.insertBefore(placeholder, children[targetIndex]);
      } else {
        list.appendChild(placeholder);
      }

      e.preventDefault();
    }

    function onPointerUp(e) {
      if (!dragTile) return;

      // Get new index from placeholder position
      var children = Array.from(list.children).filter(function(c) { return c !== dragTile; });
      var newIndex = children.indexOf(placeholder);

      // Remove placeholder and reset tile style
      if (placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
      dragTile.style.position = '';
      dragTile.style.width = '';
      dragTile.style.left = '';
      dragTile.style.top = '';
      dragTile.classList.remove('dragging');

      // Reorder in data
      var item = shuffled.splice(dragStartIndex, 1)[0];
      shuffled.splice(newIndex, 0, item);

      dragTile = null;
      placeholder = null;

      // Rebuild tiles with new order
      buildTiles();
      setupDragListeners();
    }

    function setupDragListeners() {
      list.querySelectorAll('.tile.tile-sortable').forEach(function(tile) {
        tile.addEventListener('pointerdown', onPointerDown);
      });
    }

    list.addEventListener('pointermove', onPointerMove);
    list.addEventListener('pointerup', onPointerUp);
    list.addEventListener('pointercancel', onPointerUp);
    // Touch events for mobile
    list.addEventListener('touchmove', function(e) {
      if (dragTile) e.preventDefault();
    }, { passive: false });

    setupDragListeners();

    // ── Check button ──
    confirmBtn.addEventListener('click', function() {
      // Validate order
      var allCorrect = true;
      var tiles = list.querySelectorAll('.tile.tile-sortable');
      tiles.forEach(function(tile, i) {
        var correct = parseInt(tile.dataset.correctIndex) === i;
        if (correct) {
          tile.classList.add('success');
        } else {
          allCorrect = false;
          tile.classList.add('warning-static');
        }
      });

      if (allCorrect) {
        // All correct — dismiss after delay
        confirmBtn.textContent = 'Correct!';
        setTimeout(function() {
          group.classList.add('dismissed');
          confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
          confirmBar.style.opacity = '0';
          confirmBar.style.transform = 'translateY(8px)';
          setTimeout(function() {
            confirmBar.remove();
            group.remove();
            showComposer();
            if (onComplete) onComplete();
          }, 350);
        }, 800);
      } else {
        // Some wrong — flash warning then return to default for retry
        setTimeout(function() {
          tiles.forEach(function(tile) {
            tile.classList.remove('success', 'warning-static');
          });
          setupDragListeners();
        }, 500);
      }
    });
  }

  // ── Image Quiz (pick the correct image from a grid) ──
  function addImageQuiz(question, options, correctIndex, onComplete) {
    var group = document.createElement('div');
    group.className = 'image-quiz-group';

    var grid = document.createElement('div');
    grid.className = 'image-quiz-grid';
    group.appendChild(grid);

    options.forEach(function(opt, i) {
      var tile = document.createElement('div');
      tile.className = 'image-quiz-tile';
      tile.dataset.index = i;
      tile.innerHTML =
        '<span class="quiz-image">' + opt.emoji + '</span>' +
        '<span class="quiz-label">' + opt.label + '</span>';
      tile.style.animation = 'tileSlideIn 0.3s ease both';
      tile.style.animationDelay = (i * 0.08) + 's';
      grid.appendChild(tile);
    });

    chatThread.appendChild(group);
    scrollThread();

    grid.addEventListener('click', function(e) {
      var tile = e.target.closest('.image-quiz-tile');
      if (!tile) return;
      var idx = parseInt(tile.dataset.index);
      var isCorrect = idx === correctIndex;

      // Disable all tiles
      grid.querySelectorAll('.image-quiz-tile').forEach(function(t) {
        if (t === tile) {
          t.classList.add(isCorrect ? 'success' : 'error');
        } else if (parseInt(t.dataset.index) === correctIndex) {
          // Show correct answer if kid got it wrong
          if (!isCorrect) t.classList.add('success');
          else t.classList.add('disabled');
        } else {
          t.classList.add('disabled');
        }
      });

      setTimeout(function() {
        group.classList.add('dismissed');
        setTimeout(function() {
          group.remove();
          if (onComplete) onComplete(isCorrect, options[idx].label);
        }, 350);
      }, 1200);
    });
  }

  // ── Fill in the Blank ──
  // sentenceParts: array of text segments (N+1 for N blanks)
  // blankAnswers: string (single blank) or array of strings (multi-blank)
  // options: array of word strings
  function addFillBlank(sentenceParts, blankAnswers, options, onComplete) {
    if (typeof blankAnswers === 'string') blankAnswers = [blankAnswers];

    var group = document.createElement('div');
    group.className = 'fill-blank-group';

    // Sentence card with inline text + gap slots
    var sentence = document.createElement('div');
    sentence.className = 'fill-blank-sentence';
    var row = document.createElement('div');
    row.className = 'fill-blank-row';

    var gaps = [];
    sentenceParts.forEach(function(part, i) {
      if (part) {
        var textSpan = document.createElement('span');
        textSpan.className = 'fill-blank-text';
        textSpan.textContent = part;
        row.appendChild(textSpan);
      }
      if (i < sentenceParts.length - 1) {
        var gap = document.createElement('div');
        gap.className = 'fill-blank-gap' + (i === 0 ? ' active' : '');
        gap.dataset.index = i;
        var gapText = document.createElement('p');
        gapText.className = 'fill-blank-gap-text';
        gapText.textContent = '\u00A0';
        gap.appendChild(gapText);
        var line = document.createElement('div');
        line.className = 'fill-blank-gap-line';
        gap.appendChild(line);
        row.appendChild(gap);
        gaps.push(gap);
      }
    });

    sentence.appendChild(row);

    // Option tiles (inside sentence card)
    var optionsRow = document.createElement('div');
    optionsRow.className = 'fill-blank-options';

    var shuffled = options.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }

    shuffled.forEach(function(opt, i) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.value = opt;
      tile.innerHTML = '<div class="tile-content"><span class="tile-label">' + opt + '</span></div>';
      tile.style.animation = 'tileSlideIn 0.3s ease both';
      tile.style.animationDelay = (i * 0.05) + 's';
      optionsRow.appendChild(tile);
    });

    sentence.appendChild(optionsRow);
    group.appendChild(sentence);
    chatThread.appendChild(group);
    scrollThread();

    // Hide composer, show Check in confirm bar
    hideComposer();
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm state-disabled';
    confirmBtn.textContent = 'Check';
    confirmBar.appendChild(confirmBtn);
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);

    // Track which option tile is placed in which gap
    var placements = [];
    var currentGapIndex = 0;

    function updateCheckState() {
      var allFilled = gaps.every(function(g) { return g.classList.contains('filled'); });
      if (allFilled) {
        confirmBtn.classList.remove('state-disabled');
      } else {
        confirmBtn.classList.add('state-disabled');
      }
    }

    // Tap option → place in next empty gap (no validation)
    optionsRow.addEventListener('click', function(e) {
      var tile = e.target.closest('.tile');
      if (!tile || tile.classList.contains('placed') || tile.classList.contains('used') || tile.classList.contains('success')) return;
      if (currentGapIndex >= gaps.length) return;

      var value = tile.dataset.value;
      var gap = gaps[currentGapIndex];
      var gapText = gap.querySelector('.fill-blank-gap-text');

      gapText.textContent = value;
      gap.classList.add('filled');
      gap.classList.remove('active');
      tile.classList.add('placed');
      placements.push({ gapIndex: currentGapIndex, tile: tile, value: value });
      currentGapIndex++;

      if (currentGapIndex < gaps.length) {
        gaps[currentGapIndex].classList.add('active');
      }
      updateCheckState();
    });

    // Tap Check → validate all gaps
    confirmBtn.addEventListener('click', function() {
      if (confirmBtn.classList.contains('state-disabled')) return;

      var allCorrect = true;
      placements.forEach(function(p) {
        var gap = gaps[p.gapIndex];
        var isCorrect = p.value === blankAnswers[p.gapIndex];
        if (isCorrect) {
          gap.classList.add('correct');
          p.tile.classList.remove('placed');
          p.tile.classList.add('success');
        } else {
          allCorrect = false;
          gap.classList.add('wrong');
          p.tile.classList.add('error');
        }
      });

      confirmBtn.classList.add('state-disabled');

      if (allCorrect) {
        optionsRow.querySelectorAll('.tile:not(.success)').forEach(function(t) {
          t.classList.add('used');
        });
        confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
        confirmBar.style.opacity = '0';
        confirmBar.style.transform = 'translateY(8px)';
        setTimeout(function() {
          confirmBar.remove();
          group.classList.add('dismissed');
          setTimeout(function() {
            group.remove();
            showComposer();
            if (onComplete) onComplete(true);
          }, 350);
        }, 1000);
      } else {
        // Reset wrong gaps after delay
        setTimeout(function() {
          placements = placements.filter(function(p) {
            var gap = gaps[p.gapIndex];
            if (gap.classList.contains('wrong')) {
              var gapText = gap.querySelector('.fill-blank-gap-text');
              gapText.textContent = '\u00A0';
              gap.classList.remove('filled', 'wrong');
              p.tile.classList.remove('placed', 'error');
              p.tile.classList.add('used');
              return false;
            }
            return true;
          });
          // Find first empty gap for next placement
          currentGapIndex = 0;
          for (var i = 0; i < gaps.length; i++) {
            if (!gaps[i].classList.contains('filled')) {
              currentGapIndex = i;
              gaps[i].classList.add('active');
              break;
            }
          }
          updateCheckState();
        }, 800);
      }
    });
  }

  // ══════════════════════════════════════════
  // CONVERSATION SCRIPT
  // ══════════════════════════════════════════

  // Step 1: Sprout greeting + multi-select activity tiles
  setTimeout(function() {
    addIncoming("Hey there! What did you get up to today? Pick all that apply!", function() {
      addTileGroupMulti([
        { emoji: '📚', label: 'School', desc: 'Classes, homework, projects' },
        { emoji: '⚽', label: 'Sports', desc: 'Practice, games, exercise' },
        { emoji: '🎨', label: 'Art & Drawing' },
        { emoji: '🎵', label: 'Music' }
      ], 'Done', function(selected) {
        // Step 2: Kid's selections become a message
        var msg = selected.length === 1
          ? "I did " + selected[0].toLowerCase() + " today!"
          : "I did " + selected.slice(0, -1).join(', ').toLowerCase() + " and " + selected[selected.length - 1].toLowerCase() + " today!";
        addOutgoing(msg);

        // Step 3: Sprout follow-up + action tiles
        addIncoming("That's awesome! Want to tell me more about it?", function() {
          addTileGroup([
            { emoji: '📷', label: 'Show a photo' },
            { emoji: '✍️', label: 'Describe it to me' },
            { emoji: '🎙️', label: 'Tell me by voice' }
          ], function(action) {
            addOutgoing(action.label + "!");

            // Step 4: Matching pairs
            addIncoming("Let's play a matching game! Can you match each animal to its sound?", function() {
              addMatchingPairs([
                { left: { emoji: '🐶', content: 'Dog' },    right: { content: 'Woof!' } },
                { left: { emoji: '🐱', content: 'Cat' },    right: { content: 'Meow!' } },
                { left: { emoji: '🐮', content: 'Cow' },    right: { content: 'Moo!' } },
                { left: { emoji: '🐸', content: 'Frog' },   right: { content: 'Ribbit!' } }
              ], function() {
                addOutgoing("I matched them all!");

                // Step 5: Sorting exercise
                addIncoming("Now put these in order from smallest to biggest!", function() {
                  addSortExercise([
                    { emoji: '🐜', content: 'Ant',      correctIndex: 0 },
                    { emoji: '🐇', content: 'Rabbit',   correctIndex: 1 },
                    { emoji: '🐕', content: 'Dog',      correctIndex: 2 },
                    { emoji: '🐘', content: 'Elephant', correctIndex: 3 }
                  ], function() {
                    addOutgoing("I sorted them all!");

                    // Step 6: Image Quiz
                    addIncoming("Quick quiz! Which one of these is a fruit?", function() {
                      addImageQuiz("Which is a fruit?", [
                        { emoji: '🥕', label: 'Carrot' },
                        { emoji: '🍎', label: 'Apple' },
                        { emoji: '🥦', label: 'Broccoli' },
                        { emoji: '🌽', label: 'Corn' }
                      ], 1, function(correct, picked) {
                        addOutgoing(correct ? "Apple!" : picked + "... wait, that's not right");
                        addIncoming(correct ? "That's right! Apples are delicious!" : "Not quite! The apple is the fruit. Let's try another one!", function() {

                          // Step 7: Fill in the Blank (2 blanks)
                          addIncoming("Can you fill in the blanks?", function() {
                            addFillBlank(
                              ["The ", " swims in the ", "."],
                              ["fish", "water"],
                              ["fish", "water", "sky", "tree"],
                              function(correct) {
                                addOutgoing("The fish swims in the water!");
                                addIncoming("That's it! You're so smart!");
                              }
                            );
                          });
                        });
                      });
                    });
                  });
                });
              });
            });
          });
        });
      });
    });
  }, 600);

  // ── Composer: free text input ──
  composerInput.addEventListener('input', function() {
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 178) + 'px';
    var hasText = composerInput.value.trim().length > 0;
    btnSend.classList.toggle('visible', hasText);
    btnMic.classList.toggle('hidden', hasText);
  });

  btnSend.addEventListener('click', function() {
    var text = composerInput.value.trim();
    if (!text) return;

    // Dismiss any visible single-select tile groups (suggestions)
    chatThread.querySelectorAll('.tile-group:not(.dismissed)').forEach(function(g) {
      // Only dismiss groups without a confirm button (single-select = suggestions)
      if (!g.querySelector('.tile-group-confirm')) {
        g.classList.add('dismissed');
        setTimeout(function() { g.remove(); }, 350);
      }
    });

    addOutgoing(text);
    composerInput.value = '';
    composerInput.style.height = 'auto';
    btnSend.classList.remove('visible');
    btnMic.classList.remove('hidden');
    // Generic Sprout reply
    addIncoming("That's really interesting! Tell me more about that.");
  });
})();
</script>
