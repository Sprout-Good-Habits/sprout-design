<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer — Chat</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<style>
/* ── Device frame (from shared styles.css) ── */
.device-wrapper {
  background: var(--bg-primary, #ffffff);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 32px;
  padding: 4px;
  box-shadow:
    0 12px 16px -4px rgba(10,13,18,0.08),
    0 4px 6px -2px rgba(10,13,18,0.03),
    0 2px 2px -1px rgba(10,13,18,0.04);
}
.device-inner-shadow {
  background: var(--bg-primary, #ffffff);
  border-radius: 28px;
  padding: 4px;
  overflow: hidden;
  position: relative;
}
.device-inner-shadow::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 0 6px 2px rgba(10,13,18,0.08),
    inset 0 0 4px 2px rgba(10,13,18,0.03);
  z-index: 6;
}
.device-mockup {
  background: var(--bg-tertiary, #fafafa);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  clip-path: inset(0 round 24px);
  position: relative;
}
.device-screen {
  width: 402px;
  height: 874px;
  position: relative;
  overflow: hidden;
  background: var(--bg-sky, #e0f2fe);
  user-select: none;
  -webkit-user-select: none;
}
.viewer {
  display: flex;
  justify-content: center;
  margin-top: var(--spacing-3xl, 24px);
}

/* ── Controls row + device toggle ── */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin-bottom: var(--spacing-xl, 16px);
}
.device-toggle {
  display: flex;
  gap: var(--spacing-xs, 4px);
  padding: var(--spacing-xs, 4px);
  background: var(--bg-secondary, #fafafa);
  border: 1px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-lg, 10px);
}
.device-btn {
  display: flex;
  align-items: center;
  gap: var(--spacing-md, 8px);
  padding: var(--spacing-md, 8px) var(--spacing-lg, 12px);
  height: 36px;
  border-radius: var(--radius-sm, 6px);
  border: none;
  background: transparent;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-quaternary, #717680);
  cursor: pointer;
  transition: all 0.15s;
}
.device-btn:hover { color: var(--text-tertiary, #535862); }
.device-btn.active {
  background: var(--bg-primary, #fff);
  color: var(--text-secondary, #414651);
  box-shadow: 0 1px 3px 0 rgba(10,13,18,0.1), 0 1px 2px -1px rgba(10,13,18,0.1);
}
.device-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.device-btn .device-icon { stroke: var(--text-quaternary, #717680); transition: stroke 0.15s; }
.device-btn.active .device-icon { stroke: var(--text-secondary, #414651); }

/* ── iPad overrides ── */
.device-wrapper.ipad .device-screen {
  width: 640px;
  height: 854px;
}

/* ── Status bar ── */
.status-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 62px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 var(--spacing-3xl, 24px) var(--spacing-md, 8px);
  z-index: 10;
  pointer-events: none;
}
.status-bar-time {
  font-size: 17px;
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  letter-spacing: -0.01em;
}
.status-bar-icons {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-bar-icons svg { display: block; }

/* ── Grass + character area ── */
.bg-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1;
  pointer-events: none;
}
.bg-grass-edge {
  display: block;
  width: 100%;
  height: 24px;
  border-radius: 24px 24px 0 0;
  background: var(--bg-grass, #86cb3c);
}
.bg-grass-fill {
  width: 100%;
  height: 89px;
  background: var(--bg-grass, #86cb3c);
}

/* ── Home indicator ── */
.home-indicator {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  border-radius: 100px;
  background: var(--text-primary, #181d27);
  z-index: 20;
}

/* ── Composer area (pinned to bottom) ── */
.composer-area {
  position: absolute;
  bottom: 34px;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  gap: 12px;
  padding: 0 var(--spacing-xl, 16px);
  transition: padding 0.2s;
}

/* ── Plus / Close button ── */
.btn-attach {
  width: 48px;
  height: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-full, 9999px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  cursor: pointer;
  padding: 0;
  transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
}
.btn-attach:hover { background: var(--gray-50, #fafafa); }
.btn-attach:active { box-shadow: none; transform: translateY(2px); }
.btn-attach svg {
  width: 24px;
  height: 24px;
  color: var(--text-primary, #181d27);
}

/* ── Composer input bubble ── */
.composer {
  flex: 1;
  min-width: 0;
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: var(--spacing-xs, 4px);
  transition: max-height 0.25s ease;
}

/* ── Media row ── */
.media-row {
  display: none;
  gap: 8px;
  padding: var(--spacing-xs, 4px) var(--spacing-lg, 12px) 0;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.media-row::-webkit-scrollbar { display: none; }
.media-row.visible { display: flex; }

.media-card {
  position: relative;
  width: 120px;
  height: 120px;
  flex-shrink: 0;
  border-radius: 20px;
  overflow: hidden;
}
.media-card-image {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--brand-100, #b2ddff) 0%, var(--brand-200, #7cc4fa) 100%);
  border-radius: 20px;
}
.media-remove {
  position: absolute;
  top: var(--spacing-md, 8px);
  right: var(--spacing-md, 8px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-tertiary, #f5f5f5);
  border-radius: var(--radius-full, 9999px);
  border: none;
  cursor: pointer;
  padding: var(--spacing-md, 8px);
  transition: transform 0.15s, opacity 0.15s;
}
.media-remove:active {
  transform: scale(0.9);
  opacity: 0.85;
}
.media-remove svg {
  width: 20px;
  height: 20px;
  color: var(--text-secondary, #414651);
}
/* ── Media loading overlay ── */
.media-card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.2);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* ── Design system spinner ── */
.spinner-circle {
  display: inline-block;
  flex-shrink: 0;
  animation: spinner-rotate 0.8s linear infinite;
}
@keyframes spinner-rotate { to { transform: rotate(360deg); } }
.spinner-sm { width: 20px; height: 20px; }

/* ── Input row ── */
.input-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 var(--spacing-xxs, 2px) 0 var(--spacing-md, 8px);
  min-height: 36px;
}
.input-row.align-end { align-items: flex-end; }
.input-row.input-row-audio {
  padding: 0 var(--spacing-xxs, 2px) 0 var(--spacing-sm, 6px);
}

.composer-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  line-height: var(--line-height-text-md, 24px);
  color: var(--text-secondary, #414651);
  resize: none;
  min-height: 24px;
  max-height: 178px;
  padding: var(--spacing-xs, 4px) 0;
  overflow-y: auto;
}
.composer-input::placeholder {
  color: var(--text-placeholder-subtle, #d5d7da);
}

/* ── Mic button ── */
.btn-mic {
  padding: var(--spacing-sm, 6px);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full, 9999px);
}
.btn-mic svg {
  width: 20px;
  height: 20px;
  color: var(--text-quaternary, #717680);
}

/* ── Send button ── */
.btn-send {
  flex-shrink: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--fg-brand-primary, #0ba5ec);
  border: none;
  border-radius: var(--radius-full, 9999px);
  cursor: pointer;
  padding: var(--spacing-md, 8px);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-send.visible { display: flex; }
.btn-send:active { transform: scale(0.9); opacity: 0.85; }
.btn-send svg {
  width: 20px;
  height: 20px;
  color: white;
}

/* ── Stop button ── */
.btn-stop {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--red-200, #fecdca);
  border: none;
  border-radius: var(--radius-full, 9999px);
  cursor: pointer;
  padding: var(--spacing-md, 8px);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-stop:active { transform: scale(0.9); opacity: 0.85; }
.btn-stop svg {
  width: 20px;
  height: 20px;
  color: var(--red-600, #d92d20);
}

/* ── Play button (send audio) ── */
.btn-play {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gray-200, #e9eaeb);
  border: none;
  border-radius: var(--radius-full, 9999px);
  cursor: pointer;
  padding: var(--spacing-sm, 6px);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-play:active { transform: scale(0.9); opacity: 0.85; }
.btn-play svg {
  width: 20px;
  height: 20px;
  color: var(--text-primary, #181d27);
}

/* ── Waveform ── */
.waveform {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  height: 24px;
  overflow: hidden;
}
.waveform-bar {
  width: 2px;
  border-radius: 1px;
  transition: height 0.15s ease;
}
.waveform-bar.active {
  background: var(--fg-secondary, #414651);
}
.waveform-bar.inactive {
  background: var(--fg-quaternary, #a4a7ae);
}

/* Animate bars during listening */
@keyframes waveformPulse {
  0%, 100% { transform: scaleY(0.3); }
  50% { transform: scaleY(1); }
}
.waveform.listening .waveform-bar {
  animation: waveformPulse 0.6s ease-in-out infinite;
  background: var(--fg-secondary, #414651);
  pointer-events: none;
}

/* Ensure stop button is clickable above waveform */
.btn-stop, .btn-play, .btn-send {
  position: relative;
  z-index: 1;
}

/* ── Transcribing state ── */
.transcribing-row {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs, 4px);
  flex: 1;
  padding: var(--spacing-xs, 4px) 0;
}
.transcribing-label {
  font-size: var(--font-size-text-md, 16px);
  color: var(--text-placeholder, #717680);
  line-height: var(--line-height-text-md, 24px);
}

/* Transcribing spinner uses .spinner-circle + .spinner-sm from design system */

/* ── Attachment sheet ── */
.sheet-scrim {
  position: absolute;
  inset: 0;
  background: rgba(10,13,18,0.2);
  z-index: 15;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.sheet-scrim.visible {
  opacity: 1;
  pointer-events: auto;
}

.sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-primary, #ffffff);
  border-radius: var(--radius-4xl, 24px) var(--radius-4xl, 24px) 0 0;
  z-index: 16;
  transform: translateY(100%);
  transition: transform 0.3s ease-out;
  padding-bottom: 34px;
}
.sheet.visible {
  transform: translateY(0);
}
.sheet-header {
  padding: var(--spacing-xl, 16px) var(--spacing-xl, 16px) 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.sheet-handle {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: var(--gray-300, #d5d7da);
  margin-bottom: var(--spacing-xl, 16px);
}
.sheet-title-row {
  display: flex;
  align-items: center;
  width: 100%;
  gap: var(--spacing-md, 8px);
}
.sheet-title {
  flex: 1;
  font-size: var(--font-size-text-md, 16px);
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  line-height: var(--line-height-text-md, 24px);
}
.sheet-close {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: var(--radius-full, 9999px);
  padding: 0;
}
.sheet-close:hover { background: var(--gray-50, #fafafa); }
.sheet-close svg {
  width: 24px;
  height: 24px;
  color: var(--text-secondary, #414651);
}

.sheet-actions {
  display: flex;
  gap: var(--spacing-md, 8px);
  padding: var(--spacing-xs, 4px) var(--spacing-lg, 12px) var(--spacing-lg, 12px);
}
.action-tile {
  flex: 1;
  height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-md, 8px);
  background: var(--bg-secondary, #fafafa);
  border: 1px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-xl, 12px);
  cursor: pointer;
  transition: background 0.15s;
}
.action-tile:hover { background: var(--gray-100, #f0f1f1); }
.action-tile-icon {
  font-family: 'TossFace', sans-serif;
  font-size: 36px;
  line-height: 1;
}
.action-tile-label {
  font-size: var(--font-size-text-sm, 14px);
  font-weight: var(--font-weight-medium, 500);
  color: var(--text-secondary, #414651);
  line-height: var(--line-height-text-sm, 20px);
}

/* ── State visibility helpers ── */
.hidden { display: none !important; }

/* ── State label (for demo) ── */
.state-indicator {
  position: absolute;
  top: 68px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 12px;
  font-weight: var(--font-weight-medium, 500);
  padding: 4px 12px;
  border-radius: var(--radius-full, 9999px);
  z-index: 12;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.state-indicator.visible { opacity: 1; }

</style>
</head>

<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="content-area">
    <div class="page-content">
      <div class="breadcrumb" id="breadcrumb"></div>

      <div class="page-header">
        <div class="page-header-text">
          <div class="sec-title">Chat</div>
          <div class="sec-desc">Interactive prototype of the message composer. Try typing, recording audio, and adding attachments.</div>
        </div>
      </div>

      <div class="controls-row">
        <div class="device-toggle">
          <button class="device-btn" data-device="ipad"><svg viewBox="0 0 18 22" fill="none"><path class="device-icon" d="M9 16.5H9.01M4.2 21H13.8C14.9201 21 15.4802 21 15.908 20.782C16.2843 20.5903 16.5903 20.2843 16.782 19.908C17 19.4802 17 18.9201 17 17.8V4.2C17 3.0799 17 2.51984 16.782 2.09202C16.5903 1.7157 16.2843 1.40974 15.908 1.21799C15.4802 1 14.9201 1 13.8 1H4.2C3.0799 1 2.51984 1 2.09202 1.21799C1.7157 1.40974 1.40974 1.7157 1.21799 2.09202C1 2.51984 1 3.0799 1 4.2V17.8C1 18.9201 1 19.4802 1.21799 19.908C1.40974 20.2843 1.7157 20.5903 2.09202 20.782C2.51984 21 3.0799 21 4.2 21ZM9.5 16.5C9.5 16.7761 9.27614 17 9 17C8.72386 17 8.5 16.7761 8.5 16.5C8.5 16.2239 8.72386 16 9 16C9.27614 16 9.5 16.2239 9.5 16.5Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Tablet</button>
          <button class="device-btn active" data-device="iphone"><svg viewBox="0 0 16 22" fill="none"><path class="device-icon" d="M8 16.5H8.01M4.2 21H11.8C12.9201 21 13.4802 21 13.908 20.782C14.2843 20.5903 14.5903 20.2843 14.782 19.908C15 19.4802 15 18.9201 15 17.8V4.2C15 3.0799 15 2.51984 14.782 2.09202C14.5903 1.7157 14.2843 1.40974 13.908 1.21799C13.4802 1 12.9201 1 11.8 1H4.2C3.0799 1 2.51984 1 2.09202 1.21799C1.7157 1.40974 1.40974 1.7157 1.21799 2.09202C1 2.51984 1 3.0799 1 4.2V17.8C1 18.9201 1 19.4802 1.21799 19.908C1.40974 20.2843 1.7157 20.5903 2.09202 20.782C2.51984 21 3.0799 21 4.2 21ZM8.5 16.5C8.5 16.7761 8.27614 17 8 17C7.72386 17 7.5 16.7761 7.5 16.5C7.5 16.2239 7.72386 16 8 16C8.27614 16 8.5 16.2239 8.5 16.5Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Phone</button>
        </div>
      </div>

      <div class="viewer">
        <div class="device-wrapper">
          <div class="device-inner-shadow">
            <div class="device-mockup">
              <div class="device-screen" id="phone">

        <!-- Status bar -->
        <div class="status-bar">
          <span class="status-bar-time">9:41</span>
          <span class="status-bar-icons">

            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 3.6C9.7 3.6 11.2 4.3 12.3 5.4L14 3.7C12.4 2.1 10.3 1.1 8 1.1C5.7 1.1 3.6 2.1 2 3.7L3.7 5.4C4.8 4.3 6.3 3.6 8 3.6Z" fill="#181d27"/><path d="M8 7.1C9 7.1 9.9 7.5 10.6 8.1L12.3 6.4C11.1 5.3 9.6 4.6 8 4.6C6.4 4.6 4.9 5.3 3.7 6.4L5.4 8.1C6.1 7.5 7 7.1 8 7.1Z" fill="#181d27"/><circle cx="8" cy="10.5" r="1.5" fill="#181d27"/></svg>
            <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#181d27" stroke-opacity="0.35"/><rect x="2" y="2" width="19" height="9" rx="2" fill="#181d27"/><path d="M24 5v3a2 2 0 0 0 0-3z" fill="#181d27" fill-opacity="0.4"/></svg>
          </span>
        </div>

        <!-- State indicator -->
        <div class="state-indicator" id="stateLabel"></div>

        <!-- Character peeking from bottom -->
        <div class="bg-bottom">
          <div class="bg-grass-edge"></div>
          <div class="bg-grass-fill"></div>
        </div>

        <!-- Composer -->
        <div class="composer-area" id="composerArea">
          <!-- Plus / X button -->
          <button class="btn-attach" id="btnAttach" aria-label="Add attachment">
            <svg id="iconPlus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

          </button>

          <!-- Composer bubble -->
          <div class="composer" id="composer">
            <!-- Media attachments row -->
            <div class="media-row" id="mediaRow"></div>

            <!-- Default input row (placeholder, typing, single/multi line) -->
            <div class="input-row" id="inputRowDefault">
              <textarea class="composer-input" id="composerInput" rows="1" placeholder="Talk to Sprout..."></textarea>
              <button class="btn-mic" id="btnMic" aria-label="Record voice message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="21" x2="12" y2="17"/></svg>
              </button>
              <button class="btn-send" id="btnSend" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              </button>
            </div>

            <!-- Listening row -->
            <div class="input-row hidden" id="inputRowListening">
              <div class="waveform listening" id="waveform"></div>
              <button class="btn-stop" id="btnStop" aria-label="Stop recording">
                <svg viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
              </button>
            </div>

            <!-- Send audio row -->
            <div class="input-row input-row-audio hidden" id="inputRowAudio">
              <button class="btn-play" id="btnPlay" aria-label="Play recording">
                <svg id="iconPlay" viewBox="0 0 24 24" fill="none"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86a1 1 0 0 0-1.5.86z" fill="currentColor"/></svg>
                <svg id="iconPause" class="hidden" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/></svg>
              </button>
              <div class="waveform" id="waveformStatic"></div>
              <button class="btn-send visible" id="btnSendAudio" aria-label="Send audio">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              </button>
            </div>

            <!-- Transcribing row -->
            <div class="input-row hidden" id="inputRowTranscribing">
              <div class="transcribing-row">
                <svg class="spinner-circle spinner-sm" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="var(--border-primary, #d5d7da)" stroke-width="2" stroke-linecap="round"/><path d="M10 2a8 8 0 0 1 8 8" stroke="var(--fg-brand-primary, #0ba5ec)" stroke-width="2" stroke-linecap="round"/></svg>
                <span class="transcribing-label">Transcribing</span>
              </div>
              <button class="btn-send visible" id="btnSendTranscribing" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Attachment sheet -->
        <div class="sheet-scrim" id="sheetScrim"></div>
        <div class="sheet" id="sheet">
          <div class="sheet-header">
            <div class="sheet-handle"></div>
            <div class="sheet-title-row">
              <span class="sheet-title">Sprout</span>
              <button class="sheet-close" id="sheetClose" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
          <div class="sheet-actions">
            <div class="action-tile" id="tileCamera">
              <span class="action-tile-icon">&#x1F4F7;</span>
              <span class="action-tile-label">Camera</span>
            </div>
            <div class="action-tile" id="tilePhotos">
              <span class="action-tile-icon">&#x1F5BC;</span>
              <span class="action-tile-label">Photos</span>
            </div>
          </div>
        </div>

        <!-- Home indicator -->
        <div class="home-indicator"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── State machine ──
  var State = {
    PLACEHOLDER: 'placeholder',
    TYPING: 'typing',
    LISTENING: 'listening',
    TRANSCRIBING: 'transcribing',
    SEND_AUDIO: 'send_audio',
    SHEET_OPEN: 'sheet_open'
  };

  var currentState = State.PLACEHOLDER;
  var prevState = null;
  var mediaItems = [];
  var transcribeTimer = null;

  // ── DOM refs ──
  var composerInput = document.getElementById('composerInput');
  var btnAttach = document.getElementById('btnAttach');
  var iconPlus = document.getElementById('iconPlus');
  var iconClose = document.getElementById('iconClose');
  var btnMic = document.getElementById('btnMic');
  var btnSend = document.getElementById('btnSend');
  var btnStop = document.getElementById('btnStop');
  var btnPlay = document.getElementById('btnPlay');
  var btnSendAudio = document.getElementById('btnSendAudio');
  var btnSendTranscribing = document.getElementById('btnSendTranscribing');
  var inputRowDefault = document.getElementById('inputRowDefault');
  var inputRowListening = document.getElementById('inputRowListening');
  var inputRowAudio = document.getElementById('inputRowAudio');
  var inputRowTranscribing = document.getElementById('inputRowTranscribing');
  var mediaRow = document.getElementById('mediaRow');
  var waveform = document.getElementById('waveform');
  var waveformStatic = document.getElementById('waveformStatic');
  var sheetScrim = document.getElementById('sheetScrim');
  var sheet = document.getElementById('sheet');
  var sheetClose = document.getElementById('sheetClose');
  var tileCamera = document.getElementById('tileCamera');
  var tilePhotos = document.getElementById('tilePhotos');
  var stateLabel = document.getElementById('stateLabel');
  var composer = document.getElementById('composer');

  // ── Build waveform bars ──
  function buildWaveformBars(container, count, animated) {
    container.innerHTML = '';
    for (var i = 0; i < count; i++) {
      var bar = document.createElement('div');
      bar.className = 'waveform-bar ' + (i < count * 0.6 ? 'active' : 'inactive');
      var h = 4 + Math.floor(Math.random() * 20);
      bar.style.height = h + 'px';
      if (animated) {
        bar.style.animationDelay = (i * 0.04) + 's';
      }
      container.appendChild(bar);
    }
  }

  buildWaveformBars(waveform, 77, true);
  buildWaveformBars(waveformStatic, 54, false);

  // ── State label ──
  var labelTimer = null;
  function showStateLabel(text) {
    stateLabel.textContent = text;
    stateLabel.classList.add('visible');
    clearTimeout(labelTimer);
    labelTimer = setTimeout(function() {
      stateLabel.classList.remove('visible');
    }, 1500);
  }

  // ── Show/hide rows ──
  function showRow(row) {
    inputRowDefault.classList.add('hidden');
    inputRowListening.classList.add('hidden');
    inputRowAudio.classList.add('hidden');
    inputRowTranscribing.classList.add('hidden');
    row.classList.remove('hidden');
  }

  // ── Update attach button icon ──
  function setAttachIcon(isClose) {
    iconPlus.classList.toggle('hidden', isClose);
    iconClose.classList.toggle('hidden', !isClose);
  }

  // ── Auto-resize textarea ──
  function autoResize() {
    composerInput.style.height = 'auto';
    composerInput.style.height = Math.min(composerInput.scrollHeight, 178) + 'px';
    // Toggle multiline alignment
    var isMulti = composerInput.scrollHeight > 40;
    inputRowDefault.classList.toggle('align-end', isMulti);
  }

  // ── Update send/mic visibility + placeholder ──
  function updateSendMic() {
    var hasText = composerInput.value.trim().length > 0;
    var hasMedia = mediaItems.length > 0;
    var showSend = hasText || hasMedia;
    btnSend.classList.toggle('visible', showSend);
    btnMic.classList.toggle('hidden', showSend);
    composerInput.placeholder = hasMedia ? 'Add a comment or send' : 'Talk to Sprout...';
  }

  // ── Render media items ──
  function renderMedia() {
    mediaRow.innerHTML = '';
    if (mediaItems.length === 0) {
      mediaRow.classList.remove('visible');
      return;
    }
    mediaRow.classList.add('visible');

    mediaItems.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'media-card';
      var overlay = item.loading
        ? '<div class="media-card-overlay"><svg class="spinner-circle spinner-sm" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/><path d="M10 2a8 8 0 0 1 8 8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/></svg></div>'
        : '';
      card.innerHTML =
        '<div class="media-card-image" style="background:' + item.bg + '"></div>' +
        '<button class="media-remove" data-idx="' + idx + '" aria-label="Remove">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' + overlay;
      mediaRow.appendChild(card);
    });

    // Bind remove buttons
    mediaRow.querySelectorAll('.media-remove').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = parseInt(this.getAttribute('data-idx'));
        mediaItems.splice(idx, 1);
        renderMedia();
        updateSendMic();
      });
    });
  }

  // ── Transition to state ──
  function goTo(state) {
    prevState = currentState;
    currentState = state;

    // Stop any active playback animation
    if (typeof stopPlayback === 'function') stopPlayback();

    switch (state) {
      case State.PLACEHOLDER:
      case State.TYPING:
        showRow(inputRowDefault);
        setAttachIcon(false);
        btnAttach.classList.remove('hidden');
        updateSendMic();
        if (state === State.PLACEHOLDER) {
          showStateLabel('Placeholder');
        }
        break;

      case State.LISTENING:
        showRow(inputRowListening);
        setAttachIcon(false);
        btnAttach.classList.add('hidden');
        buildWaveformBars(waveform, 77, true);
        showStateLabel('Listening');
        break;

      case State.TRANSCRIBING:
        showRow(inputRowTranscribing);
        setAttachIcon(true);
        btnAttach.classList.remove('hidden');
        showStateLabel('Transcribing');
        // Auto-resolve after 2.5s
        clearTimeout(transcribeTimer);
        transcribeTimer = setTimeout(function() {
          composerInput.value = 'Hey Sprout, what should we do today?';
          autoResize();
          goTo(State.TYPING);
          updateSendMic();
          showStateLabel('Transcribed');
        }, 2500);
        break;

      case State.SEND_AUDIO:
        showRow(inputRowAudio);
        setAttachIcon(true);
        btnAttach.classList.remove('hidden');
        buildWaveformBars(waveformStatic, 54, false);
        showStateLabel('Send Audio');
        break;

      case State.SHEET_OPEN:
        sheetScrim.classList.add('visible');
        sheet.classList.add('visible');
        showStateLabel('Attachment Sheet');
        break;
    }
  }

  function closeSheet() {
    sheetScrim.classList.remove('visible');
    sheet.classList.remove('visible');
    currentState = prevState || State.PLACEHOLDER;
  }

  // ── Event listeners ──

  // Typing
  composerInput.addEventListener('input', function() {
    autoResize();
    updateSendMic();
    if (currentState === State.PLACEHOLDER && composerInput.value.length > 0) {
      currentState = State.TYPING;
    }
  });

  composerInput.addEventListener('focus', function() {
    if (currentState === State.PLACEHOLDER) {
      showStateLabel('Typing');
    }
  });

  // Send text
  btnSend.addEventListener('click', function() {
    showStateLabel('Sent!');
    composerInput.value = '';
    autoResize();
    mediaItems = [];
    renderMedia();
    updateSendMic();
    inputRowDefault.classList.remove('align-end');
    goTo(State.PLACEHOLDER);
  });

  // Mic → Listening
  btnMic.addEventListener('click', function() {
    goTo(State.LISTENING);
  });

  // Stop → Send Audio
  btnStop.addEventListener('click', function() {
    goTo(State.SEND_AUDIO);
  });

  // Send audio
  btnSendAudio.addEventListener('click', function() {
    showStateLabel('Audio Sent!');
    goTo(State.PLACEHOLDER);
  });

  // Send from transcribing
  btnSendTranscribing.addEventListener('click', function() {
    clearTimeout(transcribeTimer);
    showStateLabel('Sent!');
    goTo(State.PLACEHOLDER);
  });

  // Play audio preview — organic dancing waveform
  var isPlaying = false;
  var playAnimId = null;
  var playTimer = null;
  var iconPlay = document.getElementById('iconPlay');
  var iconPause = document.getElementById('iconPause');

  function setPlayIcon(playing) {
    iconPlay.classList.toggle('hidden', playing);
    iconPause.classList.toggle('hidden', !playing);
    btnPlay.setAttribute('aria-label', playing ? 'Pause' : 'Play recording');
  }

  function stopPlayback() {
    isPlaying = false;
    setPlayIcon(false);
    if (playAnimId) { cancelAnimationFrame(playAnimId); playAnimId = null; }
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }

    // Ease bars back to resting state
    var bars = waveformStatic.querySelectorAll('.waveform-bar');
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.height = bars[i].dataset.restHeight + 'px';
      bars[i].style.background = '';
    }
  }

  btnPlay.addEventListener('click', function() {
    // Toggle pause
    if (isPlaying) {
      stopPlayback();
      showStateLabel('Paused');
      return;
    }

    isPlaying = true;
    setPlayIcon(true);
    showStateLabel('Playing...');

    var bars = waveformStatic.querySelectorAll('.waveform-bar');
    var count = bars.length;

    // Store resting heights and seed per-bar phase offsets
    var restHeights = [];
    var phases = [];
    var speeds = [];
    for (var i = 0; i < count; i++) {
      var h = parseInt(bars[i].style.height) || 6;
      bars[i].dataset.restHeight = h;
      restHeights.push(h);
      phases.push(i * 0.15 + Math.random() * 0.5);
      speeds.push(3 + Math.random() * 2);
      bars[i].style.background = 'var(--fg-secondary, #414651)';
    }

    var startTime = performance.now();
    var lastUpdate = 0;

    function animate(now) {
      if (!isPlaying) return;

      // Update heights every ~60ms (CSS transition handles smoothing)
      if (now - lastUpdate > 60) {
        lastUpdate = now;
        var elapsed = (now - startTime) / 1000;

        // Ease-in factor (0→1 over first 300ms)
        var easeIn = Math.min(1, elapsed / 0.3);

        for (var i = 0; i < count; i++) {
          var wave = Math.sin(elapsed * speeds[i] + phases[i]);
          var noise = Math.sin(elapsed * 7.3 + i * 2.1) * 0.3;
          var energy = 0.6 + 0.4 * Math.sin(elapsed * 1.5 - i * 0.08);

          var amplitude = (wave + noise) * energy * easeIn;
          var target = restHeights[i] + amplitude * 10;
          target = Math.max(2, Math.min(20, target));

          bars[i].style.height = Math.round(target) + 'px';
        }
      }

      playAnimId = requestAnimationFrame(animate);
    }

    playAnimId = requestAnimationFrame(animate);

    // Auto-stop after 3s
    playTimer = setTimeout(function() {
      stopPlayback();
    }, 3000);
  });

  // Attach button (+ or X)
  btnAttach.addEventListener('click', function() {
    if (currentState === State.SEND_AUDIO || currentState === State.TRANSCRIBING) {
      // X button: cancel recording
      clearTimeout(transcribeTimer);
      composerInput.value = '';
      autoResize();
      goTo(State.PLACEHOLDER);
      updateSendMic();
      showStateLabel('Cancelled');
    } else if (currentState === State.SHEET_OPEN) {
      closeSheet();
    } else {
      prevState = currentState;
      goTo(State.SHEET_OPEN);
    }
  });

  // Sheet close
  sheetClose.addEventListener('click', closeSheet);
  sheetScrim.addEventListener('click', closeSheet);

  // Finish loading after delay
  function scheduleLoad(item) {
    setTimeout(function() {
      item.loading = false;
      renderMedia();
    }, 5000);
  }

  // Camera tile — adds sample image
  tileCamera.addEventListener('click', function() {
    var item = { type: 'image', loading: true, bg: 'linear-gradient(135deg, #7cc4fa 0%, #36bffa 50%, #0ba5ec 100%)' };
    mediaItems.push(item);
    scheduleLoad(item);
    closeSheet();
    renderMedia();
    updateSendMic();
    showStateLabel('Photo Added');
  });

  // Photos tile — adds sample images
  tilePhotos.addEventListener('click', function() {
    var item1 = { type: 'image', loading: true, bg: 'linear-gradient(135deg, #b2ddff 0%, #7cc4fa 100%)' };
    mediaItems.push(item1);
    scheduleLoad(item1);
    if (mediaItems.length === 1) {
      var item2 = { type: 'image', loading: true, bg: 'linear-gradient(135deg, #e0f2fe 0%, #b2ddff 50%, #7cc4fa 100%)' };
      mediaItems.push(item2);
      scheduleLoad(item2);
    }
    closeSheet();
    renderMedia();
    updateSendMic();
    showStateLabel('Photos Added');
  });

  // Initialize
  updateSendMic();
  autoResize();

  // ── Device toggle ──
  var deviceBtns = document.querySelectorAll('.device-btn');
  var deviceWrapper = document.querySelector('.device-wrapper');
  deviceBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var device = btn.getAttribute('data-device');
      deviceBtns.forEach(function(b) { b.classList.toggle('active', b === btn); });
      if (device === 'ipad') {
        deviceWrapper.classList.add('ipad');
      } else {
        deviceWrapper.classList.remove('ipad');
      }
    });
  });
})();
</script>
