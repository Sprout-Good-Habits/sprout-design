<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer — Chat Tier 2 + Tiles</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<link rel="stylesheet" href="/design-system/components/tabs.css">
<link rel="stylesheet" href="/design-system/components/tile.css">
<style>
/* ── Device ── */
.device-wrapper{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:32px;padding:4px;box-shadow:0 12px 16px -4px rgba(10,13,18,.08),0 4px 6px -2px rgba(10,13,18,.03),0 2px 2px -1px rgba(10,13,18,.04)}
.device-inner-shadow{background:#fff;border-radius:28px;padding:4px;overflow:hidden;position:relative}
.device-inner-shadow::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:inset 0 0 6px 2px rgba(10,13,18,.08),inset 0 0 4px 2px rgba(10,13,18,.03);z-index:6}
.device-mockup{background:#fafafa;border:2px solid #e9eaeb;border-radius:24px;clip-path:inset(0 round 24px);position:relative}
.device-screen{width:402px;height:874px;position:relative;overflow:hidden;background:#e0f2fe;user-select:none;-webkit-user-select:none}
.viewer{display:flex;justify-content:center;margin-top:24px}

/* ── Controls row + device toggle ── */
.controls-row{display:flex;align-items:center;justify-content:flex-end;margin-bottom:16px}
/* ── Device toggle (uses shared tabs.css) ── */
.device-toggle .cat-tab{height:36px}
.device-toggle .cat-tab svg{width:20px;height:20px;flex-shrink:0}
.device-toggle .cat-tab .device-icon{stroke:var(--text-quaternary,#717680);transition:stroke .15s}
.device-toggle .cat-tab.active .device-icon{stroke:var(--text-secondary,#414651)}

/* ── iPad overrides ── */
.device-wrapper.ipad .device-screen{width:640px;height:854px}
.device-wrapper.ipad .msg-col{max-width:536px}
.device-wrapper.ipad .msg-bubble{max-width:480px}
.device-wrapper.ipad .msg-images{max-width:536px}
.device-wrapper.ipad .msg-bubble-audio{width:360px}

/* ── Status bar ── */
.status-bar{position:absolute;top:0;left:0;right:0;height:62px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;z-index:10;pointer-events:none}
.status-bar-time{font-size:17px;font-weight:600;color:#181d27;letter-spacing:-.01em}
.status-bar-icons{display:flex;align-items:center;gap:6px}
.status-bar-icons svg{display:block}

/* ── Chat toolbar ── */
.chat-toolbar{position:absolute;top:62px;left:0;right:0;height:56px;display:flex;align-items:flex-start;justify-content:space-between;padding:0 16px 8px;z-index:10;background:#e0f2fe;box-shadow:0 3px 0 0 #e9eaeb}
.chat-toolbar-title{position:absolute;left:50%;top:13px;transform:translateX(-50%);font-family:var(--font-family-body,'Inter',sans-serif);font-size:18px;line-height:28px;font-weight:600;color:#181d27;white-space:nowrap}
.chat-toolbar-btn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e9eaeb;border-radius:9999px;box-shadow:0 3px 0 0 #e9eaeb;flex-shrink:0;cursor:pointer;transition:background .15s,box-shadow .15s,transform .15s}
.chat-toolbar-btn:hover{background:#fafafa}
.chat-toolbar-btn:active{box-shadow:none;transform:translateY(2px)}
.chat-toolbar-btn svg{width:24px;height:24px;color:#181d27}

/* ── Chat thread ── */
.chat-thread{position:absolute;top:118px;left:0;right:0;bottom:330px;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:8px;z-index:5;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chat-thread::-webkit-scrollbar{display:none}
.chat-thread-fade{position:absolute;left:0;right:0;bottom:330px;height:100px;background:linear-gradient(to bottom,rgba(224,242,254,0) 0%,rgba(224,242,254,1) 100%);z-index:6;pointer-events:none;opacity:0;transition:opacity .3s}

/* ── Message bubbles ── */
.msg-row{display:flex;width:100%}
.msg-outgoing{justify-content:flex-end}
.msg-incoming{align-items:flex-end;gap:8px}
.msg-col{display:flex;flex-direction:column;gap:4px;max-width:330px}
.msg-col-out{align-items:flex-end}
.msg-col-in{align-items:flex-start}
.msg-avatar{display:none}
.msg-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.msg-bubble{border-radius:24px;padding:12px 16px;max-width:256px;min-width:90px;font-family:var(--font-family-body,'Inter',sans-serif);font-size:14px;line-height:20px;font-weight:400;color:#181d27;word-wrap:break-word}
.msg-bubble-out{background:#b9e6fe}
.msg-bubble-in{background:#fff}
.msg-images{display:flex;flex-wrap:wrap;gap:4px;max-width:330px}
.msg-images-out{justify-content:flex-end}
.msg-image{width:104px;height:104px;border-radius:20px;flex-shrink:0}

/* ── Typing indicator ── */
@keyframes typingDot{0%,60%,100%{opacity:.3}30%{opacity:1}}
.msg-typing .msg-bubble-in{display:flex;gap:4px;align-items:center;padding:16px 20px}
.typing-dot{width:8px;height:8px;border-radius:50%;background:#a4a7ae;animation:typingDot 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}

/* ── Audio message in thread ── */
.msg-bubble-audio{display:flex;flex-direction:column;gap:4px;width:256px}
.msg-audio-row{display:flex;gap:4px;align-items:center}
.msg-audio-play{flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#e9eaeb;border-radius:9999px;padding:6px;cursor:pointer}
.msg-audio-play svg{width:20px;height:20px;color:#181d27}
.msg-audio-play svg.hidden{display:none}
.msg-audio-waveform{flex:1;display:flex;gap:2px;align-items:center;height:20px;overflow:hidden}
.msg-audio-waveform .waveform-bar{width:2px;border-radius:1px}
.msg-audio-label{font-size:12px;line-height:16px;color:#414651}

/* ── Grass ── */
.bg-bottom{position:absolute;bottom:0;left:0;right:0;z-index:1;pointer-events:none}
.bg-grass-edge{width:100%;height:24px;border-radius:24px 24px 0 0;background:#86cb3c}
.bg-grass-fill{width:100%;height:89px;background:#86cb3c}

/* ── Sprout (Rive character) ── */
.rive-wrap{position:absolute;bottom:-196px;left:50%;transform:translateX(-50%);width:690px;height:690px;z-index:2;pointer-events:none}
.rive-canvas{width:690px;height:690px}

/* ── Home indicator ── */
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:100px;background:#181d27;z-index:20}

/* ── Composer bar ── */
.composer-bar{position:absolute;bottom:45px;left:0;right:0;z-index:10;display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px}

/* ── Btn-util (plus button) ── */
.btn-util{width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e9eaeb;border-radius:9999px;box-shadow:0 3px 0 0 #e9eaeb;cursor:pointer;padding:0;transition:background .15s,box-shadow .15s,transform .15s}
.btn-util:hover{background:#fafafa}
.btn-util:active{box-shadow:none;transform:translateY(2px)}
.btn-util svg{width:24px;height:24px;color:#181d27}

/* ── Spacer ── */
.spacer{display:none}

/* ════════════════════════════════════
   MIC BUTTON
   Driven by data-state attribute:
     start-default | start-pressed
     stop-default  | stop-pressed
     start-loading
   ════════════════════════════════════ */
.mic-btn{
  width:72px;height:72px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:9999px;cursor:pointer;padding:0;
  position:relative;
  /* defaults = start-default (blue) */
  border:2px solid #0086c9;
  box-shadow:0 4px 0 0 #0086c9;
  transform:translateY(0);
  transition:border-color .12s,box-shadow .12s,transform .12s;
}
/* Background fill (mix-blend-mode per Figma) */
.mic-btn::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:#0ba5ec;
  mix-blend-mode:multiply;
  transition:background .12s;
}

/* Icons & spinner sit above the fill */
.mic-btn svg,.mic-btn .spinner{position:relative;z-index:1}
.mic-btn svg{width:40px;height:40px}
.mic-btn .spinner{width:24px;height:24px}

/* ── Icon visibility by state ── */
.mic-btn .icon-mic,
.mic-btn .icon-stop,
.mic-btn .spinner{display:none}

.mic-btn[data-state="start-default"] .icon-mic,
.mic-btn[data-state="start-pressed"] .icon-mic{display:block}

.mic-btn[data-state="stop-default"] .icon-stop,
.mic-btn[data-state="stop-pressed"] .icon-stop{display:block}

.mic-btn[data-state="start-loading"] .spinner{display:block}

/* ── Start recording: Default ── */
.mic-btn[data-state="start-default"]{
  border-color:#0086c9;box-shadow:0 4px 0 0 #0086c9;transform:translateY(0);
}
.mic-btn[data-state="start-default"]::before{background:#0ba5ec}
.mic-btn[data-state="start-default"]:hover::before{background:#36bffa}

/* ── Start recording: Active/Pressed ── */
.mic-btn[data-state="start-pressed"]{
  border-color:#0086c9;box-shadow:none;transform:translateY(2px);animation:none;
}
.mic-btn[data-state="start-pressed"]::before{background:#0ba5ec}

/* ── Stop recording: Default ── */
@keyframes recording-ring{
  0%,100%{top:-4px;left:-4px;right:-4px;bottom:-8px;opacity:.4}
  50%{top:-12px;left:-12px;right:-12px;bottom:-16px;opacity:.7}
}
.mic-btn[data-state="stop-default"]{
  border-color:#d92d20;box-shadow:0 4px 0 0 #d92d20;transform:translateY(0);
}
.mic-btn[data-state="stop-default"]::after{
  content:'';position:absolute;
  top:-8px;left:-8px;right:-8px;bottom:-12px;
  border:2px solid rgba(217,45,32,0.7);
  border-radius:inherit;
  pointer-events:none;
  animation:recording-ring 2s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
}
.mic-btn[data-state="stop-default"]::before{background:#f04438}
.mic-btn[data-state="stop-default"]:hover::before{background:#f97066}

/* ── Stop recording: Active/Pressed ── */
.mic-btn[data-state="stop-pressed"]{
  border-color:#d92d20;box-shadow:none;transform:translateY(2px);animation:none;
}
.mic-btn[data-state="stop-pressed"]::before{background:#f04438}

/* ── Start recording: Loading ── */
.mic-btn[data-state="start-loading"]{
  border-color:#0086c9;box-shadow:0 4px 0 0 #0086c9;transform:translateY(0);
  pointer-events:none;
}
.mic-btn[data-state="start-loading"]::before{background:#0ba5ec}

/* ── Disabled ── */
.mic-btn.disabled{pointer-events:none}
.mic-btn.disabled::before{background:#d5d7da}
.mic-btn.disabled{border-color:#a4a7ae;box-shadow:0 4px 0 0 #a4a7ae}

/* ── Spinner animation ── */
.spinner{animation:spin 1.0s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Mic glow (pulse after Sprout finishes talking) ── */
@keyframes mic-glow{
  0%,100%{box-shadow:0 4px 0 0 #0086c9,0 2px 0 0 rgba(255,255,255,0.5),0 2px 0 0 rgba(11,165,236,0.3)}
  50%{box-shadow:0 4px 0 0 #0086c9,0 2px 0 4px rgba(255,255,255,0.6),0 2px 0 8px rgba(11,165,236,0.2)}
}
.mic-btn.glow{animation:mic-glow 2s cubic-bezier(0.25, 0.1, 0.25, 1) infinite}

/* ── Sheet ── */
/* ── Sheet (per design system) ── */
.sheet-scrim{position:absolute;inset:0;background:var(--bg-overlay,rgba(10,13,18,.2));z-index:15;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-scrim.open{opacity:1;pointer-events:auto}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg-primary,#fff);border-radius:var(--radius-4xl,24px) var(--radius-4xl,24px) 0 0;z-index:16;transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.5, 1.8, 0.3, 0.8);padding-bottom:var(--spacing-4xl,32px);display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-top{padding:var(--spacing-xl,16px);flex-shrink:0;display:flex;flex-direction:column;gap:16px;align-items:center}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--gray-300,#d5d7da)}
.sheet-header{display:flex;align-items:center;gap:var(--spacing-md,8px);width:100%}
.sheet-header-content{flex:1;min-width:0}
.sheet-title{font-family:var(--font-family-body,'Inter',sans-serif);font-size:var(--font-size-text-md,16px);line-height:var(--line-height-text-md,24px);font-weight:var(--font-weight-bold,700);color:var(--text-primary,#181d27);margin:0}
.sheet-close{width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-400,#a4a7ae);background:none;border:none;border-radius:var(--radius-full,9999px)}
.sheet-close:hover{background:var(--bg-tertiary,#f5f5f5)}
.sheet-close svg{width:24px;height:24px}
.sheet-actions{display:flex;gap:var(--spacing-md,8px);padding:var(--spacing-xs,4px) var(--spacing-lg,12px) var(--spacing-lg,12px)}
.action-tile{flex:1;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--spacing-xs,4px);background:var(--bg-primary,#fff);border:2px solid var(--border-secondary,#e9eaeb);border-radius:var(--radius-2xl,16px);box-shadow:0 3px 0 0 var(--gray-200,#e9eaeb);cursor:pointer;transition:background .15s,box-shadow .15s,transform .15s;color:var(--brand-500,#0ba5ec)}
.action-tile:hover{background:var(--bg-secondary,#fafafa)}
.action-tile:active{box-shadow:none;transform:translateY(2px)}
.action-tile-icon{font-family:'TossFace',sans-serif;font-size:24px;line-height:1}
.action-tile-label{font-size:var(--font-size-text-md,16px);font-weight:var(--font-weight-bold,700);color:var(--text-secondary,#414651);line-height:var(--line-height-text-md,24px)}

/* ── Camera view ── */
.camera-view{position:absolute;inset:0;background:#d5d7da;z-index:25;display:none;flex-direction:column}
.camera-view.open{display:flex}
/* ── Camera toolbar ── */
.camera-toolbar{position:absolute;top:62px;left:0;right:0;display:flex;align-items:flex-start;padding:0 var(--spacing-xl,16px) var(--spacing-md,8px);z-index:26}
.camera-top{flex:1;padding:118px 16px 8px}
.camera-guide{display:flex;gap:16px;align-items:flex-start}
.camera-sprout{width:120px;height:180px;flex-shrink:0;background:#e0f2fe;border-radius:24px;overflow:hidden;position:relative}
.camera-rive-wrap{position:absolute;bottom:-96px;left:50%;transform:translateX(-50%);width:300px;height:300px;pointer-events:none}
.camera-rive-canvas{width:300px;height:300px}
.camera-message{flex:1;background:rgba(10,13,18,.2);border-radius:24px;padding:12px 16px;font-size:18px;line-height:28px;color:#fff;align-self:center}
.camera-bottom{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 42px}
.btn-capture{width:80px;height:80px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e9eaeb;border-radius:9999px;box-shadow:0 3px 0 0 #e9eaeb;cursor:pointer;padding:0;transition:background .15s,box-shadow .15s,transform .15s}
.btn-capture:hover{background:#fafafa}
.btn-capture:active{box-shadow:none;transform:translateY(3px)}
.btn-capture svg{width:40px;height:40px;color:#181d27}

/* ── Feedback banner ── */
.feedback-banner{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #d5d7da;padding:25px 16px 24px;display:none;flex-direction:column;gap:16px;z-index:26}
.feedback-banner.open{display:flex}
.feedback-title{font-family:var(--font-family-display,'Inter',sans-serif);font-size:24px;font-weight:700;line-height:32px;color:#181d27}
.feedback-actions{display:flex;gap:10px}
.btn-fb{flex:1;height:50px;display:flex;align-items:center;justify-content:center;font-family:var(--font-family-body,'Inter',sans-serif);font-size:16px;font-weight:700;line-height:24px;border-radius:16px;cursor:pointer;padding:12px;transition:background .15s,box-shadow .15s,transform .15s}
.btn-fb.secondary{background:#fff;border:2px solid #e9eaeb;color:#414651;box-shadow:0 3px 0 0 #e9eaeb}
.btn-fb.secondary:active{box-shadow:none;transform:translateY(2px)}
.btn-fb.primary{background:#0ba5ec;border:none;border-bottom:2px solid #0086c9;color:#fff;box-shadow:0 4px 0 0 #0086c9}
.btn-fb.primary:active{box-shadow:none;transform:translateY(2px)}

/* ── State label ── */
.state-label{display:none}

/* ── Tile patterns in chat ── */
.tile-group{display:flex;flex-direction:column;gap:8px;width:100%}
.tile-group .tile{padding:12px 16px}
.tile-group .tile-leading{width:32px;height:32px}
.tile-group .tile-leading-icon{font-size:24px}
@keyframes tileSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tile-group .tile{animation:tileSlideIn 0.3s ease both}
.tile-group .tile:nth-child(1){animation-delay:.05s}
.tile-group .tile:nth-child(2){animation-delay:.1s}
.tile-group .tile:nth-child(3){animation-delay:.15s}
.tile-group .tile:nth-child(4){animation-delay:.2s}
.tile-group.dismissed{transition:opacity 0.25s,max-height 0.3s ease 0.1s;opacity:0;max-height:0 !important;overflow:hidden}

/* Composer transition */
.composer-bar{transition:opacity 0.2s ease,transform 0.2s ease}
.composer-bar.hidden-for-tiles{opacity:0;transform:translateY(8px);pointer-events:none;visibility:hidden}

/* Confirm bar */
.confirm-bar{position:absolute;bottom:45px;left:0;right:0;z-index:10;padding:0 16px;display:flex;align-items:center;justify-content:center;height:72px;animation:confirmBarIn 0.25s ease both;animation-delay:0.15s}
@keyframes confirmBarIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.confirm-bar .tile-group-confirm{flex:1;height:48px}
.tile-group-confirm{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:48px;font-family:var(--font-family-body,'Inter',sans-serif);font-size:16px;font-weight:700;border-radius:16px;cursor:pointer;padding:12px;background:#0ba5ec;color:#fff;border:none;border-bottom:2px solid #0086c9;box-shadow:0 4px 0 0 #0086c9;transition:background 0.15s,box-shadow 0.15s,transform 0.15s}
.tile-group-confirm:active{box-shadow:none;transform:translateY(4px)}
.tile-group-confirm.state-disabled{background:#d5d7da;color:#717680;border-bottom:2px solid #a4a7ae;box-shadow:0 4px 0 0 #a4a7ae;cursor:default;pointer-events:none}
.tile-group-count{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.25);border-radius:9999px;min-width:22px;height:22px;padding:0 6px;font-size:13px;font-weight:700}

/* Match pairs */
.match-group{display:flex;flex-direction:column;gap:8px;width:100%}
.match-columns{display:flex;gap:8px;width:100%}
.match-col{flex:1;display:flex;flex-direction:column;gap:8px}
.match-tile{display:flex;align-items:center;justify-content:center;box-sizing:border-box;width:100%;min-height:56px;padding:12px 16px;background:#fff;border:2px solid #e9eaeb;border-radius:12px;box-shadow:0 3px 0 0 #e9eaeb;cursor:pointer;transition:background 0.15s,border-color 0.15s,box-shadow 0.15s,transform 0.15s;user-select:none;-webkit-tap-highlight-color:transparent;font-family:var(--font-family-body,'Inter',sans-serif);font-size:14px;line-height:20px;font-weight:700;color:#181d27;text-align:center;gap:8px;touch-action:none}
.match-tile:hover{background:#fafafa}
.match-tile:active{box-shadow:none;transform:translateY(2px)}
.match-tile .match-emoji{font-family:'TossFace',sans-serif;font-size:24px;line-height:1}
.match-tile.selected{background:#e0f2fe;border-color:#7cd4fd;box-shadow:0 3px 0 0 #7cd4fd}
.match-tile.success{background:#dcfae6;border-color:#75e0a7;box-shadow:0 4px 0 0 #75e0a7;pointer-events:none}
.match-tile.disabled{background:#fff;border-color:#e9eaeb;box-shadow:none;pointer-events:none;color:#a4a7ae}
.match-tile.disabled .match-emoji{filter:grayscale(1);mix-blend-mode:luminosity}
.match-tile.warning{background:#fef7c3;border-color:#fde272;box-shadow:0 4px 0 0 #fde272;pointer-events:none;cursor:default}

/* Sort tiles */
.sort-group{display:flex;flex-direction:column;gap:8px;width:100%}
.sort-list{display:flex;flex-direction:column;gap:8px;position:relative}
.sort-number{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border-radius:9999px;font-size:13px;font-weight:700;color:#535862;flex-shrink:0}
.tile.success .sort-number{background:#75e0a7;color:#fff}
.tile.warning-static .sort-number{background:#fde272;color:#181d27}
.sort-placeholder{min-height:56px;border:2px dashed #7cd4fd;border-radius:12px;background:#e0f2fe;opacity:0.4}

/* Image Quiz */
.image-quiz-group{display:flex;flex-direction:column;gap:8px;width:100%}
.image-quiz-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.image-quiz-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-sizing:border-box;aspect-ratio:1;padding:16px;background:#fff;border:2px solid #e9eaeb;border-radius:12px;box-shadow:0 3px 0 0 #e9eaeb;cursor:pointer;transition:background 0.15s,border-color 0.15s,box-shadow 0.15s,transform 0.15s;user-select:none;-webkit-tap-highlight-color:transparent}
.image-quiz-tile:hover{background:#fafafa}
.image-quiz-tile:active{box-shadow:none;transform:translateY(2px)}
.image-quiz-tile .quiz-image{font-family:'TossFace',sans-serif;font-size:48px;line-height:1}
.image-quiz-tile .quiz-label{font-family:var(--font-family-body,'Inter',sans-serif);font-size:14px;font-weight:700;color:#181d27;text-align:center}
.image-quiz-tile.selected{background:#e0f2fe;border-color:#7cd4fd;box-shadow:0 3px 0 0 #7cd4fd}
.image-quiz-tile.success{background:#dcfae6;border-color:#75e0a7;box-shadow:0 4px 0 0 #75e0a7;pointer-events:none}
.image-quiz-tile.error{background:#fee4e2;border-color:#fda29b;box-shadow:0 4px 0 0 #fda29b;pointer-events:none}
.image-quiz-tile.disabled{background:#fff;border-color:#e9eaeb;box-shadow:none;pointer-events:none;color:#a4a7ae}
.image-quiz-tile.disabled .quiz-image{filter:grayscale(1);mix-blend-mode:luminosity}
.image-quiz-tile.disabled .quiz-label{color:#a4a7ae}

/* Fill in the Blank */
.fill-blank-group{display:flex;flex-direction:column;gap:12px;width:100%}
.fill-blank-sentence{background:#fff;border:1px solid #e9eaeb;border-radius:24px;padding:16px;display:flex;flex-direction:column;gap:16px}
.fill-blank-row{display:flex;align-items:flex-start;flex-wrap:wrap}
.fill-blank-text{font-family:var(--font-family-body,'Inter',sans-serif);font-size:16px;line-height:24px;font-weight:400;color:#181d27;white-space:nowrap}
.fill-blank-gap{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:50px;padding:0 4px}
.fill-blank-gap-text{opacity:0;font-family:var(--font-family-body,'Inter',sans-serif);font-size:16px;line-height:24px;font-weight:400;color:#181d27;white-space:nowrap;transition:opacity 0.15s,color 0.15s}
.fill-blank-gap.filled .fill-blank-gap-text{opacity:1}
.fill-blank-gap.correct .fill-blank-gap-text{opacity:1;color:#079455}
.fill-blank-gap.wrong .fill-blank-gap-text{opacity:1;color:#d92d20}
.fill-blank-gap-line{width:100%;height:1px;background:#e9eaeb;transition:background 0.15s}
.fill-blank-gap.active .fill-blank-gap-line{background:#7cd4fd;height:2px}
.fill-blank-gap.correct .fill-blank-gap-line{background:#079455}
.fill-blank-gap.wrong .fill-blank-gap-line{background:#d92d20}
.fill-blank-options{display:flex;gap:12px;justify-content:center}
.fill-blank-options .tile{width:auto;padding:8px 12px}
.fill-blank-options .tile.used{opacity:0.3;pointer-events:none}
.fill-blank-options .tile.placed{background:#e0f2fe;border-color:#7cd4fd;box-shadow:0 3px 0 0 #7cd4fd;pointer-events:none}

@media(prefers-reduced-motion:reduce){.typing-dot,.spinner,.mic-btn.glow,.mic-btn[data-state="stop-default"]::after,.tile-group .tile{animation:none !important}.sheet{transition:opacity 0.1s cubic-bezier(0.25, 0.1, 0.25, 1) !important}.chat-thread-fade{transition:opacity 0.1s !important}}
</style>

<script>
(function() {
  var micBtn = document.getElementById('micBtn');
  var btnPlus = document.getElementById('btnPlus');
  var scrim = document.getElementById('scrim');
  var sheet = document.getElementById('sheet');
  var sheetClose = document.getElementById('sheetClose');
  var tileCamera = document.getElementById('tileCamera');
  var tilePhotos = document.getElementById('tilePhotos');
  var label = document.getElementById('label');
  var labelTimer;

  function flash(msg) {
    label.textContent = msg;
    label.classList.add('show');
    clearTimeout(labelTimer);
    labelTimer = setTimeout(function() { label.classList.remove('show'); }, 1800);
  }

  /* ════════════════════════════════
     MIC BUTTON STATE MACHINE
     States driven by data-state attr
     ════════════════════════════════ */
  var locked = false;

  function setState(s) {
    micBtn.setAttribute('data-state', s);
  }

  micBtn.addEventListener('click', function() {
    if (locked) return;
    var state = micBtn.getAttribute('data-state');

    if (state === 'start-default') {
      // ── Tap to start recording ──
      micBtn.classList.remove('glow');
      locked = true;
      setState('start-pressed');
      flash('Start recording \u2014 Pressed');

      setTimeout(function() {
        setState('stop-default');
        flash('Recording\u2026');
        locked = false;
      }, 150);

    } else if (state === 'stop-default') {
      // ── Tap to stop recording ──
      locked = true;
      setState('stop-pressed');
      flash('Stop recording \u2014 Pressed');

      setTimeout(function() {
        setState('start-loading');
        flash('Sending\u2026');

        setTimeout(function() {
          setState('start-default');
          addOutgoingAudioMessage();
          triggerReply();
          flash('Sent!');
          locked = false;
        }, 1500);
      }, 150);
    }
  });

  /* ════════════════════════════════
     SHEET
     ════════════════════════════════ */
  function openSheet() {
    scrim.classList.add('open');
    sheet.classList.add('open');
    flash('Attachment Sheet');
  }
  function closeSheet() {
    scrim.classList.remove('open');
    sheet.classList.remove('open');
  }

  btnPlus.addEventListener('click', openSheet);
  sheetClose.addEventListener('click', closeSheet);
  scrim.addEventListener('click', closeSheet);

  /* ════════════════════════════════
     CAMERA
     ════════════════════════════════ */
  var cameraView   = document.getElementById('cameraView');
  var cameraMsg    = document.getElementById('cameraMsg');
  var cameraBottom = document.getElementById('cameraBottom');
  var btnCapture   = document.getElementById('btnCapture');
  var btnRetake    = document.getElementById('btnRetake');
  var btnSendPhoto = document.getElementById('btnSendPhoto');
  var feedbackBnr  = document.getElementById('feedbackBanner');
  var cameraClose  = document.getElementById('cameraClose');

  var cameraMode = 'camera'; // 'camera' or 'photos'

  function showFeedback() {
    cameraBottom.style.display = 'none';
    cameraMsg.textContent = 'Message from sprout goes here as subtitles';
    btnRetake.textContent = cameraMode === 'camera' ? 'Retake photo' : 'Change photo';
    feedbackBnr.classList.add('open');
    flash('Ready to share');
  }

  tileCamera.addEventListener('click', function() {
    closeSheet();
    cameraMode = 'camera';
    cameraView.classList.add('open');
    feedbackBnr.classList.remove('open');
    cameraBottom.style.display = '';
    cameraMsg.textContent = 'Point camera at your completed task';
    flash('Camera');
  });

  tilePhotos.addEventListener('click', function() {
    closeSheet();
    cameraMode = 'photos';
    cameraView.classList.add('open');
    cameraBottom.style.display = 'none';
    showFeedback();
  });

  btnCapture.addEventListener('click', function() {
    showFeedback();
  });

  btnRetake.addEventListener('click', function() {
    if (cameraMode === 'photos') {
      // Change photo → close overlay, reopen sheet
      cameraView.classList.remove('open');
      feedbackBnr.classList.remove('open');
      openSheet();
    } else {
      // Retake photo → back to camera buttons
      feedbackBnr.classList.remove('open');
      cameraBottom.style.display = '';
      cameraMsg.textContent = 'Point camera at your completed task';
      flash('Camera');
    }
  });

  cameraClose.addEventListener('click', function() {
    cameraView.classList.remove('open');
    feedbackBnr.classList.remove('open');
  });

  btnSendPhoto.addEventListener('click', function() {
    cameraView.classList.remove('open');
    feedbackBnr.classList.remove('open');
    // Add photo as outgoing message
    addOutgoingMessage(null, [{ bg: 'linear-gradient(135deg, #7cc4fa 0%, #36bffa 50%, #0ba5ec 100%)' }]);
    triggerReply();
    flash('Photo Sent!');
  });

  /* ════════════════════════════════
     CHAT THREAD
     ════════════════════════════════ */
  var chatThread = document.getElementById('chatThread');
  var sproutReplies = [
    'That looks awesome! Great job!',
    'Wow, you did amazing work today!',
    'I love that! Tell me more about it.',
    'You are so creative! Keep it up!',
    'That makes me so happy!'
  ];
  var replyIdx = 0;

  var threadFade = document.querySelector('.chat-thread-fade');

  function updateFade() {
    var atBottom = chatThread.scrollHeight - chatThread.scrollTop - chatThread.clientHeight < 10;
    threadFade.style.opacity = atBottom ? '0' : '1';
  }

  chatThread.addEventListener('scroll', updateFade);

  function scrollThread() {
    setTimeout(function() {
      chatThread.scrollTop = chatThread.scrollHeight;
      updateFade();
    }, 50);
  }

  function buildMsgWaveform(container) {
    for (var i = 0; i < 54; i++) {
      var bar = document.createElement('div');
      bar.className = 'waveform-bar';
      var h = 2 + Math.floor(Math.random() * 16);
      bar.style.height = h + 'px';
      var color = i < 32 ? '#414651' : '#a4a7ae';
      bar.style.background = color;
      bar.dataset.restHeight = h;
      bar.dataset.restColor = color;
      bar.style.transition = 'height 0.15s ease';
      container.appendChild(bar);
    }
  }

  function addOutgoingMessage(text, images) {
    var row = document.createElement('div');
    row.className = 'msg-row msg-outgoing';
    var col = document.createElement('div');
    col.className = 'msg-col msg-col-out';
    if (images && images.length > 0) {
      var imgGrid = document.createElement('div');
      imgGrid.className = 'msg-images msg-images-out';
      images.forEach(function(img) {
        var card = document.createElement('div');
        card.className = 'msg-image';
        card.style.background = img.bg;
        imgGrid.appendChild(card);
      });
      col.appendChild(imgGrid);
    }
    if (text) {
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble msg-bubble-out';
      bubble.textContent = text;
      col.appendChild(bubble);
    }
    row.appendChild(col);
    chatThread.appendChild(row);
    scrollThread();
  }

  function addOutgoingAudioMessage() {
    var row = document.createElement('div');
    row.className = 'msg-row msg-outgoing';
    var col = document.createElement('div');
    col.className = 'msg-col msg-col-out';
    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble msg-bubble-out msg-bubble-audio';
    var wfId = 'msgWf' + Date.now();
    bubble.innerHTML =
      '<div class="msg-audio-row">' +
        '<div class="msg-audio-play">' +

  /* ════════════════════════════════
     AUDIO MESSAGE PLAYBACK
     ════════════════════════════════ */
  chatThread.addEventListener('click', function(e) {
    var playBtn = e.target.closest('.msg-audio-play');
    if (!playBtn) return;

    if (playBtn.dataset.playing === 'true') {
      playBtn.dataset.playing = 'false';
      cancelAnimationFrame(parseInt(playBtn.dataset.animId));
      clearTimeout(parseInt(playBtn.dataset.timerId));
      playBtn.querySelector('.msg-play-icon').classList.remove('hidden');
      playBtn.querySelector('.msg-pause-icon').classList.add('hidden');
      var wf = playBtn.closest('.msg-audio-row').querySelector('.msg-audio-waveform');
      var bars = wf.querySelectorAll('.waveform-bar');
      for (var i = 0; i < bars.length; i++) {
        bars[i].style.height = bars[i].dataset.restHeight + 'px';
        bars[i].style.background = bars[i].dataset.restColor || '';
      }
      return;
    }

    playBtn.dataset.playing = 'true';
    playBtn.querySelector('.msg-play-icon').classList.add('hidden');
    playBtn.querySelector('.msg-pause-icon').classList.remove('hidden');

    var wf = playBtn.closest('.msg-audio-row').querySelector('.msg-audio-waveform');
    var bars = wf.querySelectorAll('.waveform-bar');
    var count = bars.length;
    var restHeights = [];
    var phases = [];
    var speeds = [];

    for (var i = 0; i < count; i++) {
      var h = parseInt(bars[i].dataset.restHeight) || 6;
      restHeights.push(h);
      phases.push(i * 0.15 + Math.random() * 0.5);
      speeds.push(3 + Math.random() * 2);
      bars[i].style.background = '#414651';
    }

    var startTime = performance.now();
    var lastUpdate = 0;

    function animate(now) {
      if (playBtn.dataset.playing !== 'true') return;
      if (now - lastUpdate > 60) {
        lastUpdate = now;
        var elapsed = (now - startTime) / 1000;
        var easeIn = Math.min(1, elapsed / 0.3);
        for (var i = 0; i < count; i++) {
          var wave = Math.sin(elapsed * speeds[i] + phases[i]);
          var noise = Math.sin(elapsed * 7.3 + i * 2.1) * 0.3;
          var energy = 0.6 + 0.4 * Math.sin(elapsed * 1.5 - i * 0.08);
          var amplitude = (wave + noise) * energy * easeIn;
          var target = restHeights[i] + amplitude * 8;
          target = Math.max(2, Math.min(18, target));
          bars[i].style.height = Math.round(target) + 'px';
        }
      }
      playBtn.dataset.animId = requestAnimationFrame(animate);
    }

    playBtn.dataset.animId = requestAnimationFrame(animate);

    playBtn.dataset.timerId = setTimeout(function() {
      playBtn.dataset.playing = 'false';
      cancelAnimationFrame(parseInt(playBtn.dataset.animId));
      playBtn.querySelector('.msg-play-icon').classList.remove('hidden');
      playBtn.querySelector('.msg-pause-icon').classList.add('hidden');
      for (var i = 0; i < count; i++) {
        bars[i].style.height = bars[i].dataset.restHeight + 'px';
        bars[i].style.background = bars[i].dataset.restColor || '';
      }
    }, 3000);
  });

  // Match pairs
  function addMatchingPairs(pairs, onComplete) {
    hideComposer();
    var group = document.createElement('div');
    group.className = 'match-group';
    var columns = document.createElement('div');
    columns.className = 'match-columns';
    var leftCol = document.createElement('div');
    leftCol.className = 'match-col';
    var rightCol = document.createElement('div');
    rightCol.className = 'match-col';
    columns.appendChild(leftCol);
    columns.appendChild(rightCol);
    group.appendChild(columns);
    var rightItems = pairs.map(function(p, i) { return { idx: i, content: p.right.content, emoji: p.right.emoji }; });
    for (var si = rightItems.length - 1; si > 0; si--) {
      var sj = Math.floor(Math.random() * (si + 1));
      var tmp = rightItems[si]; rightItems[si] = rightItems[sj]; rightItems[sj] = tmp;
    }
    var selectedLeft = null, selectedRight = null, matchedCount = 0, processing = false;
    function makeTile(item, side) {
      var tile = document.createElement('div');
      tile.className = 'match-tile';
      tile.dataset.idx = item.idx;
      tile.dataset.side = side;
      var html = '';
      if (item.emoji) html += '<span class="match-emoji">' + item.emoji + '</span>';
      html += '<span>' + item.content + '</span>';
      tile.innerHTML = html;
      return tile;
    }
    pairs.forEach(function(p, i) { leftCol.appendChild(makeTile({ idx: i, content: p.left.content, emoji: p.left.emoji }, 'left')); });
    rightItems.forEach(function(item) { rightCol.appendChild(makeTile(item, 'right')); });
    chatThread.appendChild(group);
    scrollThread();
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm state-disabled';
    confirmBtn.textContent = 'Check';
    confirmBar.appendChild(confirmBtn);
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);
    function checkPair() {
      if (!selectedLeft || !selectedRight) return;
      processing = true;
      var tileL = selectedLeft, tileR = selectedRight;
      if (parseInt(tileL.dataset.idx) === parseInt(tileR.dataset.idx)) {
        tileL.classList.remove('selected'); tileR.classList.remove('selected');
        tileL.classList.add('success'); tileR.classList.add('success');
        matchedCount++;
        setTimeout(function() {
          tileL.classList.remove('success'); tileR.classList.remove('success');
          tileL.classList.add('disabled'); tileR.classList.add('disabled');
          selectedLeft = null; selectedRight = null; processing = false;
          if (matchedCount === pairs.length) confirmBtn.classList.remove('state-disabled');
        }, 800);
      } else {
        tileL.classList.remove('selected'); tileR.classList.remove('selected');
        tileL.classList.add('warning'); tileR.classList.add('warning');
        setTimeout(function() {
          tileL.classList.remove('warning'); tileR.classList.remove('warning');
          selectedLeft = null; selectedRight = null;
          setTimeout(function() { processing = false; }, 200);
        }, 300);
      }
    }
    confirmBtn.addEventListener('click', function() {
      if (confirmBtn.classList.contains('state-disabled')) return;
      group.classList.add('dismissed');
      confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      confirmBar.style.opacity = '0'; confirmBar.style.transform = 'translateY(8px)';
      setTimeout(function() { confirmBar.remove(); group.remove(); showComposer(); if (onComplete) onComplete(); }, 350);
    });
    group.addEventListener('click', function(e) {
      var tile = e.target.closest('.match-tile');
      if (!tile || processing || tile.classList.contains('disabled') || tile.classList.contains('success') || tile.classList.contains('warning')) return;
      var side = tile.dataset.side;
      if (side === 'left') {
        if (selectedLeft === tile) { tile.classList.remove('selected'); selectedLeft = null; return; }
        if (selectedLeft) selectedLeft.classList.remove('selected');
        selectedLeft = tile; tile.classList.add('selected');
      } else {
        if (selectedRight === tile) { tile.classList.remove('selected'); selectedRight = null; return; }
        if (selectedRight) selectedRight.classList.remove('selected');
        selectedRight = tile; tile.classList.add('selected');
      }
      if (selectedLeft && selectedRight) setTimeout(checkPair, 300);
    });
  }

  function addSortExercise(items, onComplete) {

    function buildTiles() {
      list.innerHTML = '';
      shuffled.forEach(function(item, i) {
        var tile = document.createElement('div');
        tile.className = 'tile tile-sortable';
        tile.dataset.correctIndex = item.correctIndex;
        tile.innerHTML =
          '<div class="tile-leading-group" style="display:flex;gap:4px;align-items:center;flex-shrink:0;">' +
            '<div class="sort-number">' + (i + 1) + '</div>' +

          '</div>' +
          '<div class="tile-content"><div class="tile-label">' + item.content + '</div></div>' +
          '<div class="tile-drag-handle">' + dragHandleSVG + '</div>';
        list.appendChild(tile);
      });
    }
    buildTiles();
    scrollThread();
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm';
    confirmBtn.textContent = 'Check';
    confirmBar.appendChild(confirmBtn);
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);
    var dragTile = null, dragStartY = 0, dragStartIndex = 0, placeholder = null, tileHeight = 0;
    function onPointerDown(e) {
      var tile = e.target.closest('.tile.tile-sortable');
      if (!tile || tile.classList.contains('success') || tile.classList.contains('warning-static')) return;
      dragTile = tile;
      dragStartY = e.clientY || e.touches[0].clientY;
      dragStartIndex = Array.from(list.children).indexOf(tile);
      tileHeight = tile.offsetHeight + 8;
      placeholder = document.createElement('div');
      placeholder.className = 'sort-placeholder';
      placeholder.style.height = tile.offsetHeight + 'px';
      var rect = tile.getBoundingClientRect();
      var listRect = list.getBoundingClientRect();
      tile.style.position = 'absolute';
      tile.style.width = rect.width + 'px';
      tile.style.left = '0';
      tile.style.top = (rect.top - listRect.top) + 'px';
      tile.classList.add('dragging');
      list.insertBefore(placeholder, tile.nextSibling);
      e.preventDefault();
    }
    function onPointerMove(e) {
      if (!dragTile) return;
      var clientY = e.clientY || (e.touches && e.touches[0].clientY);
      if (!clientY) return;
      var dy = clientY - dragStartY;
      dragTile.style.top = (dragStartIndex * tileHeight + dy) + 'px';
      var lr = list.getBoundingClientRect();
      var tr = dragTile.getBoundingClientRect();
      var centerY = tr.top + tr.height / 2 - lr.top;
      var targetIndex = Math.max(0, Math.min(shuffled.length - 1, Math.round(centerY / tileHeight)));
      var children = Array.from(list.children).filter(function(c) { return c !== dragTile; });
      if (targetIndex < children.length) list.insertBefore(placeholder, children[targetIndex]);
      else list.appendChild(placeholder);
      e.preventDefault();
    }
    function onPointerUp() {
      if (!dragTile) return;
      var children = Array.from(list.children).filter(function(c) { return c !== dragTile; });
      var newIndex = children.indexOf(placeholder);
      if (placeholder.parentNode) placeholder.remove();
      dragTile.style.position = '';
      dragTile.style.width = '';
      dragTile.style.left = '';
      dragTile.style.top = '';
      dragTile.classList.remove('dragging');
      var item = shuffled.splice(dragStartIndex, 1)[0];
      shuffled.splice(newIndex, 0, item);
      dragTile = null; placeholder = null;
      buildTiles(); setupDrag();
    }
    function setupDrag() {
      list.querySelectorAll('.tile.tile-sortable').forEach(function(t) { t.addEventListener('pointerdown', onPointerDown); });
    }
    list.addEventListener('pointermove', onPointerMove);
    list.addEventListener('pointerup', onPointerUp);
    list.addEventListener('pointercancel', onPointerUp);
    list.addEventListener('touchmove', function(e) { if (dragTile) e.preventDefault(); }, { passive: false });
    setupDrag();
    confirmBtn.addEventListener('click', function() {
      var tiles = list.querySelectorAll('.tile.tile-sortable');
      var allCorrect = true;
      tiles.forEach(function(tile, i) {
        if (parseInt(tile.dataset.correctIndex) === i) { tile.classList.add('success'); }
        else { allCorrect = false; tile.classList.add('warning-static'); }
      });
      if (allCorrect) {
        confirmBtn.textContent = 'Correct!';
        setTimeout(function() {
          group.classList.add('dismissed');
          confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
          confirmBar.style.opacity = '0'; confirmBar.style.transform = 'translateY(8px)';
          setTimeout(function() { confirmBar.remove(); group.remove(); showComposer(); if (onComplete) onComplete(); }, 350);
        }, 800);
      } else {
        setTimeout(function() {
          tiles.forEach(function(t) { t.classList.remove('success', 'warning-static'); });
          setupDrag();
        }, 500);
      }
    });
  }

  // blankAnswers: string (single blank) or array of strings (multi-blank)

  function addFillBlank(sentenceParts, blankAnswers, options, onComplete) {
    if (typeof blankAnswers === 'string') blankAnswers = [blankAnswers];
    var group = document.createElement('div');
    group.className = 'fill-blank-group';

    // Sentence card with inline text + gap slots + options inside
    var sentence = document.createElement('div');

    row.className = 'fill-blank-row';

    sentenceParts.forEach(function(part, i) {
      if (part) {
        var textSpan = document.createElement('span');
        textSpan.className = 'fill-blank-text';
        textSpan.textContent = part;
        row.appendChild(textSpan);
      }
      if (i < sentenceParts.length - 1) {
        var gap = document.createElement('div');
        gap.className = 'fill-blank-gap' + (i === 0 ? ' active' : '');

        var gapText = document.createElement('p');
        gapText.className = 'fill-blank-gap-text';
        gapText.textContent = '\u00A0';
        gap.appendChild(gapText);
        var line = document.createElement('div');
        line.className = 'fill-blank-gap-line';
        gap.appendChild(line);

        gaps.push(gap);

    // Option tiles (inside sentence card)
    var optionsRow = document.createElement('div');
    optionsRow.className = 'fill-blank-options';
    var shuffled = options.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }
    shuffled.forEach(function(opt, i) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.value = opt;
      tile.innerHTML = '<div class="tile-content"><span class="tile-label">' + opt + '</span></div>';
      tile.style.animation = 'tileSlideIn 0.3s ease both';

      optionsRow.appendChild(tile);
    });
    sentence.appendChild(optionsRow);
    group.appendChild(sentence);
    chatThread.appendChild(group);
    scrollThread();

    // Hide composer, show Check in confirm bar
    hideComposer();
    var confirmBar = document.createElement('div');
    confirmBar.className = 'confirm-bar';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'tile-group-confirm state-disabled';
    confirmBtn.textContent = 'Check';
    confirmBar.appendChild(confirmBtn);
    setTimeout(function() { phoneScreen.appendChild(confirmBar); }, 150);

    // Track which option tile is placed in which gap
    var placements = [];
    var currentGapIndex = 0;

    function updateCheckState() {
      var allFilled = gaps.every(function(g) { return g.classList.contains('filled'); });
      if (allFilled) { confirmBtn.classList.remove('state-disabled'); } else { confirmBtn.classList.add('state-disabled'); }
    }

    // Tap option → place in next empty gap (no validation)
    optionsRow.addEventListener('click', function(e) {
      var tile = e.target.closest('.tile');
      if (!tile || tile.classList.contains('placed') || tile.classList.contains('used') || tile.classList.contains('success')) return;
      if (currentGapIndex >= gaps.length) return;
      var value = tile.dataset.value;
      var gap = gaps[currentGapIndex];
      var gapText = gap.querySelector('.fill-blank-gap-text');
      gapText.textContent = value;
      gap.classList.add('filled');
      gap.classList.remove('active');
      tile.classList.add('placed');
      placements.push({ gapIndex: currentGapIndex, tile: tile, value: value });
      currentGapIndex++;
      if (currentGapIndex < gaps.length) gaps[currentGapIndex].classList.add('active');
      updateCheckState();
    });

    // Tap Check → validate all gaps
    confirmBtn.addEventListener('click', function() {
      if (confirmBtn.classList.contains('state-disabled')) return;
      var allCorrect = true;
      placements.forEach(function(p) {
        var gap = gaps[p.gapIndex];
        var isCorrect = p.value === blankAnswers[p.gapIndex];
        if (isCorrect) {
          gap.classList.add('correct');
          p.tile.classList.remove('placed');
          p.tile.classList.add('success');
        } else {
          allCorrect = false;
          gap.classList.add('wrong');
          p.tile.classList.add('error');
        }
      });
      confirmBtn.classList.add('state-disabled');
      if (allCorrect) {
        optionsRow.querySelectorAll('.tile:not(.success)').forEach(function(t) { t.classList.add('used'); });
        confirmBar.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
        confirmBar.style.opacity = '0'; confirmBar.style.transform = 'translateY(8px)';
        setTimeout(function() {
          confirmBar.remove(); group.classList.add('dismissed');
          setTimeout(function() { group.remove(); showComposer(); if (onComplete) onComplete(true); }, 350);
        }, 1000);
      } else {
        setTimeout(function() {
          placements = placements.filter(function(p) {
            var gap = gaps[p.gapIndex];
            if (gap.classList.contains('wrong')) {
              var gapText = gap.querySelector('.fill-blank-gap-text');
              gapText.textContent = '\u00A0';
              gap.classList.remove('filled', 'wrong');
              p.tile.classList.remove('placed', 'error');
              p.tile.classList.add('used');
              return false;
            }
            return true;
          });
          currentGapIndex = 0;
          for (var i = 0; i < gaps.length; i++) {
            if (!gaps[i].classList.contains('filled')) { currentGapIndex = i; gaps[i].classList.add('active'); break; }
          }
          updateCheckState();
        }, 800);
      }
    });
  }

  // ── TIER 2 CONVERSATION: All 6 patterns ──
  setTimeout(function() {
    addIncoming("Hi! What should we do today?", function() {
      addTileGroup([
        { emoji: '\uD83C\uDFAE', label: 'Play a game' },
        { emoji: '\uD83D\uDCD6', label: 'Read a story' },
        { emoji: '\uD83E\uDDE9', label: 'Do a quiz' }
      ], function(selected) {
        addOutgoing(selected.label + "!");
        addIncoming("Fun! Which animals do you like? Pick all!", function() {
          addTileGroupMulti([
            { emoji: '\uD83D\uDC36', label: 'Dogs' },
            { emoji: '\uD83D\uDC31', label: 'Cats' },
            { emoji: '\uD83D\uDC30', label: 'Bunnies' },
            { emoji: '\uD83D\uDC38', label: 'Frogs' }
          ], 'Done', function(selected) {
            addOutgoing("I love " + selected.join(' and ').toLowerCase() + "!");
            addIncoming("Now match each animal to its sound!", function() {
              addMatchingPairs([
                { left: { emoji: '\uD83D\uDC36', content: 'Dog' },  right: { content: 'Woof!' } },
                { left: { emoji: '\uD83D\uDC31', content: 'Cat' },  right: { content: 'Meow!' } },
                { left: { emoji: '\uD83D\uDC38', content: 'Frog' }, right: { content: 'Ribbit!' } }
              ], function() {
                addOutgoing("I got them all!");
                addIncoming("Last one! Smallest to biggest!", function() {
                  addSortExercise([
                    { emoji: '\uD83D\uDC1C', content: 'Ant',      correctIndex: 0 },
                    { emoji: '\uD83D\uDC30', content: 'Bunny',    correctIndex: 1 },
                    { emoji: '\uD83D\uDC18', content: 'Elephant', correctIndex: 2 }
                  ], function() {
                    addOutgoing("I did it!");

                    // Step 5: Image Quiz
                    addIncoming("Which one is a fruit?", function() {
                      addImageQuiz("Which is a fruit?", [
                        { emoji: '\uD83E\uDD55', label: 'Carrot' },
                        { emoji: '\uD83C\uDF4E', label: 'Apple' },
                        { emoji: '\uD83E\uDD66', label: 'Broccoli' },
                        { emoji: '\uD83C\uDF3D', label: 'Corn' }
                      ], 1, function(correct, picked) {
                        addOutgoing(correct ? "Apple!" : picked);
                        addIncoming(correct ? "Yes! Apples are yummy!" : "Not quite! The apple is the fruit!", function() {

                          // Step 6: Fill in the Blank
                          addIncoming("Fill in the blank!", function() {
                            addFillBlank(
                              ["The ", " shines in the sky."],
                              "sun",
                              ["moon", "sun", "star", "rain"],
                              function() {
                                addOutgoing("The sun!");
                                addIncoming("You got it! Great job today!");
                              }
                            );
                          });
                        });
                      });
                    });
                  });
                });
              });
            });
          });
        });
      });
    });
  }, 800);
})();
</script>

<script>
  var deviceBtns = document.querySelectorAll('.device-toggle .cat-tab');
  var deviceWrapper = document.querySelector('.device-wrapper');
  deviceBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      deviceBtns.forEach(function(b) { b.classList.toggle('active', b === btn); });
      if (btn.getAttribute('data-device') === 'ipad') {
        deviceWrapper.classList.add('ipad');
      } else {
        deviceWrapper.classList.remove('ipad');
      }
    });
  });
</script>
