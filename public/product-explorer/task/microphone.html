<script src="https://unpkg.com/@rive-app/canvas@2.35.2"></script>
<script src="/kid-design-system/components/mic-listener.js"></script>
<script src="/kid-design-system/components/waveform.js"></script>
<script src="/kid-design-system/components/sprout-voice.js"></script>

<script>
(function() {
  // ── Elements ──
  var micBtn = document.getElementById('micBtn');
  var speechBubble = document.getElementById('speechBubble');
  var apiKeyBar = document.getElementById('apiKeyBar');
  var apiKeyInput = document.getElementById('apiKeyInput');
  var apiKeyBtn = document.getElementById('apiKeyBtn');
  var iconMicOn = micBtn.querySelector('.icon-mic-on');
  var iconMicOff = micBtn.querySelector('.icon-mic-off');

  // ── Waveform ──
  var waveform = SproutWaveform.create({ container: 'waveformContainer' });

  // ── Voice + Mic (initialized after Rive loads) ──
  var voice = null;
  var mic = null;

  function showSpeech(text) {
    speechBubble.textContent = text;
    speechBubble.classList.add('visible');
  }
  function hideSpeech() {
    speechBubble.classList.remove('visible');
  }

  // ── Reply rotation ──
  var replies = [
    "That's so cool! Tell me more about it!",
    "Wow, I love hearing about that!",
    "You're awesome! What else happened?",
    "That's really interesting! Keep going!",
    "Ha ha, that's so fun! Tell me more!",
    "Oh wow! That sounds amazing!",
    "I like that a lot! What's your favorite part?",
    "You're so creative! What did you do next?"
  ];
  var replyIdx = 0;
  function getReply() { return replies[replyIdx++ % replies.length]; }

  // ── Start session ──
  function startSession() {
    mic = SproutMicListener.start({
      silenceThreshold: 0.015,
      speechThreshold: 0.04,
      silenceDelay: 2000,
      onAmplitude: function(rms) {
        waveform.setAmplitude(rms);
      },
      onSpeechStart: function() {
        if (!voice) return;
        // Barge-in: kid interrupts Sprout mid-speech
        if (voice.isTalking() && voice.isBargeInEnabled()) {
          voice.interrupt();
          return;
        }
        if (!voice.isTalking()) voice.listen();
      },
      onSilence: function() {
        if (!voice || voice.isTalking()) return;
        voice.stopListening();
        voice.think();
        mic.pauseSilenceDetection();
        var reply = getReply();
        setTimeout(function() {
          voice.speak(reply);
        }, 3000);
      },
      onError: function() {
        showSpeech('Please allow microphone access');
        setTimeout(hideSpeech, 3000);
      }
    });

    // Pause silence detection until greeting finishes
    mic.pauseSilenceDetection();

    // Connect mic to voice controller for half-duplex
    if (voice) voice.setMic(mic);

    // Greet with wave animation -- wait for voice to be ready
    function tryGreet() {
      if (voice) {
        voice.setMic(mic);
        voice.greet("Hi there! I'm Sprout! What should we do today?");
      } else {
        setTimeout(tryGreet, 300);
      }
    }
    setTimeout(tryGreet, 500);
  }

  // ── Mic button states ──
  function updateMicButton() {
    var state = voice ? voice.getState() : 'idle';
    var userMuted = mic ? mic.isMuted() : false;
    var disabled = mic ? mic.isDisabled() : false;
    var isLoading = (state === 'greeting');

    // Loading spinner during greeting
    micBtn.classList.toggle('loading', isLoading);

    if (!isLoading) {
      // Show mic-off icon + red style when mic is off for ANY reason
      var micOff = userMuted || disabled;
      iconMicOn.style.display = micOff ? 'none' : '';
      iconMicOff.style.display = micOff ? '' : 'none';
      micBtn.classList.toggle('muted', micOff);
    }

    if (userMuted) waveform.setIdle();
  }

  micBtn.addEventListener('click', function() {
    if (!mic) return;
    mic.toggleMute();
    updateMicButton();
  });

  // ── API key ──
  apiKeyBtn.addEventListener('click', function() {
    var key = apiKeyInput.value.trim();
    if (!key) return;
    if (voice) voice.setApiKey(key);
    apiKeyBar.classList.add('connected');
  });
  apiKeyInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') apiKeyBtn.click();
  });

  // ── Init: require click to start (Chrome autoplay policy) ──
  showSpeech("Tap anywhere to start!");

  function onFirstInteraction() {
    hideSpeech();
    apiKeyBar.classList.add('connected');
    startSession();
    document.removeEventListener('click', onFirstInteraction);
    document.removeEventListener('touchstart', onFirstInteraction);
  }
  document.addEventListener('click', onFirstInteraction);
  document.addEventListener('touchstart', onFirstInteraction);

  // ── Rive ──
  var SPROUT_SRC = '/kid-design-system/sprot2.97_.riv';

  function initRive() {
    var canvas = document.getElementById('rive-character');
    if (!canvas || !window.rive) return;
    var r = new rive.Rive({
      src: SPROUT_SRC,
      canvas: canvas,
      autoplay: true,
      stateMachines: 'State Machine 1',
      fit: rive.Fit.Contain,
      alignment: rive.Alignment.BottomCenter,
      onLoad: function() {
        r.resizeDrawingSurfaceToCanvas();
        try {
          var inputs = r.stateMachineInputs('State Machine 1');
          if (inputs) inputs.forEach(function(inp) {
            if (inp.name === 'hairID') inp.value = 1;
          });
        } catch(e) {}

        // Init voice controller
        voice = SproutVoice.init({
          riveInstance: r,
          waveform: waveform,
          mic: mic,
          chimeSrc: '/product-explorer/assets/sprout-chime.wav',
          postSpeechBuffer: 1500,
          bargeIn: true,
          onSpeechStart: function(text) { showSpeech(text); },
          onSpeechEnd: function() {
            if (mic) mic.resumeSilenceDetection();
            updateMicButton();
          },
          onInterrupt: function() {
            // Kid interrupted Sprout: resume silence detection for new turn
            if (mic) mic.resumeSilenceDetection();
            updateMicButton();
          },
          onStateChange: function() { updateMicButton(); }
        });
      }
    });
  }
  initRive();
})();
</script>

<script>window.DS_META={title:'Microphone',desc:'Voice conversation prototype with always-on microphone, Sprout Rive character, and ElevenLabs TTS.',owner:'Leti Schimmel',status:'WIP',rive:'sprot2.97_.riv',skill:'sprout-rive-skill.md',sound:'sprout-chime.wav',notes:'\
<h2>How it works</h2>\
<p>Based on <a href="https://sprout-hq.vercel.app/artifacts/voice-state-diagram" target="_blank">Han\'s Voice State Diagram</a>. Sprout behaves like a real person on a video call.</p>\
\
<h3>State machine</h3>\
<pre style="font-size:12px;line-height:1.5;background:#f5f5f5;padding:16px;border-radius:12px;border:1px solid #e9eaeb;overflow-x:auto;white-space:pre">\
                          [Tap to start]\
                               |\
                               v\
                     +-------------------+\
                     |    GREETING       |\
                     |  characterwave    |\
                     |  + speak greeting |\
                     |  Mic btn: spinner |\
                     +-------------------+\
                               |\
                          1.5s wave\
                          + speech\
                               |\
           +-------------------v-------------------+\
           |              LISTENING                |\
           |  Mic: ON    Avatar: idle + smile      |\
           |  Waveform: from mic amplitude         |\
           |  Smile ~8s, vocal "Mhm!" ~15s          |\
           |  Speech bubble: stays from last reply |\
           +---------------------------------------+\
                  |                        |\
             Kid speaks               Kid taps mic\
             (continuous)                  |\
                  |                        v\
                  |              +-------------------+\
                  |              |      MUTED        |\
                  |              |  Mic: OFF (user)  |\
                  |              |  Avatar: idle     |\
                  |              |  Red mic button   |\
                  |              +-------------------+\
                  |                        |\
                  |                   Tap to unmute\
                  |                        |\
                  |<-----------------------+\
                  |\
             2s silence\
             (semantic VAD)\
                  |\
                  v\
     +---------------------------+\
     |        THINKING           |\
     |  Mic: ON (barge-in)       |\
     |  Chime sound plays        |\
     |  thinking trigger (1.5s)  |\
     |  Silence detection paused |\
     +---------------------------+\
                  |\
             3s thinking\
                  |\
        +---------+---------+\
        |                   |\
   Direct response     Tool call / data\
   (< 1s latency)     (1-3s latency)\
        |                   |\
        |            "Let me check!"\
        |            (spoken filler)\
        |                   |\
        +--------+----------+\
                 |\
                 v\
     +---------------------------+\
     |    SPROUT SPEAKING        |\
     |  Mic: ON (barge-in)       |\
     |  smile trigger (exit)     |\
     |  talkinganimation: true   |\
     |  mouthselector cycling    |\
     |  Waveform: simulated      |\
     |  Speech bubble visible    |\
     |  Barge-in: kid can talk   |\
     +---------------------------+\
                 |              |\
            Speech ends    Kid interrupts\
                 |              |\
                 |         smile trigger\
                 |         yield to LISTENING\
                 |              |\
                 |              +--------+\
                 |                       |\
                 |\
                 v\
     +---------------------------+\
     |    POST-SPEECH BUFFER     |\
     |  1.5s echo prevention     |\
     |  Avatar: returns to idle  |\
     |  Mic: still OFF           |\
     |  Why 1.5s? Kids respond   |\
     |  200-500ms after asked    |\
     |  something. 1.5s lets     |\
     |  speaker sound fully fade |\
     +---------------------------+\
                 |\
            1.5s buffer\
                 |\
                 v\
        Mic re-enables\
        Silence detection resumes\
        Back to LISTENING\
</pre>\
\
<h3>State details</h3>\
\
<table style="width:100%;font-size:13px;border-collapse:collapse;margin:12px 0">\
<tr style="border-bottom:1px solid #e9eaeb"><th style="text-align:left;padding:8px;color:#535862">State</th><th style="text-align:left;padding:8px;color:#535862">Mic</th><th style="text-align:left;padding:8px;color:#535862">Mic button</th><th style="text-align:left;padding:8px;color:#535862">Avatar</th><th style="text-align:left;padding:8px;color:#535862">Speech bubble</th><th style="text-align:left;padding:8px;color:#535862">Sound</th></tr>\
<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:8px"><strong>Greeting</strong></td><td style="padding:8px">Paused</td><td style="padding:8px">Spinner (loading)</td><td style="padding:8px">Wave + big smile (~1.5s)</td><td style="padding:8px">Greeting text</td><td style="padding:8px">--</td></tr>\
<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:8px"><strong>Listening</strong></td><td style="padding:8px">ON</td><td style="padding:8px">White, mic-on</td><td style="padding:8px">Idle. Smile ~8s, vocal "Mhm!" ~15s</td><td style="padding:8px">Stays visible from last reply</td><td style="padding:8px">--</td></tr>\
<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:8px"><strong>Thinking</strong></td><td style="padding:8px">ON (barge-in)</td><td style="padding:8px">White, mic-on</td><td style="padding:8px">Thinking pose + progressive fillers</td><td style="padding:8px">Filler text ("Mm...", "Let me think...")</td><td style="padding:8px">Chime (sprout-chime.wav)</td></tr>\
<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:8px"><strong>Talking</strong></td><td style="padding:8px">ON (barge-in)</td><td style="padding:8px">White, mic-on</td><td style="padding:8px">Mouth moves, body gentle motion</td><td style="padding:8px">Reply text</td><td style="padding:8px">TTS voice (if API key)</td></tr>\
<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:8px"><strong>Post-speech</strong></td><td style="padding:8px">ON (barge-in)</td><td style="padding:8px">White, mic-on</td><td style="padding:8px">Returns to idle</td><td style="padding:8px">Reply stays visible</td><td style="padding:8px">--</td></tr>\
<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:8px"><strong>Muted</strong></td><td style="padding:8px">OFF (user)</td><td style="padding:8px">Red, mic-off</td><td style="padding:8px">Idle, no change</td><td style="padding:8px">Stays from last state</td><td style="padding:8px">--</td></tr>\
</table>\
\
<h3>Key design decisions (from Han\'s diagram)</h3>\
<ul>\
<li><strong>Mic during Sprout\'s turn:</strong> With barge-in enabled, mic stays live so the kid can interrupt. Echo cancellation relies on the browser\'s built-in AEC (<code>echoCancellation: true</code>). Without barge-in, mic is physically disabled (half-duplex) for guaranteed echo prevention.</li>\
<li><strong>Barge-in enabled:</strong> Kid can interrupt Sprout mid-speech. Sprout yields gracefully (<code>smile</code> trigger). Mic stays live during Sprout\'s turn.</li>\
<li><strong>Semantic turn detection:</strong> Uses 2s silence threshold (production will use OpenAI semantic VAD that reads conversational context, not just silence).</li>\
<li><strong>1.5s post-speech buffer:</strong> Kids respond 200-500ms after being asked something. 1.5s lets speaker sound fully fade while feeling natural.</li>\
<li><strong>Two response types:</strong> Direct conversation (&lt;1s) vs tool call/data lookup (1-3s). Tool calls use spoken filler: "Let me check that!"</li>\
<li><strong>Micro-reactions (listening state only):</strong> While the kid is talking, Sprout shows it\'s paying attention with a gentle <code>smile</code> every ~8s and brief vocal acknowledgments ("Mhm!", "Aha!") every ~15s. These stop when the kid stops talking.</li>\
<li><strong>Progressive fillers (thinking state only):</strong> After the kid stops, escalating fillers ("Mm...", "Let me think...", "That\'s a good question...") keep Sprout present during processing. See table below.</li>\
</ul>\
\
<h3>Progressive thinking system</h3>\
<p>Sprout never sits in silence. Fillers escalate based on how long the response takes. Each tier fires once, no stacking. When <code>speak()</code> is called, all pending timers clear instantly.</p>\

<h3>Barge-in (interruption)</h3>\
<p>The kid can interrupt Sprout mid-speech. When enabled (<code>bargeIn: true</code>):</p>\
<ul>\
<li>Mic stays <strong>live</strong> while Sprout talks (white button, not red)</li>\
<li>Kid starts talking: waveform switches from simulated to mic-driven</li>\
<li>Sprout yields: mouth stops, <code>smile</code> trigger fires, transitions to LISTENING state</li>\
<li>Speech bubble clears, TTS audio stops</li>\
<li>Kid now has the floor, normal cycle continues</li>\
</ul>\
<p>Sprout never feels annoyed or confused. The interruption feels like a good teacher/coach pausing when a student raises their hand.</p>\

<h3>Progress bar</h3>\
<p>If the experience includes a progress bar, it should advance automatically as Sprout identifies the kid is doing the work. The kid does not need to press any button for progress to happen. Sprout watches/listens and updates readiness on its own.</p>\
