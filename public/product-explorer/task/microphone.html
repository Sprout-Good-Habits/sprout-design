<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer - Microphone</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<style>
/* -- Device -- */
.device-wrapper{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:32px;padding:4px;box-shadow:0 12px 16px -4px rgba(10,13,18,.08),0 4px 6px -2px rgba(10,13,18,.03),0 2px 2px -1px rgba(10,13,18,.04)}
.device-inner-shadow{background:#fff;border-radius:28px;padding:4px;overflow:hidden;position:relative}
.device-inner-shadow::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:inset 0 0 6px 2px rgba(10,13,18,.08),inset 0 0 4px 2px rgba(10,13,18,.03);z-index:6}
.device-mockup{background:#fafafa;border:2px solid #e9eaeb;border-radius:24px;clip-path:inset(0 round 24px);position:relative}
.device-screen{width:402px;height:874px;position:relative;overflow:hidden;background:#e0f2fe;user-select:none;-webkit-user-select:none}

/* -- Status bar -- */
.status-bar{position:absolute;top:0;left:0;right:0;height:62px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;z-index:10;pointer-events:none}
.status-bar-time{font-size:17px;font-weight:600;color:#181d27;letter-spacing:-.01em}
.status-bar-icons{display:flex;align-items:center;gap:6px}
.status-bar-icons svg{display:block}

/* -- Chat toolbar -- */
.chat-toolbar{position:absolute;top:62px;left:0;right:0;height:56px;display:flex;align-items:flex-start;justify-content:space-between;padding:0 16px 8px;z-index:10;background:#e0f2fe;box-shadow:0 3px 0 0 #e9eaeb}
.chat-toolbar-title{position:absolute;left:50%;top:13px;transform:translateX(-50%);font-family:var(--font-family-body,'Inter',sans-serif);font-size:18px;line-height:28px;font-weight:600;color:#181d27;white-space:nowrap}
.chat-toolbar-btn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e9eaeb;border-radius:9999px;box-shadow:0 3px 0 0 #e9eaeb;flex-shrink:0;cursor:pointer;transition:background .15s,box-shadow .15s,transform .15s}
.chat-toolbar-btn:hover{background:#fafafa}
.chat-toolbar-btn:active{box-shadow:none;transform:translateY(2px)}
.chat-toolbar-btn svg{width:24px;height:24px;color:#181d27}

/* -- Sprout speech bubble (matches msg-bubble-in from DS) -- */
.sprout-speech{position:absolute;top:140px;left:16px;right:16px;z-index:5;display:flex;justify-content:flex-start;pointer-events:none}
.sprout-speech-bubble{background:#fff;border-radius:24px;padding:12px 16px;font-family:var(--font-family-body,'Inter',sans-serif);font-size:16px;line-height:24px;font-weight:400;color:#181d27;text-align:left;max-width:256px;min-width:90px;word-wrap:break-word;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}
.sprout-speech-bubble.visible{opacity:1;transform:translateY(0)}

/* -- Grass -- */
.bg-bottom{position:absolute;bottom:0;left:0;right:0;z-index:1;pointer-events:none}
.bg-grass-edge{width:100%;height:24px;border-radius:24px 24px 0 0;background:#86cb3c}
.bg-grass-fill{width:100%;height:89px;background:#86cb3c}

/* -- Sprout (Rive character) -- */
.rive-wrap{position:absolute;bottom:-196px;left:50%;transform:translateX(-50%);width:690px;height:690px;z-index:2;pointer-events:none}
.rive-canvas{width:690px;height:690px}

/* -- Home indicator -- */
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:100px;background:#181d27;z-index:20}

/* -- Composer bar -- */
.composer-bar{position:absolute;bottom:45px;left:0;right:0;z-index:10;display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px}

/* -- Btn-util -- */
.btn-util{width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e9eaeb;border-radius:9999px;box-shadow:0 3px 0 0 #e9eaeb;cursor:pointer;padding:0;transition:background .15s,box-shadow .15s,transform .15s}
.btn-util:hover{background:#fafafa}
.btn-util:active{box-shadow:none;transform:translateY(2px)}
.btn-util svg{width:24px;height:24px;color:#181d27}
.btn-util.muted{background:#f04438;border-color:#d92d20;box-shadow:0 4px 0 0 #d92d20}
.btn-util.muted svg{color:#fff}
.btn-util.muted:hover{background:#f97066}
.btn-util.muted:active{box-shadow:none;transform:translateY(2px)}

/* -- Waveform -- */
.waveform-container{position:absolute;bottom:0;left:0;right:0;height:34px;z-index:3;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.waveform-bar{width:2px;flex-shrink:0;margin:0 1px;border-radius:1px;background:linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,1) 100%);transition:height .1s ease}


/* -- API key input -- */
.api-key-bar{position:absolute;top:130px;left:16px;right:16px;z-index:15;display:flex;gap:8px}
.api-key-bar input{flex:1;height:36px;border:2px solid #e9eaeb;border-radius:12px;padding:0 12px;font-size:13px;font-family:inherit;background:#fff;outline:none;color:#181d27}
.api-key-bar input:focus{border-color:#0ba5ec}
.api-key-bar input::placeholder{color:#a4a7ae}
.api-key-bar button{height:36px;padding:0 14px;background:#0ba5ec;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.api-key-bar button:hover{background:#36bffa}
.api-key-bar.connected{display:none}

/* -- State label -- */
.state-label{display:none}

@media(prefers-reduced-motion:reduce){.listening-dot,.waveform-bar{animation:none !important;transition:none !important}}
</style>
</head>

<div class="main">
  <div class="content-area">

<!-- Status bar -->
<div class="status-bar">
  <span class="status-bar-time">9:41</span>
  <span class="status-bar-icons">
    <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#181d27"/><rect x="4" y="2" width="3" height="10" rx="1" fill="#181d27"/><rect x="8" y="1" width="3" height="11" rx="1" fill="#181d27"/><rect x="12" y="0" width="3" height="12" rx="1" fill="#181d27"/></svg>

<!-- Composer bar -->
<div class="composer-bar">
  <button class="btn-util" id="btnPlus" aria-label="Add attachment">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    </div>
  </div>

<!-- Rive runtime -->
<script src="https://unpkg.com/@rive-app/canvas@2.35.2"></script>

<script>
(function() {
  // ============================================================
  //  ELEMENTS
  // ============================================================
  var micBtn = document.getElementById('micBtn');
  var waveformContainer = document.getElementById('waveformContainer');
  var speechBubble = document.getElementById('speechBubble');
  var apiKeyBar = document.getElementById('apiKeyBar');
  var apiKeyInput = document.getElementById('apiKeyInput');
  var apiKeyBtn = document.getElementById('apiKeyBtn');

  // ============================================================
  //  STATE
  // ============================================================
  var ELEVENLABS_VOICE_ID = 'XfNU2rGpBa01ckF309OY';
  var apiKey = '';
  var isMuted = false;
  var audioContext = null;
  var analyser = null;       // for mic waveform
  var micStream = null;
  var isSproutTalking = false;
  var iconMicOn = micBtn.querySelector('.icon-mic-on');
  var iconMicOff = micBtn.querySelector('.icon-mic-off');

  // Silence detection
  var silenceTimer = null;
  var wasSpeaking = false;
  var SILENCE_THRESHOLD = 0.01; // RMS below this = silence
  var SPEECH_THRESHOLD = 0.03;  // RMS above this = speaking
  var SILENCE_DELAY = 2000;     // 2s of silence before triggering reply

  // ============================================================
  //  WAVEFORM BARS -- from Figma vectors
  // ============================================================
  var activeHeights = [
    13,14,16,16,16,17,18,20,20,18,17,16,14,13,13,14,16,18,18,18,
    20,20,20,20,18,17,16,14,13,14,16,17,18,20,21,22,24,25,26,27,
    29,30,31,33,34,34,34,33,31,30,29,27,26,25,24,22,21,20,18,17,
    16,14,16,17,18,20,20,20,20,20,18,16,14,13,14,16,17,18,20,20,
    20,20,20,18,16,14,13,13,13,14,16,17,18,20,21,22,24,25,26,27,
    29,30,31,33,34,34,34,34,33,31,30,29,27,26,25,24,22,21,20,18,
    17,16,14,16,17,18,20,20,20,20,20,18,16,14
  ];
  var IDLE_HEIGHT = 16;
  var NUM_BARS = activeHeights.length;
  var bars = [];

  function buildWaveform() {
    for (var i = 0; i < NUM_BARS; i++) {
      var bar = document.createElement('div');
      bar.className = 'waveform-bar';
      bar.style.height = IDLE_HEIGHT + 'px';
      waveformContainer.appendChild(bar);
      bars.push(bar);
    }
  }
  buildWaveform();

  function setWaveformIdle() {
    for (var i = 0; i < NUM_BARS; i++) {
      bars[i].style.height = IDLE_HEIGHT + 'px';
    }
  }

  // ============================================================
  //  FAKE WAVEFORM (simulates Sprout voice when no real audio analyser)
  // ============================================================
  var fakeWaveId = null;

  function startFakeWaveform() {
    var startTime = performance.now();
    function draw() {
      fakeWaveId = requestAnimationFrame(draw);
      var elapsed = (performance.now() - startTime) / 1000;
      for (var i = 0; i < NUM_BARS; i++) {
        // Organic wave: combine sine waves at different frequencies
        var wave = Math.sin(elapsed * 4.5 + i * 0.15) * 0.3
                 + Math.sin(elapsed * 7.2 + i * 0.08) * 0.2
                 + Math.sin(elapsed * 2.1 + i * 0.25) * 0.15;
        var energy = 0.4 + 0.3 * Math.sin(elapsed * 1.8); // pulsing energy
        var t = Math.max(0, Math.min(1, (wave + 0.5) * energy));
        var h = Math.round(IDLE_HEIGHT + (activeHeights[i] - IDLE_HEIGHT) * t);
        bars[i].style.height = h + 'px';
      }
    }
    draw();
  }

  function stopFakeWaveform() {
    if (fakeWaveId) { cancelAnimationFrame(fakeWaveId); fakeWaveId = null; }
    setWaveformIdle();
  }

  // ============================================================
  //  WAVEFORM ANIMATION LOOP
  // ============================================================
  var dbg = document.getElementById('debugPanel');
  var dbgFrames = 0;

  function startWaveformLoop() {
    function draw() {
      requestAnimationFrame(draw);
      dbgFrames++;

      if (!analyser) {
        if (dbgFrames % 30 === 0) dbg.textContent = 'analyser: null\nctx: ' + (audioContext ? audioContext.state : 'none') + '\nstream: ' + (micStream ? micStream.active : 'none');
        return;
      }
      if (isMuted && !isSproutTalking) return;

      // Use time-domain data (waveform) -- more responsive to voice than frequency
      var dataArray = new Uint8Array(analyser.fftSize);
      analyser.getByteTimeDomainData(dataArray);

      // Compute RMS amplitude (128 = silence center)
      var sumSq = 0;
      for (var j = 0; j < dataArray.length; j++) {
        var v = (dataArray[j] - 128) / 128;
        sumSq += v * v;
      }
      var avg = Math.sqrt(sumSq / dataArray.length);

      if (dbgFrames % 10 === 0) dbg.textContent = 'RMS: ' + avg.toFixed(4) + '\nctx: ' + audioContext.state + '\nspeak: ' + wasSpeaking + '\nmuted: ' + isMuted;

      for (var i = 0; i < NUM_BARS; i++) {
        var t = Math.min(1, avg * 8);
        var h = Math.round(IDLE_HEIGHT + (activeHeights[i] - IDLE_HEIGHT) * t);
        bars[i].style.height = h + 'px';
      }

      // Silence detection
      if (!isMuted && !isSproutTalking) {
        if (avg > SPEECH_THRESHOLD) {
          // User is speaking -- Sprout listens
          if (!wasSpeaking) {
            wasSpeaking = true;
            triggerRiveListen(true);
          }
          if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        } else if (avg < SILENCE_THRESHOLD && wasSpeaking && !silenceTimer) {
          // User went silent, start countdown
          silenceTimer = setTimeout(function() {
            wasSpeaking = false;
            silenceTimer = null;
            onUserStoppedTalking();
          }, SILENCE_DELAY);
        }
      }
    }
    draw();
  }

  // ============================================================
  //  SPEECH BUBBLE
  // ============================================================
  function showSpeech(text) {
    speechBubble.textContent = text;
    speechBubble.classList.add('visible');
  }

  function hideSpeech() {
    speechBubble.classList.remove('visible');
  }

  // ============================================================
  //  RIVE EXPRESSIONS
  //  Triggers (fire once): smile, laugh, surprise, smugface, sad,
  //                        doubtful, thinking, celebration, characterwave
  //  Bools: talkinganimation, talkingmouth toggle
  //  Numbers: mouthselector (0-12), looking (0-3)
  // ============================================================
  var mouthInterval = null;
  var lookInterval = null;

  function getRiveInputs() {
    var ri = window._riveInstance;
    if (!ri) return null;
    try {
      var inputs = ri.stateMachineInputs('State Machine 1');
      if (!inputs) return null;
      var map = {};
      inputs.forEach(function(inp) { map[inp.name] = inp; });
      return map;
    } catch(e) { return null; }
  }

  // Fire a trigger by name
  function fireRiveTrigger(name) {
    var map = getRiveInputs();
    if (map && map[name] && map[name].fire) map[name].fire();
  }

  // Sprout is talking: mouth moves, body animates
  function triggerRiveTalk(talking) {
    var map = getRiveInputs();
    if (!map) { console.warn('Rive inputs not available'); return; }
    if (talking) {
      // Reset eyes to default (3 = forward/center)
      if (map['looking']) map['looking'].value = 3;
      if (lookInterval) { clearInterval(lookInterval); lookInterval = null; }
      if (map['smile'] && map['smile'].fire) map['smile'].fire();
      if (map['talkinganimation']) map['talkinganimation'].value = true;
      if (map['talkingmouth toggle']) map['talkingmouth toggle'].value = true;
      mouthInterval = setInterval(function() {
        if (map['mouthselector']) {
          map['mouthselector'].value = 1 + Math.floor(Math.random() * 8);
        }
      }, 120);
    } else {
      if (map['talkinganimation']) map['talkinganimation'].value = false;
      if (map['talkingmouth toggle']) map['talkingmouth toggle'].value = false;
      if (map['mouthselector']) map['mouthselector'].value = 0;
      if (mouthInterval) { clearInterval(mouthInterval); mouthInterval = null; }
    }
  }

  // Sprout is thinking: fire thinking trigger
  function triggerRiveThinking() {
    fireRiveTrigger('thinking');
  }

  // Sprout is listening: eyes look around attentively
  function triggerRiveListen(listening) {
    var map = getRiveInputs();
    if (!map) return;

    if (listening) {
      // Gently shift eyes around to show attentiveness
      if (map['looking']) map['looking'].value = 1; // look up-middle
      lookInterval = setInterval(function() {
        if (map['looking']) {
          map['looking'].value = Math.floor(Math.random() * 3); // 0=top-left, 1=top-mid, 2=top-right
        }
      }, 1500);
      // Smile to show engagement
      fireRiveTrigger('smile');
    } else {
      if (lookInterval) { clearInterval(lookInterval); lookInterval = null; }
      if (map['looking']) map['looking'].value = 3; // reset to forward
    }
  }

  // ============================================================
  //  CHIME + ELEVENLABS TTS
  // ============================================================
  var chimeAudio = document.createElement('audio');
  chimeAudio.src = '/product-explorer/assets/sprout-chime.wav';
  chimeAudio.volume = 0.6;
  chimeAudio.setAttribute('playsinline', '');
  document.body.appendChild(chimeAudio);

  function playChime() {
    chimeAudio.currentTime = 0;
    return chimeAudio.play().catch(function(e) { console.warn('Chime blocked:', e); });
  }

  var sproutReplies = [
    "That's so cool! Tell me more about it!",
    "Wow, I love hearing about that!",
    "You're awesome! What else happened?",
    "That's really interesting! Keep going!",
    "Ha ha, that's so fun! Tell me more!",
    "Oh wow! That sounds amazing!",
    "I like that a lot! What's your favorite part?",
    "You're so creative! What did you do next?"
  ];
  var replyIdx = 0;

  function getReply() {
    var reply = sproutReplies[replyIdx % sproutReplies.length];
    replyIdx++;
    return reply;
  }

  function onUserStoppedTalking() {
    if (isSproutTalking) return;
    // Stop listening animation
    triggerRiveListen(false);
    // Sprout thinks while chime plays
    triggerRiveThinking();
    playChime();

    if (apiKey) {
      // Use ElevenLabs TTS
      var reply = getReply();
      setTimeout(function() {
        speakWithElevenLabs(reply);
      }, 800);
    } else {
      // No API key: fake talking animation after 2s of thinking
      var reply = getReply();
      setTimeout(function() {
        isSproutTalking = true;
        showSpeech(reply);
        triggerRiveTalk(true);
        startFakeWaveform();
        // Stop after a few seconds
        setTimeout(function() {
          isSproutTalking = false;
          triggerRiveTalk(false);
          stopFakeWaveform();
          setTimeout(hideSpeech, 1500);
        }, 3000);
      }, 2000);
    }
  }

  // Pre-create a reusable audio element and unlock it on first user gesture (Safari fix)
  var ttsAudio = document.createElement('audio');
  ttsAudio.setAttribute('playsinline', '');
  document.body.appendChild(ttsAudio);

  document.addEventListener('click', function unlockAudio() {
    ttsAudio.play().then(function() { ttsAudio.pause(); }).catch(function() {});
    chimeAudio.play().then(function() { chimeAudio.pause(); chimeAudio.currentTime = 0; }).catch(function() {});
    document.removeEventListener('click', unlockAudio);
  });

  function speakWithElevenLabs(text) {
    isSproutTalking = true;
    // Safety: force reset after 15s in case audio events never fire
    setTimeout(function() {
      if (isSproutTalking) {
        isSproutTalking = false;
        triggerRiveTalk(false);
        hideSpeech();
      }
    }, 15000);

    fetch('https://api.elevenlabs.io/v1/text-to-speech/' + ELEVENLABS_VOICE_ID, {
      method: 'POST',
      headers: {
        'xi-api-key': apiKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_turbo_v2',
        voice_settings: {
          stability: 0.6,
          similarity_boost: 0.75,
          style: 0.3
        }
      })
    })
    .then(function(res) {
      if (!res.ok) throw new Error('ElevenLabs error: ' + res.status);
      return res.blob();
    })
    .then(function(blob) {
      var url = URL.createObjectURL(blob);
      ttsAudio.src = url;

      ttsAudio.onplaying = function() {
        showSpeech(text);
        triggerRiveTalk(true);
        startFakeWaveform();
      };

      ttsAudio.onended = function() {
        isSproutTalking = false;
        triggerRiveTalk(false);
        stopFakeWaveform();
        setTimeout(hideSpeech, 1500);
      };

      ttsAudio.onerror = function() {
        isSproutTalking = false;
        triggerRiveTalk(false);
        hideSpeech();
      };

      ttsAudio.play().catch(function(e) {
        console.error('Audio play failed:', e);
        isSproutTalking = false;
      });
    })
    .catch(function(err) {
      console.error('TTS error:', err);
      isSproutTalking = false;
      triggerRiveTalk(false);
      setTimeout(hideSpeech, 3000);
    });
  }

  // ============================================================
  //  MIC MUTE/UNMUTE TOGGLE
  // ============================================================
  function updateMicIcon() {
    iconMicOn.style.display = isMuted ? 'none' : '';
    iconMicOff.style.display = isMuted ? '' : 'none';
    micBtn.classList.toggle('muted', isMuted);
  }

  micBtn.addEventListener('click', function() {
    isMuted = !isMuted;
    updateMicIcon();
    if (micStream) {
      micStream.getAudioTracks().forEach(function(t) { t.enabled = !isMuted; });
    }
    if (isMuted) setWaveformIdle();
  });

  // ============================================================
  //  START LISTENING (always on)
  // ============================================================
  var micStarted = false;

  function startListening() {
    if (micStarted) return;
    micStarted = true;

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    // Resume context (required after user gesture in most browsers)
    audioContext.resume().then(function() {
      console.log('AudioContext state:', audioContext.state);
    });

    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      micStream = stream;
      console.log('Mic stream active:', stream.active, 'tracks:', stream.getAudioTracks().length);

      var source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);

      startWaveformLoop();

      // Greet after mic is ready
      setTimeout(function() {
        speakWithElevenLabs("Hi there! I'm Sprout! What should we do today?");
      }, 500);
    })
    .catch(function(err) {
      console.error('Mic access denied:', err);
      micStarted = false;
      showSpeech('Please allow microphone access');
      setTimeout(hideSpeech, 3000);
    });
  }

  // ============================================================
  //  INIT -- require a click to start (Chrome autoplay policy)
  // ============================================================
  // Show API key bar so user can update if needed
  apiKeyInput.value = apiKey;
  showSpeech("Tap anywhere to start!");

  function onFirstInteraction() {
    hideSpeech();
    if (audioContext && audioContext.state === 'suspended') {
      audioContext.resume();
    }
    if (!micStarted) startListening();
    document.removeEventListener('click', onFirstInteraction);
    document.removeEventListener('touchstart', onFirstInteraction);
  }
  document.addEventListener('click', onFirstInteraction);
  document.addEventListener('touchstart', onFirstInteraction);
})();
</script>

<!-- Rive initialization -->
<script>
  var SPROUT_SRC = '/kid-design-system/sprot2.97_.riv';
  var r;

  function initCharRive(src) {
    var canvas = document.getElementById('rive-character');
    if (canvas && window.rive) {
      if (r) { r.cleanup(); r = null; }
      r = new rive.Rive({
        src: src,
        canvas: canvas,
        autoplay: true,
        stateMachines: 'State Machine 1',
        fit: rive.Fit.Contain,
        alignment: rive.Alignment.BottomCenter,
        onLoad: function() {
          r.resizeDrawingSurfaceToCanvas();
          try {
            var inputs = r.stateMachineInputs('State Machine 1');
            if (inputs) inputs.forEach(function(inp) {
              if (inp.name === 'hairID') inp.value = 1;
            });
          } catch(e) {}
          // Expose to main script
          window._riveInstance = r;
        }
      });
    }
  }

  initCharRive(SPROUT_SRC);

</script>
