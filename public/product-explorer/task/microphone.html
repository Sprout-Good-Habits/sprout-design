.chat-toolbar-btn:active{box-shadow:none;transform:translateY(2px)}
.chat-toolbar-btn svg{width:24px;height:24px;color:#181d27}

/* -- Sprout speech bubble (matches msg-bubble-in from DS) -- */

.sprout-speech-bubble.visible{opacity:1;transform:translateY(0)}

/* -- Grass -- */
.bg-bottom{position:absolute;bottom:0;left:0;right:0;z-index:1;pointer-events:none}
.bg-grass-edge{width:100%;height:24px;border-radius:24px 24px 0 0;background:#86cb3c}
.bg-grass-fill{width:100%;height:89px;background:#86cb3c}

/* -- Sprout (Rive character) -- */
.rive-wrap{position:absolute;bottom:-196px;left:50%;transform:translateX(-50%);width:690px;height:690px;z-index:2;pointer-events:none}
.rive-canvas{width:690px;height:690px}

/* -- Home indicator -- */
.home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:100px;background:#181d27;z-index:20}

/* -- Composer bar -- */
.composer-bar{position:absolute;bottom:45px;left:0;right:0;z-index:10;display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px}

/* -- Btn-util -- */
.btn-util{width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #e9eaeb;border-radius:9999px;box-shadow:0 3px 0 0 #e9eaeb;cursor:pointer;padding:0;transition:background .15s,box-shadow .15s,transform .15s}
.btn-util:hover{background:#fafafa}
.btn-util:active{box-shadow:none;transform:translateY(2px)}
.btn-util svg{width:24px;height:24px;color:#181d27}
.btn-util.muted{background:#f04438;border-color:#d92d20;box-shadow:0 4px 0 0 #d92d20}
.btn-util.muted svg{color:#fff}
.btn-util.muted:hover{background:#f97066}
.btn-util.muted:active{box-shadow:none;transform:translateY(2px)}

/* -- Waveform positioning -- */
.waveform-container{position:absolute;bottom:0;left:0;right:0;height:34px;z-index:3}

/* -- API key input -- */
.api-key-bar{position:absolute;top:130px;left:16px;right:16px;z-index:15;display:flex;gap:8px}
.api-key-bar input{flex:1;height:36px;border:2px solid #e9eaeb;border-radius:12px;padding:0 12px;font-size:13px;font-family:inherit;background:#fff;outline:none;color:#181d27}
.api-key-bar input:focus{border-color:#0ba5ec}
.api-key-bar input::placeholder{color:#a4a7ae}

.api-key-bar button:hover{background:#36bffa}
.api-key-bar.connected{display:none}

@media(prefers-reduced-motion:reduce){.waveform-bar{animation:none !important;transition:none !important}}

<script src="https://unpkg.com/@rive-app/canvas@2.35.2"></script>

<script src="/kid-design-system/components/waveform.js"></script>
<script src="/kid-design-system/components/sprout-voice.js"></script>

<script>
(function() {
  // ── Elements ──
  var micBtn = document.getElementById('micBtn');
  var speechBubble = document.getElementById('speechBubble');
  var apiKeyBar = document.getElementById('apiKeyBar');
  var apiKeyInput = document.getElementById('apiKeyInput');
  var apiKeyBtn = document.getElementById('apiKeyBtn');
  var iconMicOn = micBtn.querySelector('.icon-mic-on');
  var iconMicOff = micBtn.querySelector('.icon-mic-off');

  // ── Waveform ──
  var waveform = SproutWaveform.create({ container: 'waveformContainer' });

  // ── Voice controller (initialized after Rive loads) ──
  var voice = null;

  function showSpeech(text) {
    speechBubble.textContent = text;
    speechBubble.classList.add('visible');
  }
  function hideSpeech() {
    speechBubble.classList.remove('visible');
  }

  // ── Reply rotation ──
  var replies = [
    "That's so cool! Tell me more about it!",
    "Wow, I love hearing about that!",
    "You're awesome! What else happened?",
    "That's really interesting! Keep going!",
    "Ha ha, that's so fun! Tell me more!",
    "Oh wow! That sounds amazing!",
    "I like that a lot! What's your favorite part?",
    "You're so creative! What did you do next?"
  ];
  var replyIdx = 0;
  function getReply() { return replies[replyIdx++ % replies.length]; }

  // ── Mic listener ──
  var mic = null;

  function startMic() {
    mic = SproutMicListener.start({
      silenceThreshold: 0.015,
      speechThreshold: 0.04,
      silenceDelay: 2000,
      onAmplitude: function(rms) {
        waveform.setAmplitude(rms);
      },
      onSpeechStart: function() {
        if (voice && !voice.isTalking()) voice.listen();
      },
      onSilence: function() {
        if (!voice || voice.isTalking()) return;
        voice.stopListening();
        voice.think();
        mic.pauseSilenceDetection();
        var reply = getReply();
        setTimeout(function() {
          voice.speak(reply);
        }, 3000);
      },
      onError: function() {
        showSpeech('Please allow microphone access');
        setTimeout(hideSpeech, 3000);
      }
    });

    // Pause silence detection until greeting finishes
    mic.pauseSilenceDetection();

    // Greet -- wait for voice to be ready
    function tryGreet() {
      if (voice) {
        voice.speak("Hi there! I'm Sprout! What should we do today?");
      } else {
        setTimeout(tryGreet, 300);
      }
    }
    setTimeout(tryGreet, 500);
  }

  // ── Mute toggle ──
  function updateMicIcon(muted) {
    iconMicOn.style.display = muted ? 'none' : '';
    iconMicOff.style.display = muted ? '' : 'none';
    micBtn.classList.toggle('muted', muted);
    if (muted) waveform.setIdle();
  }

  micBtn.addEventListener('click', function() {
    if (!mic) return;
    var muted = mic.toggleMute();
    updateMicIcon(muted);
  });

  // ── API key ──
  apiKeyBtn.addEventListener('click', function() {
    var key = apiKeyInput.value.trim();
    if (!key) return;
    if (voice) voice.setApiKey(key);
    apiKeyBar.classList.add('connected');
  });
  apiKeyInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') apiKeyBtn.click();
  });

  // ── Init: require click to start (Chrome autoplay policy) ──
  showSpeech("Tap anywhere to start!");

  function onFirstInteraction() {
    hideSpeech();
    startMic();
    document.removeEventListener('click', onFirstInteraction);
    document.removeEventListener('touchstart', onFirstInteraction);
  }
  document.addEventListener('click', onFirstInteraction);
  document.addEventListener('touchstart', onFirstInteraction);

  // ── Rive ──
  var SPROUT_SRC = '/kid-design-system/sprot2.97_.riv';

  function initRive() {
    var canvas = document.getElementById('rive-character');
    if (!canvas || !window.rive) return;
    var r = new rive.Rive({
      src: SPROUT_SRC,
      canvas: canvas,
      autoplay: true,
      stateMachines: 'State Machine 1',
      fit: rive.Fit.Contain,
      alignment: rive.Alignment.BottomCenter,
      onLoad: function() {
        r.resizeDrawingSurfaceToCanvas();
        try {
          var inputs = r.stateMachineInputs('State Machine 1');
          if (inputs) inputs.forEach(function(inp) {
            if (inp.name === 'hairID') inp.value = 1;
          });
        } catch(e) {}

        // Init voice controller now that Rive is ready
        voice = SproutVoice.init({
          riveInstance: r,
          waveform: waveform,
          chimeSrc: '/product-explorer/assets/sprout-chime.wav',
          onSpeechStart: function(text) { showSpeech(text); },
          onSpeechEnd: function() {
            setTimeout(hideSpeech, 1500);
            if (mic) mic.resumeSilenceDetection();
          }
        });
      }
    });
  }
  initRive();
})();
</script>

<script>window.DS_META={title:'Microphone',desc:'Voice conversation prototype with always-on microphone, Sprout Rive character, and ElevenLabs TTS.',owner:'Leti Schimmel',status:'WIP',rive:'sprot2.97_.riv',skill:'sprout-rive-skill.md',sound:'sprout-chime.wav',notes:'\
<h2>How it works</h2>\
<p>The microphone is always on. The conversation loops through these states every time the kid speaks:</p>\
<h3>1. Tap to start</h3>\
<p>Chrome requires a user gesture before the mic can activate. On first tap, the mic starts and Sprout greets the kid with a fake-talk animation and speech bubble.</p>\
<h3>2. Kid speaks</h3>\
<p>Waveform bars animate from the kid\'s voice amplitude. Sprout enters a <strong>listening state</strong> (<code>smile</code> trigger, looking at camera).</p>\
<h3>3. Kid stops speaking (2s silence)</h3>\
<p>After 2 seconds of silence:</p>\
<ul>\
<li>The <strong>chime sound</strong> (sprout-chime.wav) plays</li>\
<li>Sprout enters a <strong>thinking state</strong> (<code>thinking</code> trigger, re-fired every 2s to keep the one-shot animation alive)</li>\
<li>Silence detection pauses so ambient noise doesn\'t re-trigger</li>\
</ul>\
<h3>4. Sprout responds (2s after chime)</h3>\
<p>Thinking interval clears. <code>smile</code> trigger fires to exit thinking. Then:</p>\
<ul>\
<li><strong>With ElevenLabs API key:</strong> Real TTS voice plays, waveform simulates, mouth moves</li>\
<li><strong>Without API key:</strong> Fake-talk animation for 3s with simulated waveform</li>\
</ul>\
<p>Speech bubble shows what Sprout is saying. <code>talkinganimation</code> + <code>talkingmouth toggle</code> bools enable body/mouth movement. <code>mouthselector</code> cycles 1-8 every 120ms for visemes.</p>\
<h3>5. Sprout finishes</h3>\
<p>Talking bools reset. Waveform returns to idle. Speech bubble hides after 1.5s. Silence detection resumes. The cycle repeats from step 2.</p>\
<h3>6. Mute button</h3>\
<p>Tap the mic button to mute/unmute. Muted state: red filled button (<code>#f04438</code>), mic-off icon, mic tracks disabled. Waveform goes idle. Silence detection still paused.</p>\
<h3>Reusable modules</h3>\
<ul>\
<li><code>mic-listener.js</code> - Mic stream, RMS amplitude, silence detection, mute API</li>\
<li><code>waveform.js</code> + <code>waveform.css</code> - 134-bar visualizer, amplitude-driven or simulated</li>\
<li><code>sprout-voice.js</code> - Rive expression orchestration (listen/think/talk), ElevenLabs TTS, chime</li>\
</ul>\
'};</script>
