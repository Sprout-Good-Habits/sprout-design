<style>
/* ── Device frame ── */
.device-wrapper {
  background: var(--bg-primary, #ffffff);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 32px;
  padding: 4px;
  box-shadow:
    0 12px 16px -4px rgba(10,13,18,0.08),
    0 4px 6px -2px rgba(10,13,18,0.03),
    0 2px 2px -1px rgba(10,13,18,0.04);
}
.device-inner-shadow {
  background: var(--bg-primary, #ffffff);
  border-radius: 28px;
  padding: 4px;
  overflow: hidden;
  position: relative;
}
.device-inner-shadow::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 0 6px 2px rgba(10,13,18,0.08),
    inset 0 0 4px 2px rgba(10,13,18,0.03);
  z-index: 6;
}
.device-mockup {
  background: var(--bg-sky, #e0f2fe);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  clip-path: inset(0 round 24px);
  position: relative;
}
.device-screen {
  width: 402px;
  height: 874px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Status bar ── */
.phone-status {
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary, #181d27);
  flex-shrink: 0;
  background: var(--bg-sky, #e0f2fe);
  position: relative;
  z-index: 5;
}
.phone-status-icons { display: flex; gap: 4px; align-items: center; }
.phone-status-icons svg { width: 16px; height: 16px; }

/* ── TossFace ── */
@font-face {
  font-family: 'TossFace';
  src: url('https://static.toss.im/tossface-font/TossFaceFontWeb.otf') format('opentype');
  font-display: swap;
}
.tf-icon {
  font-family: 'TossFace', sans-serif;
  font-size: 24px; line-height: 1;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── Sky + character area ── */
.screen-sky {
  background: var(--bg-sky, #e0f2fe);
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  padding: 0 var(--spacing-xl, 16px) var(--spacing-md, 8px);
  position: relative;
  width: 100%;
  box-sizing: border-box;
  flex-shrink: 0;
  z-index: 4;
}
.toolbar-default {
  align-items: flex-start;
  justify-content: space-between;
}
.toolbar-default .leading,
.toolbar-default .trailing {
  flex: 1;
  display: flex;
  align-items: center;
}
.toolbar-default .trailing {
  justify-content: flex-end;
}
.toolbar-abs-title {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-lg, 18px);
  line-height: var(--line-height-text-lg, 28px);
  font-weight: var(--font-weight-bold, 700);
  color: var(--text-primary, #181d27);
  white-space: nowrap;
}
.btn-util {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: var(--spacing-lg, 12px);
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: var(--radius-full, 9999px);
  box-shadow: 0 3px 0 0 var(--gray-200, #e9eaeb);
  flex-shrink: 0;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
}
.btn-util:hover { background: var(--gray-50, #fafafa); }
.btn-util:active { box-shadow: none; transform: translateY(2px); }
.btn-util-primary {
  background: var(--brand-500, #0ba5ec);
  border-color: var(--brand-600, #0086c9);
  box-shadow: 0 4px 0 0 var(--brand-600, #0086c9);
}
.btn-util-primary:hover { background: var(--brand-400, #36bffa); }
.btn-util-primary:active { background: var(--brand-500, #0ba5ec); box-shadow: none; transform: translateY(2px); }
.btn-util-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-util-icon svg { width: 100%; height: 100%; }

/* ── Character wrapper ── */
.rive-wrapper {
  flex: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  margin-bottom: -20px;
}
.device-wrapper.ipad .rive-wrapper {
  margin-bottom: -72px;
}

/* ── Character canvas ── */
.rive-canvas {
  position: relative;
  align-self: center;
  width: 280px;
  height: 280px;
  z-index: 3;
  pointer-events: none;
  flex-shrink: 0;
}

/* ── Bottom panel — same height as grass area in home tier-3 ── */
.customizer-panel {
  background: var(--bg-primary, #ffffff);
  border-radius: var(--radius-4xl, 24px) var(--radius-4xl, 24px) 0 0;
  position: relative;
  z-index: 4;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
  height: 460px;
}

/* ── Category tabs — page-specific margin override ── */
.category-tabs {
  margin: var(--spacing-xl, 16px) var(--spacing-xl, 16px) 0;
}

/* ── Panel content ── */
.panel-content {
  padding: var(--spacing-xl, 16px) var(--spacing-xl, 16px) var(--spacing-4xl, 32px);
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  min-height: 0;
}
.panel-content::-webkit-scrollbar { display: none; }
.panel-section { display: none; }
.panel-section.active { display: block; }

.panel-subsection {
  margin-bottom: var(--spacing-xl, 16px);
}
.panel-subsection:last-child { margin-bottom: 0; }

.panel-label {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
  font-weight: var(--font-weight-semibold, 600);
  color: var(--text-primary, #181d27);
  margin-bottom: var(--spacing-lg, 12px);
}

/* ── Swatch grid (horizontal carousel) ── */
.swatch-grid {
  display: flex;
  flex-wrap: nowrap;
  gap: var(--spacing-xl, 16px);
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 0 var(--spacing-xl, 16px) var(--spacing-xs, 4px);
  margin: 0 calc(-1 * var(--spacing-xl, 16px));
}
.swatch-grid::-webkit-scrollbar { display: none; }
.swatch-grid .tile.tile-swatch { flex-shrink: 0; }
.swatch-grid-bg {
  display: grid;
  grid-template-columns: repeat(5, auto);
  justify-content: space-between;
  row-gap: var(--spacing-lg, 12px);
  overflow-x: visible;
  margin: 0;
  padding: 0 0 var(--spacing-xs, 4px);
}

/* ── Style grid ── */
.style-grid {
  display: grid;
  grid-template-columns: repeat(3, max-content);
  justify-content: space-between;
  row-gap: var(--spacing-lg, 12px);
}

/* ── Coming soon ── */
.coming-soon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--spacing-md, 8px);
  padding: var(--spacing-3xl, 24px) 0;
  color: var(--text-quaternary, #717680);
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-sm, 14px);
}
.coming-soon-icon {
  font-family: 'TossFace', sans-serif;
  font-size: 24px;
}

/* ── Controls row ── */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin-bottom: var(--spacing-xl, 16px);
}
/* (device toggle moved to metadata dropdown) */

/* ── iPad overrides ── */
.device-wrapper.ipad .device-screen {
  width: 640px;
  height: 960px;
}
.device-wrapper.ipad .rive-canvas {
  width: 320px;
  height: 320px;
}
.device-wrapper.ipad .swatch-grid-bg {
  grid-template-columns: repeat(8, auto);
}
.device-wrapper.ipad .style-grid {
  grid-template-columns: repeat(5, auto);
}

/* ── Home indicator ── */
.home-indicator {
  display: flex;
  justify-content: center;
  padding: var(--spacing-md, 8px) 0 var(--spacing-sm, 6px);
  background: transparent;
  flex-shrink: 0;
  z-index: 4;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
}
.home-indicator-bar {
  width: 108px;
  height: 4px;
  background: var(--text-primary, #181d27);
  border-radius: 100px;
}
</style>

  function setRiveInput(name, value) {
    if (!riveInputs) return;
    for (var i = 0; i < riveInputs.length; i++) {

        riveInputs[i].value = value;
        return;

    setRiveInput('glassID', state.glassID);
    setRiveInput('glassshadeID', state.glassshadeID);
    setRiveInput('earringID', state.earringID);
    setRiveInput('facedetailID', state.facedetailID);
    setRiveInput('headwearID', state.headwearID);
    setRiveInput('headwearshadeID', state.headwearshadeID);
  }

  // Sync all preview thumbnails with current state, keeping their own property fixed
  function syncPreviews() {
    previews.forEach(function(p) {
      if (!p.inputs) return;
      p.inputs.forEach(function(inp) {
        // Use the preview's own value for its stateKey, current state for everything else
        if (inp.name === p.stateKey) {
          inp.value = p.value;
        } else if (state.hasOwnProperty(inp.name)) {
          inp.value = state[inp.name];
        }
      });
    });
  }

  // ── Build swatches ──
  function buildSwatches(containerId, colors, stateKey) {
    var container = document.getElementById(containerId);
    colors.forEach(function(hex, i) {
      var el = document.createElement('button');
      el.className = 'tile tile-swatch' + (i === state[stateKey] ? ' selected' : '');
      el.setAttribute('aria-label', stateKey + ' ' + i);
      var inner = document.createElement('span');
      inner.className = 'tile-swatch-color';
      inner.style.background = hex;
      el.appendChild(inner);
      el.addEventListener('click', function() {
        state[stateKey] = i;
        setRiveInput(stateKey, i);
        container.querySelectorAll('.tile-swatch').forEach(function(s) { s.classList.remove('selected'); });
        el.classList.add('selected');
        syncPreviews();
      });
      container.appendChild(el);
    });
  }

  // ── Build style cards ──
  // For hair cards, render a mini Rive preview showing that hairstyle
  function buildStyleCards(containerId, labels, stateKey, preview) {
    var container = document.getElementById(containerId);
    labels.forEach(function(label, i) {
      var el = document.createElement('button');
      el.className = 'tile tile-image' + (i === state[stateKey] ? ' selected' : '');

      if (preview) {
        var canvas = document.createElement('canvas');
        canvas.width = 222;
        canvas.height = 222;
        canvas.style.cssText = 'width:132%;height:132%;pointer-events:none;position:absolute;top:-16%;left:50%;transform:translateX(-50%);';
        el.appendChild(canvas);

        // Render a mini Rive preview with this style variant
        try {
          (function(opts) {
            var r = new rive.Rive({
              src: '/design-system/character2.91.riv',
              canvas: canvas,
              autoplay: true,
              artboard: 'Village-character',
              stateMachines: 'State Machine 1',
              fit: rive.Fit.Contain,
              alignment: rive.Alignment.TopCenter,
              onLoad: function() {
                r.resizeDrawingSurfaceToCanvas();
                try {
                  var inputs = r.stateMachineInputs('State Machine 1');
                  if (inputs) {
                    // Store for syncing later
                    previews.push({ rive: r, inputs: inputs, stateKey: opts.stateKey, value: opts.value });
                    // Apply full current state, but override the preview's own property
                    inputs.forEach(function(inp) {
                      if (inp.name === opts.stateKey) {
                        inp.value = opts.value;
                      } else if (state.hasOwnProperty(inp.name)) {
                        inp.value = state[inp.name];
                      }
                    });
                  }
                } catch(e) {}
              }
            });
          })({ stateKey: stateKey, value: i });
        } catch(e) {}
      } else {
        el.textContent = label;
      }

      el.addEventListener('click', function() {
        state[stateKey] = i;
        setRiveInput(stateKey, i);
        container.querySelectorAll('.tile-image').forEach(function(s) { s.classList.remove('selected'); });
        el.classList.add('selected');
        syncPreviews();
      });
      container.appendChild(el);
    });
  }

  // ── Tab switching with sliding pill ──
  var tabContainer = document.getElementById('category-tabs');
  var pill = document.getElementById('slide-pill');
  var tabs = document.querySelectorAll('#category-tabs .segment');

  function movePill(tab) {
    pill.style.width = tab.offsetWidth + 'px';
    pill.style.transform = 'translateX(' + (tab.offsetLeft - 4) + 'px)';
  }

  // Init pill on first active segment
  var firstActive = tabContainer.querySelector('.segment.active');
  if (firstActive && pill) requestAnimationFrame(function() { movePill(firstActive); });

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      var panel = tab.getAttribute('data-panel');
      tabs.forEach(function(t) {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      document.querySelectorAll('.panel-section').forEach(function(p) { p.classList.remove('active'); });
      var target = document.getElementById('panel-' + panel);
      if (target) target.classList.add('active');
      if (pill) movePill(tab);
    });
  });

  window.addEventListener('resize', function() {
    var active = tabContainer.querySelector('.segment.active');
    if (active && pill) movePill(active);
  });

  // ── Build background swatches (changes sky color) ──
  function buildBgSwatches(containerId, colors) {
    var container = document.getElementById(containerId);
    var sky = document.querySelector('.screen-sky');
    var statusBar = document.querySelector('.phone-status');
    var deviceMockup = document.querySelector('.device-mockup');
    colors.forEach(function(hex, i) {
      var el = document.createElement('button');
      el.className = 'tile tile-swatch' + (i === 0 ? ' selected' : '');
      el.setAttribute('aria-label', 'Background ' + i);
      var inner = document.createElement('span');
      inner.className = 'tile-swatch-color';
      inner.style.background = hex;
      el.appendChild(inner);
      el.addEventListener('click', function() {
        container.querySelectorAll('.tile-swatch').forEach(function(s) { s.classList.remove('selected'); });
        el.classList.add('selected');
        sky.style.background = hex;
        statusBar.style.background = hex;
        deviceMockup.style.background = hex;
      });
      container.appendChild(el);
    });
  }

  // ── Populate panels ──
  buildSwatches('skin-swatches', SKINS, 'skinID');
  buildSwatches('hair-swatches', HAIR_COLORS, 'hairshadeID');
  buildSwatches('beard-swatches', HAIR_COLORS, 'beardshadeID');
  buildSwatches('clothing-swatches', CLOTHING_COLORS, 'clothingcolourID');
  buildSwatches('eye-swatches', EYE_COLORS, 'eyeshadeID');
  buildSwatches('glass-swatches', GLASS_COLORS, 'glassshadeID');
  buildStyleCards('hair-styles', HAIR_STYLES, 'hairID', true);
  buildStyleCards('beard-styles', BEARD_TYPES, 'beardID', true);
  buildStyleCards('clothing-styles', CLOTHING_TYPES, 'clothingID', true);
  buildStyleCards('facedetail-styles', FACE_DETAILS, 'facedetailID', true);
  buildStyleCards('glass-styles', GLASS_TYPES, 'glassID', true);
  buildStyleCards('earring-styles', EARRING_TYPES, 'earringID', true);
  buildSwatches('headwear-swatches', CLOTHING_COLORS, 'headwearshadeID');
  buildStyleCards('headwear-styles', HEADWEAR_TYPES, 'headwearID', true);
  buildBgSwatches('bg-swatches', BG_COLORS);

  // ── Device change handler (called by shell.js metadata dropdown) ──
  window.onDeviceChange = function(device) {
    var wrapper = document.getElementById('device-wrapper');
    wrapper.classList.toggle('ipad', device === 'tablet');
  };

  // ── Init Rive ──
  initRive();
})();
</script>
</body>
</html>
