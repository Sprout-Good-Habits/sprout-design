<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer — Checklist Lobby (Tier 3)</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<link rel="stylesheet" href="/design-system/components/button-utility.css">
<link rel="stylesheet" href="/design-system/components/buttons.css">
<link rel="stylesheet" href="/design-system/components/toolbar.css">
<link rel="stylesheet" href="/design-system/components/progress-bar.css">
<link rel="stylesheet" href="/design-system/components/subtitles.css">
<link rel="stylesheet" href="/design-system/components/checklist-item.css">
<style>
/* ── Device frame ── */
.device-wrapper {
  background: var(--bg-primary, #ffffff);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 32px;
  padding: 4px;
  box-shadow:
    0 12px 16px -4px rgba(10,13,18,0.08),
    0 4px 6px -2px rgba(10,13,18,0.03),
    0 2px 2px -1px rgba(10,13,18,0.04);
}
.device-inner-shadow {
  background: var(--bg-primary, #ffffff);
  border-radius: 28px;
  padding: 4px;
  overflow: hidden;
  position: relative;
}
.device-inner-shadow::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 0 6px 2px rgba(10,13,18,0.08),
    inset 0 0 4px 2px rgba(10,13,18,0.03);
  z-index: 6;
}
.device-mockup {
  background: var(--bg-sky, #e0f2fe);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 24px;
  clip-path: inset(0 round 24px);
  position: relative;
}
.device-screen {
  width: 402px;
  height: 874px;
  position: relative;
  overflow: hidden;
}

/* ── Status bar ── */
.phone-status {
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary, #181d27);
}
.phone-status-icons { display: flex; gap: 4px; align-items: center; }
.phone-status-icons svg { width: 16px; height: 16px; }

/* ── Screen background ── */
.screen-sky-alt {
  background: var(--bg-sky, #e0f2fe);
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar override (base .toolbar from toolbar.css) ── */
.toolbar-wrap {
  flex-shrink: 0;
  z-index: 3;
}

/* ── Subtitles positioning ── */
.subtitles-wrap {
  position: absolute;
  left: 80px;
  top: 54px;
  width: 242px;
  z-index: 2;
}

/* ── Sky spacer for character ── */
.sky-spacer {
  height: 194px;
  position: relative;
  flex-shrink: 0;
}
.rive-wrap {
  position: absolute;
  left: 50%;
  z-index: 0;
  pointer-events: none;
  transform: translateX(-50%);
  /* Sprout defaults */
  top: -30px;
  width: 272px;
  height: 342px;
}
.rive-canvas {
  width: 100%;
  height: 100%;
}

/* ── Nose indicator ── */
.sky-indicator {
  position: absolute;
  top: 164px;
  left: 116px;
  width: 16px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 9999px;
}

/* ── Bottom sheet container ── */
.lobby-sheet {
  background: var(--bg-secondary, #fafafa);
  border-radius: 24px 24px 0 0;
  padding: 24px 16px 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 0;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── Scrollable checklist area (items scroll behind sticky progress card) ── */
.checklist-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-bottom: 48px;
}
.checklist-scroll::-webkit-scrollbar { display: none; }
.checklist-scroll .progress-card {
  position: sticky;
  top: 0;
  z-index: 2;
  flex-shrink: 0;
}

/* ── Title ── */
.lobby-title {
  font-family: var(--font-family-display, 'Inter', sans-serif);
  font-size: var(--font-size-display-sm, 30px);
  font-weight: var(--font-weight-semibold, 600);
  line-height: var(--line-height-display-sm, 38px);
  color: var(--text-primary, #181d27);
  text-align: center;
}

/* ── Metrics bar ── */
.metrics-bar {
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.metric {
  display: flex;
  align-items: center;
  gap: 4px;
}
.metric-icon {
  font-family: 'TossFace', sans-serif;
  font-size: 32px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.metric-value {
  display: flex;
  flex-direction: column;
  width: 63px;
}
.metric-number {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-lg, 18px);
  font-weight: var(--font-weight-bold, 700);
  line-height: var(--line-height-text-lg, 28px);
  color: var(--text-primary, #181d27);
}
.metric-label {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-xs, 12px);
  line-height: var(--line-height-text-xs, 16px);
  color: var(--text-secondary, #414651);
}

/* ── Progress card wrapper ── */
.progress-card {
  background: var(--bg-primary, #ffffff);
  border: 2px solid var(--border-secondary, #e9eaeb);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.progress-card-title {
  font-family: var(--font-family-body, 'Inter', sans-serif);
  font-size: var(--font-size-text-md, 16px);
  font-weight: var(--font-weight-bold, 700);
  line-height: var(--line-height-text-md, 24px);
  color: var(--text-primary, #181d27);
}
/* Progress bar: no message row so collapse to track height. */
.progress-card .progress-bar { height: 24px; }

/* ── Checklist list ── */
.checklist-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── Home indicator ── */
.home-indicator {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 108px;
  height: 4px;
  background: black;
  border-radius: 100px;
  z-index: 10;
}
</style>
</head>

                    <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="4" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1" fill="none"/><rect x="2.5" y="5.5" width="8" height="5" rx="0.5"/><path d="M13 7v2a1 1 0 0 0 1-1v0a1 1 0 0 0-1-1z"/></svg>

<script>window.DS_META={title:'Checklist Lobby Tier 3',desc:'Ages 10-13. Vertical list of compact checklist rows. Kids scroll through tasks and complete them in any order. Each row shows the task emoji, name, and proof type icon.',owner:'Leti Schimmel',status:'Draft',rive:['sprot2.97_.riv','character2.91.riv'],skill:['sprout-character.txt','village-character2.91.txt'],device:'Phone',character:['Sprout','Village'],notes:'\
<h2>How the Checklist Lobby Works</h2>\
<p>The checklist lobby is the daily task screen for a parent-assigned checklist quest (e.g. morning routine). It shows all items the kid needs to complete with proof submission.</p>\
<h3>Layout</h3>\
<ul>\
<li><strong>Back button:</strong> Returns to the home screen.</li>\
<li><strong>Subtitles:</strong> A speech bubble with motivational text from Sprout.</li>\
<li><strong>Sprout character:</strong> Animated Rive character in the sky area.</li>\
<li><strong>Bottom sheet:</strong> Contains the title, metrics bar (streak, hustle, skills), progress card, and the checklist list.</li>\
</ul>\
<h3>List behavior</h3>\
<p>Items can be completed in any order. Rows stack vertically and scroll within the bottom sheet. Tapping a row opens the proof submission flow. Completed items show a green checkmark emoji and strikethrough text.</p>\
<h3>Differences from Tier 2</h3>\
<ul>\
<li>Vertical list instead of horizontal carousel.</li>\
<li>Compact rows (48px) instead of tall cards.</li>\
<li>Proof icon shown inline instead of on a button.</li>\
<li>Done state uses emoji check instead of status flag ribbon.</li>\
</ul>\
'};</script>
<script src="/product-explorer/nav.js"></script>
<script src="/product-explorer/shell.js"></script>
<script src="https://unpkg.com/@rive-app/canvas@2.35.2"></script>
<script>
var SPROUT_SRC = '/design-system/sprot2.97_.riv';
var VILLAGE_SRC = '/design-system/character2.91.riv';
var VILLAGE_PRESET = { skinID:11, hairID:4, hairshadeID:3, beardID:0, beardshadeID:0, clothingcolourID:0, clothingID:0, glassID:0, glassshadeID:0, eyeshadeID:3, earringID:0, facedetailID:0, headwearID:0, headwearshadeID:0 };
var r;

function initLobbyRive(src) {
  var canvas = document.getElementById('rive-character');
  var wrap = canvas ? canvas.closest('.rive-wrap') : null;
  if (!canvas || !window.rive) return;
  if (r) { r.cleanup(); r = null; }
  var isSprout = src === SPROUT_SRC;

  // Adjust wrap sizing per character (both use top positioning; lobby-sheet z-index:1 grounds them)
  if (wrap) {
    wrap.style.bottom = 'auto';
    if (isSprout) {
      wrap.style.top = '-30px'; wrap.style.width = '272px'; wrap.style.height = '342px';
      canvas.width = 544; canvas.height = 684;
    } else {
      wrap.style.top = '-108px'; wrap.style.width = '200px'; wrap.style.height = '403px';
      canvas.width = 400; canvas.height = 806;
    }
  }

  var opts = {
    src: src, canvas: canvas, autoplay: true,
    stateMachines: 'State Machine 1',
    fit: rive.Fit.Contain,
    alignment: rive.Alignment.BottomCenter
  };
  if (!isSprout) opts.artboard = 'Village-character';
  opts.onLoad = function() {
    r.resizeDrawingSurfaceToCanvas();
    try {
      var inputs = r.stateMachineInputs('State Machine 1');
      if (inputs) {
        if (isSprout) {
          inputs.forEach(function(inp) { if (inp.name === 'hairID') inp.value = 1; });
        } else {
          inputs.forEach(function(inp) { if (VILLAGE_PRESET[inp.name] !== undefined) inp.value = VILLAGE_PRESET[inp.name]; });
        }
      }
    } catch(e) {}
  };
  r = new rive.Rive(opts);
}

initLobbyRive(SPROUT_SRC);

window.onCharacterChange = function(character) {
  initLobbyRive(character === 'village' ? VILLAGE_SRC : SPROUT_SRC);
};
</script>
