<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<style>
.artifacts-index {
  max-width: 720px;
  width: 100%;
  padding-top: 48px;
  align-self: center;
}
.artifacts-table {
  width: 100%;
  margin-top: 32px;
}
.at-header {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #e9eaeb;
  font-size: 14px;
  font-weight: 500;
  color: #717680;
  line-height: 20px;
}
.at-header-left {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px;
}
.at-header-left svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.at-header-right {
  width: 120px;
  flex-shrink: 0;
  padding: 8px;
}
.at-body {
  display: flex;
  flex-direction: column;
}
.at-row {
  display: flex;
  text-decoration: none;
  transition: background 0.1s;
}
.at-row:hover {
  background: #fafafa;
  text-decoration: none;
}
.at-name {
  flex: 1;
  padding: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #181d27;
  line-height: 20px;
  border-right: 1px solid #e9eaeb;
  border-bottom: 1px solid #e9eaeb;
  border-top: 1px solid #e9eaeb;
}
.at-badge-col {
  width: 120px;
  flex-shrink: 0;
  padding: 6px 8px;
  border-bottom: 1px solid #e9eaeb;
  border-top: 1px solid #e9eaeb;
  display: flex;
  align-items: center;
}
.at-badge {
  background: #f0f9ff;
  border: 1px solid #b9e6fe;
  color: #026aa2;
  font-size: 12px;
  font-weight: 500;
  line-height: 18px;
  border-radius: 6px;
  padding: 2px 6px;
  white-space: nowrap;
}
.search-bar {
  position: relative;
  margin-top: 24px;
}
.search-bar input {
  width: 100%;
  height: 40px;
  padding: 0 12px 0 38px;
  border: 1px solid #e9eaeb;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: #181d27;
  background: #fff;
  outline: none;
  transition: border-color 0.15s;
  box-sizing: border-box;
}
.search-bar input:focus {
  border-color: #0ba5ec;
}
.search-bar input::placeholder {
  color: #a4a7ae;
}
.search-bar svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: #a4a7ae;
  pointer-events: none;
}
.at-row.hidden {
  display: none;
}
@media (max-width: 768px) {
  .artifacts-index { padding-top: 24px; }
  .artifacts-table { margin-top: 20px; }
  .at-header-right { width: 80px; }
  .at-badge-col { width: 80px; }
  .at-name, .at-badge-col, .at-header-left, .at-header-right { padding: 10px 8px; }
  .at-row { min-height: 44px; }
  .search-bar input { height: 44px; }
}
@media (max-width: 480px) {
  .at-header-right { display: none; }
  .at-badge-col { width: auto; flex-shrink: 0; }
  .at-name { border-right: none; }
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="content-area">
    <div class="page-content">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="artifacts-index">
        <h1 class="page-title">Product explorer</h1>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search artifacts..." autocomplete="off" />
        </div>
        <div class="artifacts-table" id="artifacts-table"></div>
      </div>
    </div>
  </div>
</div>
<script src="/product-explorer/nav.js"></script>
<script src="/product-explorer/shell.js"></script>
<script>
(function() {
  var nav = window.DS_NAV;
  if (!nav || !nav[0] || !nav[0].children) return;
  var items = nav[0].children;
  var table = document.getElementById('artifacts-table');

  var html = '<div class="at-header">';
  html += '<div class="at-header-left">';
  html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>';
  html += 'Product explorer';
  html += '</div>';
  html += '<div class="at-header-right">Age group</div>';
  html += '</div>';
  html += '<div class="at-body">';

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    html += '<a class="at-row" href="' + item.href + '">';
    html += '<div class="at-name">' + item.label + '</div>';
    html += '<div class="at-badge-col">';
    if (item.badge) {
      html += '<span class="at-badge">' + item.badge + '</span>';
    }
    html += '</div>';
    html += '</a>';
  }

  html += '</div>';
  table.innerHTML = html;

  // Search filtering
  var searchInput = document.getElementById('search-input');
  var rows = table.querySelectorAll('.at-row');
  searchInput.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    for (var j = 0; j < rows.length; j++) {
      var name = rows[j].querySelector('.at-name').textContent.toLowerCase();
      var badge = rows[j].querySelector('.at-badge');
      var badgeText = badge ? badge.textContent.toLowerCase() : '';
      rows[j].classList.toggle('hidden', q !== '' && name.indexOf(q) === -1 && badgeText.indexOf(q) === -1);
    }
  });
})();
</script>
</body>
</html>
