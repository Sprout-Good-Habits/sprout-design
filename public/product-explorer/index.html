<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprout Product Explorer</title>
<link rel="stylesheet" href="/product-explorer/tokens.css">
<link rel="stylesheet" href="/product-explorer/styles.css">
<style>
.artifacts-index {
  max-width: 720px;
  width: 100%;
  padding-top: 48px;
  align-self: center;
}
.artifacts-table {
  width: 100%;
  margin-top: 32px;
}
.at-header {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #e9eaeb;
  font-size: 14px;
  font-weight: 500;
  color: #717680;
  line-height: 20px;
}
.at-header-left {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px;
}
.at-header-left svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.at-body {
  display: flex;
  flex-direction: column;
}
.at-row {
  display: flex;
  text-decoration: none;
  transition: background 0.1s;
}
.at-row:hover {
  background: #fafafa;
  text-decoration: none;
}
.at-name {
  flex: 1;
  padding: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #181d27;
  line-height: 20px;
  border-bottom: 1px solid #e9eaeb;
  border-top: 1px solid #e9eaeb;
}
.search-bar {
  position: relative;
  margin-top: 24px;
}
.search-bar input {
  width: 100%;
  height: 40px;
  padding: 0 12px 0 38px;
  border: 1px solid #e9eaeb;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: #181d27;
  background: #fff;
  outline: none;
  transition: border-color 0.15s;
  box-sizing: border-box;
}
.search-bar input:focus {
  border-color: #0ba5ec;
}
.search-bar input::placeholder {
  color: #a4a7ae;
}
.search-bar svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: #a4a7ae;
  pointer-events: none;
}
.at-row.hidden {
  display: none;
}
.surface-tabs {
  display: inline-flex;
  gap: 2px;
  padding: 4px;
  background: #fafafa;
  border: 1px solid #e9eaeb;
  border-radius: 8px;
  margin-top: 24px;
}
.surface-tab {
  appearance: none;
  background: transparent;
  border: 0;
  font: inherit;
  font-size: 13px;
  font-weight: 500;
  color: #717680;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  line-height: 20px;
  transition: background 0.1s, color 0.1s;
}
.surface-tab:hover {
  color: #181d27;
}
.surface-tab.is-active {
  background: #ffffff;
  color: #181d27;
  box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06), 0 1px 3px rgba(16, 24, 40, 0.04);
}
@media (max-width: 768px) {
  .artifacts-index { padding-top: 24px; }
  .artifacts-table { margin-top: 20px; }
  .at-name, .at-header-left { padding: 10px 8px; }
  .at-row { min-height: 44px; }
  .search-bar input { height: 44px; }
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="content-area">
    <div class="page-content">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="artifacts-index">
        <h1 class="page-title">Product explorer</h1>
        <div class="surface-tabs" id="surface-tabs" role="tablist">
          <button type="button" class="surface-tab is-active" data-surface="kid" role="tab" aria-selected="true">Kid</button>
          <button type="button" class="surface-tab" data-surface="parent" role="tab" aria-selected="false">Parent</button>
        </div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search artifacts..." autocomplete="off" />
        </div>
        <div class="artifacts-table" id="artifacts-table"></div>
      </div>
    </div>
  </div>
</div>
<script src="/product-explorer/nav.js"></script>
<script src="/product-explorer/shell.js"></script>
<script>
(function() {
  var nav = window.DS_NAV;
  if (!nav || !nav[0] || !nav[0].children) return;
  var items = nav[0].children;
  var table = document.getElementById('artifacts-table');
  var tabs = document.querySelectorAll('.surface-tab');
  var searchInput = document.getElementById('search-input');

  function render(surface) {
    var filtered = items.filter(function(item) {
      return (item.surface || 'kid') === surface;
    });

    var html = '<div class="at-header">';
    html += '<div class="at-header-left">';
    html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>';
    html += 'Product explorer';
    html += '</div>';
    html += '</div>';
    html += '<div class="at-body">';

    for (var i = 0; i < filtered.length; i++) {
      var item = filtered[i];
      html += '<a class="at-row" href="' + item.href + '">';
      html += '<div class="at-name">' + item.label + '</div>';
      html += '</a>';
    }

    html += '</div>';
    table.innerHTML = html;

    applySearch();
  }

  function applySearch() {
    var q = (searchInput.value || '').toLowerCase().trim();
    var rows = table.querySelectorAll('.at-row');
    for (var j = 0; j < rows.length; j++) {
      var name = rows[j].querySelector('.at-name').textContent.toLowerCase();
      rows[j].classList.toggle('hidden', q !== '' && name.indexOf(q) === -1);
    }
  }

  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) {
        t.classList.remove('is-active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('is-active');
      tab.setAttribute('aria-selected', 'true');
      render(tab.dataset.surface);
    });
  });

  searchInput.addEventListener('input', applySearch);

  render('kid');
})();
</script>
</body>
</html>
