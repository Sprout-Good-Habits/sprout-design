<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
    padding: 16px;
    width: 390px;
  }

  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start;
  }

  .msg-sender {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 2px;
    padding-left: 56px;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 80%;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 9999px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    background: #7C3AED;
    border: 2px solid #fff;
    overflow: hidden;
  }

  .msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Invisible spacer to keep bubble alignment when avatar is hidden */
  .msg-avatar-spacer {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    visibility: hidden;
  }

  .msg-bubble {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    line-height: 22px;
    padding: 12px 16px;
    word-break: break-word;
    white-space: pre-wrap;
    border-radius: 20px;
    min-width: 90px;
    background: #f3f4f6;
    color: #181d27;
  }

  .mention {
    color: #2563eb;
    font-weight: 600;
  }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <!-- Long message (first in group, no avatar) -->
  <div class="msg-group">
    <div class="msg-sender">Ze'ev Rosenstein</div>
    <div class="msg-row">
      <div class="msg-avatar-spacer"></div>
      <div class="msg-bubble"><span class="mention">@schimmel.leticia</span> nice to have you here <span class="mention">@ChatGPT</span> lets send a warm welcome!</div>
    </div>
  </div>

  <div style="height: 32px"></div>

  <!-- Short message (last in group, with photo avatar) -->
  <div class="msg-group">
    <div class="msg-sender">Ze'ev Rosenstein</div>
    <div class="msg-row">
      <div class="msg-avatar">
        <img src="https://i.pravatar.cc/64?u=zeev" alt="ZR">
      </div>
      <div class="msg-bubble">Hey hey</div>
    </div>
  </div>
</body>
</html>
